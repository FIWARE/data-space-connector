# status-list-server for credential revocation (Token Status List specification)
statusListServer:
  enabled: true
  signing:
    enabled: true
    secretName: "signing-key"
    issuer:
      dnsNames: ["fancy-marketplace.biz"]
      name: selfsigned-issuer
  env:
    serverDomain: "consumer-status-list.127.0.0.1.nip.io"
  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: "selfsigned-issuer"
      cert-manager.io/private-key-algorithm: "ECDSA"
      cert-manager.io/common-name: "consumer-status-list.127.0.0.1.nip.io"
      cert-manager.io/alt-names: "consumer-status-list.127.0.0.1.nip.io"
      traefik.ingress.kubernetes.io/router.tls: "true"
    hosts:
      - host: consumer-status-list.127.0.0.1.nip.io
        paths:
          - "/"
    tls:
      - secretName: consumer-status-list.127.0.0.1.nip.io-tls
        hosts:
          - consumer-status-list.127.0.0.1.nip.io
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"
  postgresql:
    host: "postgres"
    port: "5432"
    database: "statuslistdb"
    auth:
      username: "statuslist"
      # use the Zalando Postgres Operator auto-generated credentials secret
      existingSecret: "statuslist.postgres.credentials.postgresql.acid.zalan.do"
      existingSecretPasswordKey: "password"
  redis:
    enabled: true
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "100m"
        memory: "128Mi"

scorpio:
  enabled: false

