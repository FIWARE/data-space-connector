cert-manager:
  enabled: false

keycloak:
  metrics:
    enabled: true
  resources:
    requests:
      cpu: "100m"
    limits:
      cpu: "500m"
  ingress:
    enabled: true
    hostname: keycloak-consumer.127.0.0.1.nip.io
    annotations:
      traefik.ingress.kubernetes.io/router.tls: "true"
      cert-manager.io/cluster-issuer: "selfsigned-issuer"
      cert-manager.io/private-key-algorithm: "ECDSA"
      cert-manager.io/common-name: "keycloak-consumer.127.0.0.1.nip.io"
    pathType: Prefix
    tls: true
  initContainers:
    - name: prepare-keystore
      image: alpine/openssl:3.5.5
      command: ["/bin/sh", "-c"]
      args:
        - |
          openssl pkcs12 -export \
            -in /certs-did/tls.crt \
            -inkey /certs-did/tls.key \
            -certfile /certs-did/ca.crt \
            -out /did-material/cert.pfx \
            -name "didPrivateKey" \
            -passout env:STORE_PASS
          chmod 644 /did-material/cert.pfx
      env:
      - name: "STORE_PASS"
        valueFrom:
          secretKeyRef:
            name: keystore-password
            key: password
      volumeMounts:
        - name: did-material
          mountPath: /did-material
        - name: did-priv-key
          mountPath: /certs-did
    - name: register-at-tir
      image: curlimages/curl:8.18.0
      command:
        - /bin/sh
      args:
        - -ec
        - |
          #!/bin/sh
          curl -X 'POST' 'http://tir.trust-anchor.svc.cluster.local:8080/issuer' -H 'Content-Type: application/json' -d "{\"did\": \"did:web:fancy-marketplace.biz\", \"credentials\": []}"
  extraVolumeMounts:
    - mountPath: /did-material
      name: did-material
    - mountPath: /opt/bitnami/keycloak/data/import
      name: realms
  extraVolumes:
    - emptyDir: {}
      name: did-material
    - configMap:
        name: test-realm-realm
      name: realms
    - name: did-priv-key
      secret:
        secretName: fancy-marketplace.biz-tls
  issuerDid: did:web:fancy-marketplace.biz
  signingKey:
    storePath: /did-material/cert.pfx
    storePassword: "${STORE_PASS}"
    keyAlias: didPrivateKey
    keyPassword: "${STORE_PASS}"
    did: did:web:fancy-marketplace.biz
    keyAlgorithm: ES256
  extraEnvVars:
    - name: KEYCLOAK_EXTRA_ARGS
      value: "--import-realm"
    - name: KC_FEATURES
      value: "oid4vc-vci"
    # enable health endpoints
    - name: KC_HEALTH_ENABLED
      value: "true"
    # keycloak admin password
    - name: KC_ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: issuance-secret
          key: keycloak-admin
    # set in accordance with the memory requests, will result in OOM otherwise
    - name: KC_HEAP_SIZE
      value: "1024m"
    - name: "STORE_PASS"
      valueFrom:
        secretKeyRef:
          name: keystore-password
          key: password
  realm:
    frontendUrl: https://keycloak-consumer.127.0.0.1.nip.io
    import: true
    name: test-realm
