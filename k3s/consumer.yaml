            config:
              claim.name: lastName
              userAttribute: lastName
          # operator-credential is presented to the provider's data service
          # (organization_did=mp-operations.org), so the role array carries that target.
          - name: role-mapper-oc
            protocol: oid4vc
            protocolMapper: oid4vc-target-role-mapper
