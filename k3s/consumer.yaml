cert-manager:
  enabled: false

keycloak:
  resources:
    requests:
      cpu: "100m"
    limits:
      cpu: "500m"
  ingress:
    enabled: true
    annotations:
      traefik.ingress.kubernetes.io/router.tls: "true"
      cert-manager.io/cluster-issuer: "selfsigned-issuer"
      cert-manager.io/private-key-algorithm: "ECDSA"
      cert-manager.io/alt-names: "keycloak-consumer.127.0.0.1.nip.io"
      cert-manager.io/common-name: "keycloak-consumer.127.0.0.1.nip.io"
    hosts:
      - host: keycloak-consumer.127.0.0.1.nip.io
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: keycloak-consumer.127.0.0.1.nip.io-tls
        hosts:
          - keycloak-consumer.127.0.0.1.nip.io
  extraInitContainers:
    - name: prepare-keystore
      image: alpine/openssl:3.5.5
      command: ["/bin/sh", "-c"]
      args:
        - |
          openssl pkcs12 -export \
            -in /certs-did/tls.crt \
            -inkey /certs-did/tls.key \
            -certfile /certs-did/ca.crt \
            -out /did-material/cert.pfx \
            -name "didPrivateKey" \
            -passout env:STORE_PASS
          chmod 644 /did-material/cert.pfx
      env:
      - name: "STORE_PASS"
        valueFrom:
          secretKeyRef:
            name: keystore-password
            key: password
      volumeMounts:
        - name: did-material
          mountPath: /did-material
        - name: did-priv-key
          mountPath: /certs-did
    - name: register-at-tir
      image: curlimages/curl:8.18.0
      command:
        - /bin/sh
      args:
        - -ec
        - |
          #!/bin/sh
          curl -X 'POST' 'http://tir.trust-anchor.svc.cluster.local:8080/issuer' -H 'Content-Type: application/json' -d "{\"did\": \"did:web:fancy-marketplace.biz\", \"credentials\": []}"
    # download the token-status-list plugin JAR from Maven Central into the providers volume
    - name: download-token-status-plugin
      image: curlimages/curl:8.18.0
      imagePullPolicy: IfNotPresent
      command:
        - /bin/sh
      args:
        - -ec
        - |
          PLUGIN_URL="https://github.com/wistefan/token-status-link/releases/download/v0.3.7/keycloak-token-status-plugin-0.3.7.jar"
          echo "Downloading token-status-list plugin from ${PLUGIN_URL}"
          curl -sSL -o /providers/keycloak-token-status-plugin-0.3.7.jar "${PLUGIN_URL}"
          echo "Plugin downloaded successfully"
      volumeMounts:
        - name: providers
          mountPath: /providers
  extraVolumeMounts:
    - mountPath: /did-material
      name: did-material
    - mountPath: /opt/keycloak/data/import
      name: realms
    - name: providers
      mountPath: /opt/keycloak/providers
  extraVolumes:
    - emptyDir: {}
      name: did-material
    - configMap:
        name: test-realm-realm
      name: realms
    - name: did-priv-key
      secret:
        secretName: fancy-marketplace.biz-tls
    - name: providers
      emptyDir: {}
  issuerDid: did:web:fancy-marketplace.biz
  signingKey:
    storePath: /did-material/cert.pfx
    storePassword: "${STORE_PASS}"
    keyAlias: didPrivateKey
    keyPassword: "${STORE_PASS}"
    did: did:web:fancy-marketplace.biz
    keyAlgorithm: ES256
  # token-status-list plugin configuration for credential revocation
  tokenStatusList:
    enabled: true
    # in-cluster URL of the status-list-server
    serverUrl: "https://consumer-status-list.127.0.0.1.nip.io"
    # trust self-signed certificates from cert-manager's selfsigned-issuer
    tlsTrustAll: true
    # credential types that should be revocable via the token status list
    credentialTypes:
      - LegalPersonCredential
      - OperatorCredential
      - UserCredential
      - MembershipCredential
      - MarketplaceCredential
      - VerifiableCredential
  proxy:
    enabled: true
    httpsProxy: "http://squid-proxy.infra.svc.cluster.local:8888"
    noProxy: "localhost,*.cluster.local,*.svc"
    spiProxyMappings: ".*\\.127\\.0\\.0\\.1\\.nip\\.io;http://squid-proxy.infra.svc.cluster.local:8888"
  # extraEnvVars replaces the umbrella list, so KC_HEAP_SIZE has to be repeated here.
  # STORE_PASS is consumed by the realm.json key-provider config (see signingKey above).
  extraEnvVars:
    - name: KC_HEAP_SIZE
      value: "1024m"
    - name: "STORE_PASS"
      valueFrom:
        secretKeyRef:
          name: keystore-password
          key: password
  realm:
    frontendUrl: https://keycloak-consumer.127.0.0.1.nip.io
    import: true
    name: test-realm
    # -- KC main (carried by SEAMWARE 26.6.2 patched image) ties /create-credential-offer
    # to a per-user `verifiableCredentials` list — without it the endpoint answers
    # 400 invalid_credential_offer_request "User 'X' does not have verifiable credential 'Y'".
    # `issueCredentialsToUsers` auto-populates every user with the full set of VCs
    # declared in `realm.verifiableCredentials` below.
    wallets:
      issueCredentialsToUsers: true
    attributes:
      issuerDid: "did:web:fancy-marketplace.biz"
    # -- VCs migrated to the post-KC 26.4 OID4VC model: each entry renders one
    # ClientScope with protocol "oid4vc". Attributes are attached to the scope
    # itself (auto-prefixed with `vc.`); protocolMappers belong to the scope
    # (no more legacy `supportedCredentialTypes` filtering — every mapper
    # listed under a VC applies only to that VC's scope).
    verifiableCredentials:
      user-sd:
        attributes:
          format: "dc+sd-jwt"
          verifiable_credential_type: "LegalPersonCredential"
          credential_signing_alg: "ES256"
          credential_build_config.token_jws_type: "dc+sd-jwt"
          # KC 26.6.2 SD-JWT red list (iss, iat, nbf, exp, cnf, vct, status) MUST
          # stay disclosed; including them avoids `UndisclosedClaims contains red
          # listed claim names`. roles/email are the domain-specific visible claims.
          credential_build_config.sd_jwt.visible_claims: "iss,iat,nbf,exp,cnf,vct,status,roles,email"
          # Must be >0 to prevent SdJwt.Builder.build() from regenerating the
          # payload with default decoys, which wipes the cnf claim added by
          # addKeyBinding() after initial credential body construction.
          sd_jwt.number_of_decoys: "5"
          binding_required: "false"
          binding_required_proof_types: "jwt"
          cryptographic_binding_methods_supported: "jwk"
        protocolMappers:
          - name: context-mapper-usd
            protocol: oid4vc
            protocolMapper: oid4vc-context-mapper
            config:
              context: https://www.w3.org/2018/credentials/v1
          - name: email-mapper-usd
            protocol: oid4vc
            protocolMapper: oid4vc-user-attribute-mapper
            config:
              claim.name: email
              userAttribute: email
          - name: firstName-mapper-usd
            protocol: oid4vc
            protocolMapper: oid4vc-user-attribute-mapper
            config:
              claim.name: firstName
              userAttribute: firstName
          - name: lastName-mapper-usd
            protocol: oid4vc
            protocolMapper: oid4vc-user-attribute-mapper
            config:
              claim.name: lastName
              userAttribute: lastName
          # Single target-role-mapper per VC (KC 26.4+ does not allow two mappers
          # with the same claim.name in the same scope). user-sd is presented to
          # the consumer-local marketplace (organization_did=fancy-marketplace.biz),
          # so the role array carries that target.
          - name: role-mapper-marketplace-usd
            protocol: oid4vc
            protocolMapper: oid4vc-target-role-mapper
            config:
              claim.name: roles
              clientId: did:web:fancy-marketplace.biz
          - name: usd-list-claim-mapper
            protocol: oid4vc
            protocolMapper: oid4vc-status-list-claim-mapper
      user-credential:
        attributes:
          format: "jwt_vc_json"
          verifiable_credential_type: "UserCredential"
          credential_signing_alg: "ES256"
          credential_build_config.token_jws_type: "JWT"
        protocolMappers:
          - name: context-mapper-uc
            protocol: oid4vc
            protocolMapper: oid4vc-context-mapper
            config:
              context: https://www.w3.org/2018/credentials/v1
          - name: email-mapper-uc
            protocol: oid4vc
            protocolMapper: oid4vc-user-attribute-mapper
            config:
              claim.name: email
              userAttribute: email
          - name: firstName-mapper-uc
            protocol: oid4vc
            protocolMapper: oid4vc-user-attribute-mapper
            config:
              claim.name: firstName
              userAttribute: firstName
          - name: lastName-mapper-uc
            protocol: oid4vc
            protocolMapper: oid4vc-user-attribute-mapper
            config:
              claim.name: lastName
              userAttribute: lastName
          - name: role-mapper-marketplace-mp
            protocol: oid4vc
            protocolMapper: oid4vc-target-role-mapper
            config:
              claim.name: roles
              clientId: did:web:mp-operations.org
          - name: mp-list-claim-mapper
            protocol: oid4vc
            protocolMapper: oid4vc-status-list-claim-mapper
            config:
              metadata.claim.paths: firstName, lastName
      legal-person-credential:
        attributes:
          format: "jwt_vc_json"
          verifiable_credential_type: "LegalPersonCredential"
          credential_signing_alg: "ES256"
          credential_build_config.token_jws_type: "JWT"
        protocolMappers:
          - name: context-mapper-lpc
            protocol: oid4vc
            protocolMapper: oid4vc-context-mapper
            config:
              context: https://www.w3.org/2018/credentials/v1
          - name: email-mapper-lpc
            protocol: oid4vc
            protocolMapper: oid4vc-user-attribute-mapper
            config:
              claim.name: email
              userAttribute: email
          - name: firstName-mapper-lpc
            protocol: oid4vc
            protocolMapper: oid4vc-user-attribute-mapper
            config:
              claim.name: firstName
              userAttribute: firstName
          - name: lastName-mapper-lpc
            protocol: oid4vc
            protocolMapper: oid4vc-user-attribute-mapper
            config:
              claim.name: lastName
              userAttribute: lastName
          - name: subject-mapper-lpc
            protocol: oid4vc
            protocolMapper: oid4vc-static-claim-mapper
            config:
              claim.name: subject
              staticValue: did:key:zDnaeiVpxCT7ARwqLndbWiCeGG2YZXvLfWFs1cGPgKUe8GPLe
          - name: street-mapper-lpc
            protocol: oid4vc
            protocolMapper: oid4vc-static-claim-mapper
            config:
              claim.name: street
              staticValue: Main Street
          - name: streetNumber-mapper-lpc
            protocol: oid4vc
            protocolMapper: oid4vc-static-claim-mapper
            config:
              claim.name: streetNumber
              staticValue: "10"
          - name: city-mapper-lpc
            protocol: oid4vc
            protocolMapper: oid4vc-static-claim-mapper
            config:
              claim.name: city
              staticValue: Berlin
          - name: region-mapper-lpc
            protocol: oid4vc
            protocolMapper: oid4vc-static-claim-mapper
            config:
              claim.name: region
              staticValue: Berlin
          - name: country-mapper-lpc
            protocol: oid4vc
            protocolMapper: oid4vc-static-claim-mapper
            config:
              claim.name: country
              staticValue: DE
          - name: zipcode-mapper-lpc
            protocol: oid4vc
            protocolMapper: oid4vc-static-claim-mapper
            config:
              claim.name: zipcode
              staticValue: "10115"
          - name: role-mapper-marketplace-lpc
            protocol: oid4vc
            protocolMapper: oid4vc-target-role-mapper
            config:
              claim.name: roles
              clientId: did:web:mp-operations.org
          - name: lpc-list-claim-mapper
            protocol: oid4vc
            protocolMapper: oid4vc-status-list-claim-mapper
      membership-credential:
        attributes:
          format: "jwt_vc_json"
          verifiable_credential_type: "MembershipCredential"
          credential_signing_alg: "ES256"
          credential_build_config.token_jws_type: "JWT"
        protocolMappers:
          - name: context-mapper-mc
            protocol: oid4vc
            protocolMapper: oid4vc-context-mapper
            config:
              context: https://www.w3.org/2018/credentials/v1
          - name: id-mapper-mc
            protocol: oid4vc
            protocolMapper: oid4vc-static-claim-mapper
            config:
              claim.name: id
              staticValue: did:web:fancy-marketplace.biz
          - name: membership-type-mapper-mc
            protocol: oid4vc
            protocolMapper: oid4vc-static-claim-mapper
            config:
              claim.name: membershipType
              staticValue: FullMember
          - name: mc-list-claim-mapper
            protocol: oid4vc
            protocolMapper: oid4vc-status-list-claim-mapper
      marketplace-credential:
        attributes:
          format: "jwt_vc_json"
          verifiable_credential_type: "MarketplaceCredential"
          credential_signing_alg: "ES256"
          credential_build_config.token_jws_type: "JWT"
        protocolMappers:
          - name: context-mapper-mpc
            protocol: oid4vc
            protocolMapper: oid4vc-context-mapper
            config:
              context: https://www.w3.org/2018/credentials/v1
          - name: email-mapper-mpc
            protocol: oid4vc
            protocolMapper: oid4vc-user-attribute-mapper
            config:
              claim.name: email
              userAttribute: email
          - name: firstName-mapper-mpc
            protocol: oid4vc
            protocolMapper: oid4vc-user-attribute-mapper
            config:
              claim.name: firstName
              userAttribute: firstName
          - name: lastName-mapper-mpc
            protocol: oid4vc
            protocolMapper: oid4vc-user-attribute-mapper
            config:
              claim.name: lastName
              userAttribute: lastName
          - name: role-mapper-marketplace-mpc
            protocol: oid4vc
            protocolMapper: oid4vc-target-role-mapper
            config:
              claim.name: roles
              clientId: did:web:fancy-marketplace.biz
          - name: mpc-list-claim-mapper
            protocol: oid4vc
            protocolMapper: oid4vc-status-list-claim-mapper
      verifiable-credential:
        attributes:
          format: "dc+sd-jwt"
          verifiable_credential_type: "VerifiableCredential"
        protocolMappers:
          - name: context-mapper-vc
            protocol: oid4vc
            protocolMapper: oid4vc-context-mapper
            config:
              context: https://www.w3.org/2018/credentials/v1
          - name: email-mapper-vc
            protocol: oid4vc
            protocolMapper: oid4vc-user-attribute-mapper
            config:
              claim.name: email
              userAttribute: email
          - name: firstName-mapper-vc
            protocol: oid4vc
            protocolMapper: oid4vc-user-attribute-mapper
            config:
              claim.name: firstName
              userAttribute: firstName
          - name: role-mapper-marketplace-vc
            protocol: oid4vc
            protocolMapper: oid4vc-target-role-mapper
            config:
              claim.name: roles
              clientId: did:web:fancy-marketplace.biz
          - name: vc-list-claim-mapper
            protocol: oid4vc
            protocolMapper: oid4vc-status-list-claim-mapper
      operator-credential:
        attributes:
          format: "jwt_vc_json"
          verifiable_credential_type: "OperatorCredential"
          credential_signing_alg: "ES256"
          credential_build_config.token_jws_type: "JWT"
        protocolMappers:
          - name: context-mapper-oc
            protocol: oid4vc
            protocolMapper: oid4vc-context-mapper
            config:
              context: https://www.w3.org/2018/credentials/v1
          - name: email-mapper-oc
            protocol: oid4vc
            protocolMapper: oid4vc-user-attribute-mapper
            config:
              claim.name: email
              userAttribute: email
          - name: firstName-mapper-oc
            protocol: oid4vc
            protocolMapper: oid4vc-user-attribute-mapper
            config:
