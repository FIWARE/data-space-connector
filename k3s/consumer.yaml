did:
  enabled: true
  config:
    server:
      serverPort: "3000"
      didType: "web"
      hostUrl: "http://fancy-marketplace.biz"
      outputFormat: "json_jwk"
      keystorePasswordSecretName: "did-keystore"
      keystorePasswordSecretKey: "password"
    generateKey:
      enabled: false
    provideKeystore:
      enabled: true
      keystoreSecretName: "did-keystore"
      keystoreSecretKey: "keystore-did.pfx"
      keyType: "EC"
  ingress:
    enabled: true
    className: ""
    annotations:
      traefik.ingress.kubernetes.io/service.passhostheader: "true"
      traefik.ingress.kubernetes.io/router.tls: "true"
    hosts:
      - host: fancy-marketplace.biz
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls:
      - secretName: tls-secret
        hosts:
          - fancy-marketplace.biz

trusted-issuers-list:
  enabled: false

tm-forum-api:
  enabled: false
  
odrl-pap:
  enabled: false

credentials-config-service:
  enabled: false
vcverifier:
  enabled: false
  
