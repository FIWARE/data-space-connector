cert-manager:
  enabled: false

scorpio:
  enabled: false
tm-forum-api:
  enabled: false
contract-management:
  enabled: false
decentralizedIam:
  enabled: true
  vcAuthentication:
    postgres-operator:
      enabled: false
    managedPostgres:
      enabled: true
      config:
        volume:
          storageClass: "local-path"
    vcverifier:
      enabled: false
    credentials-config-service:
      enabled: false
    trusted-issuers-list:
      enabled: false
  odrlAuthorization:
    odrl-pap:
      enabled: false
    apisix:
      enabled: false
keycloak:
  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: "selfsigned-issuer"
      cert-manager.io/private-key-algorithm: "ECDSA"
      cert-manager.io/common-name: "keycloak-consumer.127.0.0.1.nip.io"
    hosts:
      - host: keycloak-consumer.127.0.0.1.nip.io
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: keycloak-consumer.127.0.0.1.nip.io-tls
        hosts:
          - keycloak-consumer.127.0.0.1.nip.io
  # NOTE (10.x migration): the previous overlay overrode `command`/`args`
  # to source /did-material/did.env (generated by the did-helper) and then
  # invoke /opt/bitnami/scripts/keycloak/{entrypoint,run}.sh. Those scripts
  # do not exist on the upstream Quarkus image used by the CloudPirates
  # chart, and the chart does not honour top-level `command`/`args` overrides
  # anyway (it builds them from chart values). The gaia-x flow may need to
  # re-architect how it propagates the runtime DID into Keycloak — e.g. via
  # a Secret/ConfigMap referenced from `extraEnvVars` or `extraEnvVarsSecret`,
  # populated by the did-helper. This overlay is not exercised by the
  # current IT suite; validate the gaia-x runtime before relying on it.
  extraInitContainers:
    - name: prepare-keystore
      image: alpine/openssl:3.5.5
      command: ["/bin/sh", "-c"]
      args:
        - |
          openssl pkcs12 -export \
            -in /certs-did/tls.crt \
            -inkey /certs-did/tls.key \
            -certfile /certs-did/ca.crt \
            -out /did-material/cert.pfx \
            -name "didPrivateKey" \
            -passout env:STORE_PASS
          chmod 644 /did-material/cert.pfx
      env:
      - name: "STORE_PASS"
        valueFrom:
          secretKeyRef:
            name: keystore-password
            key: password
      volumeMounts:
        - name: did-material
          mountPath: /did-material
        - name: did-priv-key
          mountPath: /certs-did
    - name: register-at-tir
      image: curlimages/curl:8.18.0
      command:
        - /bin/sh
      args:
        - -ec
        - |
          #!/bin/sh
          curl -X 'POST' 'http://tir.trust-anchor.svc.cluster.local:8080/issuer' -H 'Content-Type: application/json' -d "{\"did\": \"did:web:fancy-marketplace.biz\", \"credentials\": []}"
      volumeMounts:
        - name: did-material
          mountPath: /did-material
    - name: register-at-til
      image: quay.io/curl/curl:8.1.2
      command:
        - /bin/sh
      args:
        - -ec
        - |
          #!/bin/sh
          /bin/init.sh
      volumeMounts:
        - name: consumer-til-registration
          mountPath: /bin/init.sh
          subPath: init.sh
        - name: did-material
          mountPath: /did-material
  extraVolumeMounts:
    - name: did-material
      mountPath: /did-material
    - name: did-material
      mountPath: "/etc/env"
      readOnly: true
    - name: did-priv-key
      mountPath: "/keys"
    - name: realms
      mountPath: /opt/keycloak/data/import
  extraVolumes:
    - name: did-material
      emptyDir: {}
    - name: realms
      configMap:
        name: test-realm-realm
    - name: consumer-til-registration
      configMap:
        name: consumer-til-registration
        defaultMode: 0755
    - name: did-priv-key
      secret:
        secretName: fancy-marketplace.biz-tls
  # KEYCLOAK_EXTRA_ARGS, KC_FEATURES and KC_ADMIN_PASSWORD are no longer needed:
  # `--import-realm` is auto-added when realm.import: true, features come from
  # `keycloak.features.enabled`, and the admin password is wired through
  # `keycloak.keycloak.existingSecret`.
  extraEnvVars:
    # set in accordance with the memory requests, will result in OOM otherwise
    - name: KC_HEAP_SIZE
      value: "1024m"
    - name: "STORE_PASS"
      valueFrom:
        secretKeyRef:
          name: keystore-password
          key: password
  signingKey:
    storePath: /did-material/cert.pfx
    storePassword: "${STORE_PASS}"
    keyAlias: didPrivateKey
    keyPassword: "${STORE_PASS}"
    did: did:web:fancy-marketplace.biz
    keyAlgorithm: ES256
  realm:
    frontendUrl: https://keycloak-consumer.127.0.0.1.nip.io:8080
    import: true
    name: test-realm
    clientRoles: |
      "${CLIENT_DID}": [
        {
          "name": "READER",
          "description": "Is allowed to see offers etc.",
          "clientRole": true
        },
        {
          "name": "OPERATOR",
          "description": "Is allowed to operate clusters.",
          "clientRole": true
        }
      ]
    users: |
      {
        "username": "test-user",
        "enabled": true,
        "email": "test@user.org",
        "firstName": "Test",
        "lastName": "Reader",
        "credentials": [
          {
            "type": "password",
            "value": "test"
          }
        ],
        "clientRoles": {
          "${CLIENT_DID}": [
            "OPERATOR"
          ],
          "account": [
            "view-profile",
            "manage-account"
          ]
        },
        "groups": [
        ]
      }
    # KC 26.4+: clients keep `protocol: openid-connect` and opt into VC issuance
    # via the `oid4vci.enabled` attribute. Per-VC mappers and credential metadata
    # move to the per-VC ClientScopes (rendered from `realm.verifiableCredentials`),
    # which `dsc.defaultClients` auto-extends into the client's optionalClientScopes.
    clients: |
      {
        "clientId": "${CLIENT_DID}",
        "enabled": true,
        "description": "Client to connect test.org",
        "surrogateAuthRequired": false,
        "alwaysDisplayInConsole": false,
        "clientAuthenticatorType": "client-secret",
        "defaultRoles": [],
        "redirectUris": [],
        "webOrigins": [],
        "notBefore": 0,
        "bearerOnly": false,
        "consentRequired": false,
        "standardFlowEnabled": true,
        "implicitFlowEnabled": false,
        "directAccessGrantsEnabled": false,
        "serviceAccountsEnabled": false,
        "publicClient": false,
        "frontchannelLogout": false,
        "protocol": "openid-connect",
        "attributes": {
          "client.secret.creation.time": "1675260539",
          "oid4vci.enabled": "true"
        },
        "protocolMappers": [],
        "authenticationFlowBindingOverrides": {},
        "fullScopeAllowed": true,
        "nodeReRegistrationTimeout": -1,
        "defaultClientScopes": [],
        "optionalClientScopes": []
      }
    verifiableCredentials:
      user-credential:
        attributes:
          format: "jwt_vc_json"
          verifiable_credential_type: "UserCredential"
          credential_signing_alg: "ES256"
          credential_build_config.token_jws_type: "JWT"
        protocolMappers:
          - name: context-mapper-uc
            protocol: oid4vc
            protocolMapper: oid4vc-context-mapper
            config:
              context: https://www.w3.org/2018/credentials/v1
          - name: email-mapper-uc
            protocol: oid4vc
            protocolMapper: oid4vc-user-attribute-mapper
            config:
              claim.name: email
              userAttribute: email
          - name: firstName-mapper-uc
            protocol: oid4vc
            protocolMapper: oid4vc-user-attribute-mapper
            config:
              claim.name: firstName
              userAttribute: firstName
          - name: lastName-mapper-uc
            protocol: oid4vc
            protocolMapper: oid4vc-user-attribute-mapper
            config:
              claim.name: lastName
              userAttribute: lastName
          - name: role-mapper-uc
            protocol: oid4vc
            protocolMapper: oid4vc-target-role-mapper
            config:
              claim.name: roles
              clientId: "${CLIENT_DID}"
      operator-credential:
        attributes:
          format: "jwt_vc_json"
          verifiable_credential_type: "OperatorCredential"
          credential_signing_alg: "ES256"
          credential_build_config.token_jws_type: "JWT"
        protocolMappers:
          - name: context-mapper-oc
            protocol: oid4vc
            protocolMapper: oid4vc-context-mapper
            config:
              context: https://www.w3.org/2018/credentials/v1
          - name: email-mapper-oc
            protocol: oid4vc
            protocolMapper: oid4vc-user-attribute-mapper
            config:
              claim.name: email
              userAttribute: email
          - name: firstName-mapper-oc
            protocol: oid4vc
            protocolMapper: oid4vc-user-attribute-mapper
            config:
              claim.name: firstName
              userAttribute: firstName
          - name: lastName-mapper-oc
            protocol: oid4vc
            protocolMapper: oid4vc-user-attribute-mapper
            config:
              claim.name: lastName
              userAttribute: lastName
          - name: subject-mapper-oc
            protocol: oid4vc
            protocolMapper: oid4vc-static-claim-mapper
            config:
              claim.name: subject
              staticValue: did:key:zDnaeiVpxCT7ARwqLndbWiCeGG2YZXvLfWFs1cGPgKUe8GPLe
          - name: role-mapper-oc
            protocol: oid4vc
            protocolMapper: oid4vc-target-role-mapper
            config:
              claim.name: roles
              clientId: "${CLIENT_DID}"
      verifiable-credential:
        attributes:
          format: "jwt_vc_json"
          verifiable_credential_type: "VerifiableCredential"
          credential_signing_alg: "ES256"
          credential_build_config.token_jws_type: "JWT"
        protocolMappers:
          - name: context-mapper-vc
            protocol: oid4vc
            protocolMapper: oid4vc-context-mapper
            config:
              context: https://www.w3.org/2018/credentials/v1
          - name: email-mapper-vc
            protocol: oid4vc
            protocolMapper: oid4vc-user-attribute-mapper
            config:
              claim.name: email
              userAttribute: email
          - name: firstName-mapper-vc
            protocol: oid4vc
            protocolMapper: oid4vc-user-attribute-mapper
            config:
              claim.name: firstName
              userAttribute: firstName
registration:
  enabled: true
  configMap: consumer-til-registration
  til: http://trusted-issuers-list.provider.svc.cluster.local:8080
  did: did:web:fancy-marketplace.biz
  credentialTypes:
    - UserCredential
did:
  enabled: true
  config:
    server:
      hostUrl: "http://fancy-marketplace.biz"
      certPath: "/certs/tls.crt"
    generateKey:
      enabled: false
    provideKeystore:
      enabled: false
  volumes:
    - name: certs
      secret:
        secretName: fancy-marketplace.biz-tls
        items:
          - key: tls.crt
            path: tls.crt
  volumeMounts:
    - name: certs
      mountPath: /certs
  ingress:
    enabled: true
    className: ""
    annotations:
      traefik.ingress.kubernetes.io/service.passhostheader: "true"
      traefik.ingress.kubernetes.io/router.tls: "true"
      cert-manager.io/cluster-issuer: "selfsigned-issuer"
      cert-manager.io/private-key-algorithm: "ECDSA"
      cert-manager.io/common-name: "fancy-marketplace.biz"
    hosts:
      - host: fancy-marketplace.biz
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls:
      - secretName: fancy-marketplace.biz-tls
        hosts:
          - fancy-marketplace.biz
