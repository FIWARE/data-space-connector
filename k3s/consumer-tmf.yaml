## configuration for providing the tmforum functionalities and integrations to support the central marketplace and edc related features

# tmf as marketplace backend
tm-forum-api:
  enabled: true
  allInOne:
    enabled: true
  apiProxy:
    enabled: false
  registration:
    enabled: false
  ingress:
    annotations:
      cert-manager.io/cluster-issuer: "selfsigned-issuer"
      cert-manager.io/private-key-algorithm: "ECDSA"
      cert-manager.io/common-name: "consumer-tmf.127.0.0.1.nip.io"
      cert-manager.io/alt-names: "consumer-tmf.127.0.0.1.nip.io"
      traefik.ingress.kubernetes.io/router.tls: "true"
    enabled: true
    hosts:
      - host: consumer-tmf.127.0.0.1.nip.io
        paths:
          - /

# scorpio as tmf backend, no public endpoint required
scorpio:
  enabled: true
  resources:
    limits:
      cpu: "500m"
      memory: 1Gi
    requests:
      cpu: "100m"
      memory: 128Mi

postgis:
  enabled: true
  primary:
    resourcesPreset: none
    persistence:
      enabled: false
  readReplicas:
    persistence:
      enabled: false


# contract management for distributing the buy events
contract-management:
  enabled: true
  did: did:web:fancy-marketplace.biz
  enableCentralMarketplace: true
  # we only support externally offered services, thus not local policies or til-entries required
  enableOdrlPap: false
  enableTrustedIssuersList: false
  # no dsp required
  enableRainbow: false
  # authentication inf
  oid4vp:
    enabled: true
    credentialsFolder: /credential-repo
    trustAnchors:
      - /etc/ssl/cacert.pem
    holder:
      holderId: did:web:fancy-marketplace.biz
      keyType: EC
      keyPath: /signing-key/tls.key
      signatureAlgorithm: ECDH-ES
    proxyConfig:
      enabled: true
      proxyHost: squid-proxy.infra.svc.cluster.local
      proxyPort: 8888
  # All outbound Micronaut HTTP client calls go through squid so that
  # *.127.0.0.1.nip.io ingress hosts (e.g. the provider's contract-management)
  # are reachable. squid forwards to traefik-loadbalancer-in on port 80,
  # and traefik routes by Host header — so in-cluster TMF calls must also use
  # their ingress hostname (consumer-tmf.127.0.0.1.nip.io) instead of the
  # ClusterIP service, otherwise the proxied request won't match any ingress.
  additionalEnvVars:
    - name: MICRONAUT_HTTP_CLIENT_PROXY_TYPE
      value: "HTTP"
    - name: MICRONAUT_HTTP_CLIENT_PROXY_ADDRESS
      value: "squid-proxy.infra.svc.cluster.local:8888"
    - name: LOGGER_LEVELS_ROOT
      value: DEBUG
  services:
    ## Config for Trusted Issuers List
    trusted-issuers-list:
      ## URL of the Trusted Issuers List Service
      url: http://trusted-issuers-list.consumer.svc.cluster.local:8080

    ## Config for the TM Forum Service hosting the APIs
    product-order:
      ## URL of the TM Forum Service hosting the Product Ordering API
      url: http://tm-forum-api-svc.consumer.svc.cluster.local:8080

    party:
      ## URL of the TM Forum Service hosting the Party API
      url: http://tm-forum-api-svc.consumer.svc.cluster.local:8080

    product-catalog:
      ## URL of the TM Forum Service hosting the Product Catalog API
      url: http://tm-forum-api-svc.consumer.svc.cluster.local:8080

    service-catalog:
      ## URL of the TM Forum Service hosting the Service Catalog API
      url: http://tm-forum-api-svc.consumer.svc.cluster.local:8080

    tmforum-agreement-api:
      ## URL of the TM Forum Service hosting the Agreement API
      url: http://tm-forum-api-svc.consumer.svc.cluster.local:8080

    quote:
      ## URL for TM Forum Service hosting the Quote API
      url: http://tm-forum-api-svc.consumer.svc.cluster.local:8080

  deployment:
    # init containers to be used for the local demo
    initContainers:
      - name: convert-signing-key
        image: alpine/openssl:3.5.5
        command: ["sh", "-c", "openssl pkcs8 -topk8 -nocrypt -in /signing-key-raw/tls.key -out /signing-key/tls.key && chmod 644 /signing-key/tls.key"]
        volumeMounts:
          - name: signing-key-raw
            mountPath: /signing-key-raw
          - name: signing-key
            mountPath: /signing-key
      # helper container to wait for keycloak present in local deployments, to avoid cascading crash-loops
      - name: wait-for-keycloak
        image: curlimages/curl:8.6.0
        command:
          - sh
          - -c
          - |
            set -e
            echo "Waiting for Keycloak to become ready..."

            until curl -sf http://consumer-keycloak:9000/health/ready > /dev/null; do
              echo "Keycloak not ready yet, retrying..."
              sleep 5
            done
            echo "Keycloak is ready."
      # load the self-generated root ca into the java truststore
      - name: load-certs
        image: "quay.io/seamware/fdsc-edc-controlplane-oid4vc:0.1.1"
        command: ["/bin/sh", "-c", "/bin/import-ca.sh /certs-folder /root-ca/cacert.pem /opt/java/openjdk/lib/security/cacerts"]
        volumeMounts:
          - name: ca-certs-script
            mountPath: /bin/import-ca.sh
            subPath: import-ca.sh
          - name: cacerts
            mountPath: /certs-folder/
          - name: root-ca
            mountPath: /root-ca/cacert.pem
            subPath: ca.crt
      # get a credential to be used by the contract-management
      - name: get-credential
        image: quay.io/curl/curl:8.1.2
        command: ["/bin/sh", "-c", "/bin/get-credential.sh /credential-repo"]
        volumeMounts:
          - name: credentials-script
            mountPath: /bin/get-credential.sh
            subPath: get-credential.sh
          - name: credential-repo
            mountPath: /credential-repo
    additionalVolumes:
      - name: signing-key
        emptyDir: {}
      - name: signing-key-raw
        secret:
          secretName: fancy-marketplace.biz-tls
          defaultMode: 0755
      - name: credentials-script
        configMap:
          name: credentials-script
          defaultMode: 0755
      - name: ca-certs-script
        configMap:
          name: ca-certs-script
          defaultMode: 0755
      - name: credential-repo
        emptyDir: {}
      - name: root-ca
        secret:
          secretName: fancy-marketplace.biz-tls
          items:
            - key: ca.crt
              path: ca.crt
      - name: cacerts
        emptyDir: {}
    additionalVolumeMounts:
      - name: credential-repo
        mountPath: /credential-repo
      - name: signing-key
        mountPath: /signing-key
      # add the self generated root ca to the system truststore
      - name: root-ca
        mountPath: /etc/ssl/cacert.pem
        subPath: ca.crt
      - name: cacerts
        mountPath: /opt/java/openjdk/lib/security/cacerts
        subPath: cacerts
      # Red Hat JDK uses a different truststore path                                                                                                                                               
      - name: cacerts                                                                                                                                                                              
        mountPath: /etc/pki/ca-trust/extracted/java/cacerts                                                                                                                                        
        subPath: cacerts        
  notification:
    enabled: true
    host: contract-management

