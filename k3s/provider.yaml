        value: "0"
      - name: HTTPS_PROXY
        value: "http://squid-proxy.infra.svc.cluster.local:8888"
      - name: BAE_LP_SIOP_CLIENT_ID
        value: did:web:mp-operations.org
      - name: BAE_LP_SIOP_PRIVATE_KEY_PEM
        value: /certs-did/tls.key
      - name: DATASPACE_ENABLED
        value: "true"
    extraVolumeMounts:
