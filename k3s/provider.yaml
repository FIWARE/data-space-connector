        mountPath: /certs-did
    extraContainerVolumes:
      - name: did-priv-key
        secret:
          secretName: mp-operations.org-tls
keycloak:
  resources:
    requests:
      cpu: "100m"
    limits:
      cpu: "500m"
  ingress:
    enabled: true
    hostname: keycloak-provider.127.0.0.1.nip.io
    annotations:
      traefik.ingress.kubernetes.io/router.tls: "true"
      cert-manager.io/cluster-issuer: "selfsigned-issuer"
      cert-manager.io/private-key-algorithm: "ECDSA"
      cert-manager.io/common-name: "keycloak-provider.127.0.0.1.nip.io"
    pathType: Prefix
    tls: true
    extraTls:
      - hosts:
          - keycloak-provider.127.0.0.1.nip.io
        secretName: keycloak-provider.127.0.0.1.nip.io-tls
  initContainers:
    - name: prepare-keystore
      image: alpine/openssl:3.5.5
      command: ["/bin/sh", "-c"]
      args:
        - |
          openssl pkcs12 -export \
            -in /certs-did/tls.crt \
            -inkey /certs-did/tls.key \
            -certfile /certs-did/ca.crt \
            -out /did-material/cert.pfx \
            -name "didPrivateKey" \
            -passout env:STORE_PASS
          chmod 644 /did-material/cert.pfx
      env:
      - name: "STORE_PASS"
        valueFrom:
          secretKeyRef:
            name: keystore-password
            key: password
      volumeMounts:
        - name: did-material
          mountPath: /did-material
        - name: did-priv-key
          mountPath: /certs-did
  extraVolumeMounts:
    - mountPath: /did-material
      name: did-material
    - mountPath: /opt/bitnami/keycloak/data/import
      name: realms
  extraVolumes:
    - emptyDir: {}
      name: did-material
    - configMap:
        name: test-realm-realm
      name: realms
    - name: did-priv-key
      secret:
        secretName: mp-operations.org-tls
  issuerDid: did:web:mp-operations.org
  signingKey:
    storePath: /did-material/cert.pfx
    storePassword: "${STORE_PASS}"
    keyAlias: didPrivateKey
    keyPassword: "${STORE_PASS}"
    did: did:web:mp-operations.org
    keyAlgorithm: ES256
  extraEnvVars:
    - name: KEYCLOAK_EXTRA_ARGS
      value: "--import-realm"
    - name: KC_FEATURES
      value: "oid4vc-vci"
    # keycloak admin password
    - name: KC_ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: issuance-secret
          key: keycloak-admin
    # set in accordance with the memory requests, will result in OOM otherwise
    - name: KC_HEAP_SIZE
      value: "1024m"
    - name: "STORE_PASS"
      valueFrom:
        secretKeyRef:
          name: keystore-password
          key: password
  realm:
    frontendUrl: https://keycloak-provider.127.0.0.1.nip.io
    import: true
    name: test-realm
    attributes: |
      "vc.user-sd.credential_signing_alg_values_supported": "ES256",
      "vc.user-sd.credential_build_config.signing_algorithm": "ES256",
      "vc.user-sd.credential_build_config.token_jws_type": "vc+sd-jwt",
      "vc.user-sd.credential_build_config.proof_types_supported": "{\"jwt\":{\"proof_signing_alg_values_supported\":[\"ES256\"]}}",
      "vc.user-sd.format": "vc+sd-jwt",
      "vc.user-sd.scope": "LegalPersonCredential",
      "vc.user-sd.vct": "LegalPersonCredential",
      "vc.user-sd.credential_build_config.visible_claims": "roles,email",
      "vc.user-sd.credential_build_config.decoys": "3",
      "vc.user-credential.credential_signing_alg_values_supported": "ES256",
      "vc.user-credential.credential_build_config.signing_algorithm": "ES256",
      "vc.user-credential.credential_build_config.token_jws_type": "JWT",
      "vc.user-credential.credential_build_config.proof_types_supported": "{\"jwt\":{\"proof_signing_alg_values_supported\":[\"ES256\"]}}",
      "vc.user-credential.format": "jwt_vc",
      "vc.user-credential.scope": "LegalPersonCredential",
      "vc.user-credential.vct": "LegalPersonCredential",
      "vc.membership-credential.credential_signing_alg_values_supported": "ES256",
      "vc.membership-credential.credential_build_config.signing_algorithm": "ES256",
      "vc.membership-credential.credential_build_config.token_jws_type": "JWT",
      "vc.membership-credential.format": "jwt_vc",
      "vc.membership-credential.scope": "MembershipCredential",
      "vc.membership-credential.vct": "MembershipCredential",
      "vc.verifiable-credential.format": "vc+sd-jwt",
      "vc.verifiable-credential.scope": "VerifiableCredential",
      "vc.verifiable-credential.vct": "VerifiableCredential",
      "vc.operator-credential.format": "vc+sd-jwt",
      "vc.operator-credential.scope": "OperatorCredential",
      "vc.operator-credential.vct": "OperatorCredential"
    clientRoles:
      "did:web:mp-operations.org": 
