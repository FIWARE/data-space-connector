decentralizedIam:
  enabled: true
  vcAuthentication:
    postgres-operator:
      enabled: false
    managedPostgres:
      enabled: true
      config:
        volume:
          storageClass: "local-path"
        users:
          ngb:
            - createdb
          rainbow:
            - createdb
        databases:
          ngb: ngb
          rainbow: rainbow
        preparedDatabases:
          ngb:
            extensions:
              postgis: public
    trusted-issuers-list:
      deployment:
        image:
          tag: "0.8.0" # ToDo: remove when updating dependencies
        resources:
          limits:
            cpu: 300m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
      # only open for clean up in the tests
      ingress:
        til:
          enabled: true
          hosts:
            - host: til-provider.127.0.0.1.nip.io
              paths:
                - /
    credentials-config-service:
      ingress:
        enabled: true
        hosts:
          - host: provider-ccs.127.0.0.1.nip.io
            paths:
              - "/"
      additionalEnvVars:
        - name: FLYWAY_DATASOURCES_DEFAULT_LOCATIONS
          value: classpath:db/migration/common,classpath:db/migration/mysql
      registration:
        enabled: true
        services:
          - id: tpp-service
            defaultOidcScope: "operator"
            authorizationType: "DEEPLINK"
            oidcScopes:
              "operator":
                credentials:
                  - type: OperatorCredential
                    trustedParticipantsLists:
                      - http://tir.127.0.0.1.nip.io
                    trustedIssuersLists:
                      - http://trusted-issuers-list:8080
                    jwtInclusion:
                      enabled: true
                      fullInclusion: true
          - id: bae
            defaultOidcScope: "openid learcredential"
            authorizationType: "FRONTEND_V2"
            oidcScopes:
              "openid learcredential":
                credentials:
                  - type: LegalPersonCredential
                    trustedParticipantsLists:
                      - http://tir.127.0.0.1.nip.io
                    trustedIssuersLists:
                      - http://trusted-issuers-list:8080
                    jwtInclusion:
                      enabled: true
                      fullInclusion: true
                dcql:
                  credentials:
                    - id: legal-person-query
                      format: "vc+sd-jwt"
                      multiple: false
                      claims:
                        - id: name-claim
                          path:
                            - firstName
                        - id: roles-claim
                          path:
                            - roles
                      meta:
                        vct_values:
                          - LegalPersonCredential
          - id: data-service
            defaultOidcScope: "default"
            authorizationType: "DEEPLINK"
            oidcScopes:
              "default":
                credentials:
                  - type: UserCredential
                    trustedParticipantsLists:
                      - http://tir.127.0.0.1.nip.io
                    trustedIssuersLists:
                      - http://trusted-issuers-list:8080
                    jwtInclusion:
                      enabled: true
                      fullInclusion: true
                dcql:
                  credentials:
                    - id: user-query
                      format: "jwt_vc_json"
                      multiple: true
                      meta:
                        type_values:
                          - UserCredential
              "legal":
                credentials:
                  - type: LegalPersonCredential
                    trustedParticipantsLists:
                      - http://tir.127.0.0.1.nip.io
                    trustedIssuersLists:
                      - http://trusted-issuers-list:8080
                    jwtInclusion:
                      enabled: true
                      fullInclusion: true
                dcql:
                  credentials:
                    - id: legal-person-query
                      format: "vc+sd-jwt"
                      multiple: false
                      claims:
                        - id: name-claim
                          path:
                            - firstName
                        - id: roles-claim
                          path:
                            - roles
                      meta:
                        vct_values:
                          - LegalPersonCredential
              "operator":
                credentials:
                  - type: OperatorCredential
                    trustedParticipantsLists:
                      - http://tir.127.0.0.1.nip.io
                    trustedIssuersLists:
                      - http://trusted-issuers-list:8080
                    jwtInclusion:
                      enabled: true
                      fullInclusion: true
                dcql:
                  credentials:
                    - id: operator-query
                      format: "jwt_vc_json"
                      multiple: true
                      meta:
                        type_values:
                          - OperatorCredential
          - id: dsp
            defaultOidcScope: "openid"
            authorizationType: "DEEPLINK"
            oidcScopes:
              "openid":
                credentials:
                  - type: MembershipCredential
                    trustedParticipantsLists:
                      - http://tir.127.0.0.1.nip.io
                    trustedIssuersLists:
                      - "*"
                    jwtInclusion:
                      enabled: true
                      fullInclusion: true
                dcql:
                  credentials:
                    - id: mc-query
                      format: "jwt_vc_json"
                      multiple: true
                      meta:
                        type_values:
                          - MembershipCredential
          - id: contract-management
            defaultOidcScope: "external-marketplace"
            authorizationType: "DEEPLINK"
            oidcScopes:
              "external-marketplace":
                credentials:
                  - type: MarketplaceCredential
                    trustedParticipantsLists:
                      - http://tir.127.0.0.1.nip.io
                    trustedIssuersLists:
                      - "*"
                    jwtInclusion:
                      enabled: true
                      fullInclusion: true
                dcql:
                  credentials:
                    - id: mc-query
                      format: "jwt_vc_json"
                      multiple: true
                      meta:
                        type_values:
                          - MarketplaceCredential
    vcverifier:
      ingress:
        enabled: true
        annotations:
          traefik.ingress.kubernetes.io/router.tls: "true"
        tls:
          - hosts:
              - verifier.mp-operations.org
            secretName: tls-secret
        hosts:
          - host: verifier.mp-operations.org
            paths:
              - "/"
      deployment:
        logging:
          level: DEBUG
        verifier:
          tirAddress: http://tir.127.0.0.1.nip.io/
          did: did:web:mp-operations.org
          supportedModes: ["byValue", "byReference"]
          clientIdentification:
            keyPath: /signing-key/client.key.pem
            requestKeyAlgorithm: ES256
            id: x509_san_dns:verifier.mp-operations.org
            certificatePath: /certificate/client-chain-bundle.cert.pem
        server:
          host: https://verifier.mp-operations.org
        configRepo:
          configEndpoint: http://credentials-config-service:8080
        additionalVolumes:
          - name: signing-key
            secret:
              secretName: signing-key
          - name: cert-chain
            secret:
              secretName: cert-chain
          # add the self generated root ca to the system truststore
          - name: root-ca
            emptyDir: {}
          - name: ca-to-add
            secret:
              secretName: root-ca
        additionalVolumeMounts:
          - name: signing-key
            mountPath: /signing-key
          - name: cert-chain
            mountPath: /certificate
          # add the self generated root ca to the system truststore
          - name: root-ca
            mountPath: /etc/ssl/cert.pem
            subPath: cert.pem
        additionalEnvVars:
          - name: HTTPS_PROXY
            value: "http://squid-proxy.infra.svc.cluster.local:8888"
          - name: HTTP_PROXY
            value: "http://squid-proxy.infra.svc.cluster.local:8888"
          - name: NO_PROXY
            value: "credentials-config-service,w3.org,trusted-issuers-list"
        initContainers:
          # add the self generated root ca to the system truststore
          - name: add-root-ca
            image: alpine:3.21.3
            command:
              - /bin/sh
            args:
              - -c
              - |
                #!/bin/sh
                cp /etc/ssl/cert.pem /root-ca/cert.pem
                cat /root-ca/cacert.pem >> /root-ca/cert.pem
            volumeMounts:
              - name: root-ca
                mountPath: /root-ca
              - name: ca-to-add
                mountPath: /root-ca/cacert.pem
                subPath: cacert.pem
          - name: register-at-tir
            image: curlimages/curl:8.18.0
            command:
              - /bin/sh
            args:
              - -ec
              - |
                curl -X 'POST' 'http://tir.trust-anchor.svc.cluster.local:8080/issuer' -H 'Content-Type: application/json' -d "{\"did\": \"did:web:mp-operations.org\", \"credentials\": []}"
  odrlAuthorization:
    apisix:
      etcd:
        replicaCount: 1
        persistence:
          enabled: false
      apisix:
        admin:
          credentials:
            admin: admin
          allow:
            ipList:
              - 0.0.0.0/0
        deployment:
          mode: traditional
          role: "traditional"
          role_traditional:
            config_provider: "etcd"
          role_data_plane:
            config_provider: "etcd"
        catchAllRoute:
          enabled: false
      ingress:
        enabled: true
        hosts:
          - host: mp-data-service.127.0.0.1.nip.io
            paths: ["/"]
          - host: tpp-data-service.127.0.0.1.nip.io
            paths: ["/"]
          - host: tpp-service.127.0.0.1.nip.io
            paths: ["/"]
          - host: mp-tmf-api.127.0.0.1.nip.io
            paths: ["/"]
          - host: contract-management.127.0.0.1.nip.io
            paths: ["/"]
          - host: dsp-mp-operations.127.0.0.1.nip.io
            paths: ["/"]
          - host: dcp-mp-operations.127.0.0.1.nip.io
            paths: ["/"]
          - host: identityhub-mp-operations.127.0.0.1.nip.io
            paths: ["/"]
          - host: identityhub-management-mp-operations.127.0.0.1.nip.io
            paths: ["/"]
          - host: vault-mp-operations.127.0.0.1.nip.io
            paths: ["/"]
      catchAllRoute:
        enabled: false
      routes:
        - uri: /.well-known/openid-configuration
          host: tpp-service.127.0.0.1.nip.io
          upstream:
            nodes:
              verifier:3000: 1
            type: roundrobin
          plugins:
            proxy-rewrite:
              uri: /services/tpp-service/.well-known/openid-configuration
        - uri: /.well-known/openid-configuration
          host: mp-data-service.127.0.0.1.nip.io
          upstream:
            nodes:
              verifier:3000: 1
            type: roundrobin
          plugins:
            proxy-rewrite:
              uri: /services/data-service/.well-known/openid-configuration
        - uri: /.well-known/openid-configuration
          host: contract-management.127.0.0.1.nip.io
          upstream:
            nodes:
              verifier:3000: 1
            type: roundrobin
          plugins:
            proxy-rewrite:
              uri: /services/contract-management/.well-known/openid-configuration
        - uri: /.well-known/data-space-configuration
          upstream:
            nodes:
              dsconfig:3002: 1
            type: roundrobin
          plugins:
            proxy-rewrite:
              uri: /.well-known/data-space-configuration/data-space-configuration.json
            response-rewrite:
              headers:
                set:
                  content-type: application/json
        - uri: /*
          host: tpp-data-service.127.0.0.1.nip.io
          upstream:
            nodes:
              data-service-scorpio:9090: 1
            type: roundrobin
          plugins:
            openid-connect:
              proxy_opts:
                https_proxy: http://squid-proxy.infra.svc.cluster.local:8888
              bearer_only: true
              use_jwks: true
              client_id: contract-management
              client_secret: unused
              ssl_verify: false
              discovery: https://verifier.mp-operations.org/services/tmf-api/.well-known/openid-configuration
            opa:
              host: http://localhost:8181
              policy: tpp
        - uri: /*
          host: mp-data-service.127.0.0.1.nip.io
          upstream:
            nodes:
              data-service-scorpio:9090: 1
            type: roundrobin
          plugins:
            openid-connect:
              proxy_opts:
                https_proxy: http://squid-proxy.infra.svc.cluster.local:8888
              bearer_only: true
              use_jwks: true
              client_id: data-service
              client_secret: unused
              ssl_verify: false
              discovery: https://verifier.mp-operations.org/services/data-service/.well-known/openid-configuration
            opa:
              host: http://localhost:8181
              policy: policy/main
              with_body: true
        - uri: /.well-known/openid-configuration
          host: mp-tmf-api.127.0.0.1.nip.io
          upstream:
            nodes:
              verifier:3000: 1
            type: roundrobin
          plugins:
            proxy-rewrite:
              uri: /services/tmf-api/.well-known/openid-configuration
        - uri: /.well-known/openid-configuration
          host: dsp-mp-operations.127.0.0.1.nip.io
          upstream:
            nodes:
              verifier:3000: 1
            type: roundrobin
          plugins:
            proxy-rewrite:
              uri: /services/dsp/.well-known/openid-configuration
        - uri: /*
          host: dsp-mp-operations.127.0.0.1.nip.io
          upstream:
            nodes:
              provider-fdsc-edc-oid4vc:8080: 1
          plugins:
            openid-connect:
              proxy_opts:
                https_proxy: http://squid-proxy.infra.svc.cluster.local:8888
              bearer_only: true
              use_jwks: true
              client_id: dsp
              client_secret: unused
              ssl_verify: false
              discovery: https://verifier.mp-operations.org/services/dsp/.well-known/openid-configuration
        - uri: /api/identity/*
          host: identityhub-management-mp-operations.127.0.0.1.nip.io
          upstream:
            nodes:
              identityhub-service:8082: 1
        - uri: /api/credentials/*
          host: identityhub-mp-operations.127.0.0.1.nip.io
          upstream:
            nodes:
              identityhub-service:8083: 1
        - uri: /*
          host: dcp-mp-operations.127.0.0.1.nip.io
          upstream:
            nodes:
              provider-fdsc-edc-dcp:8080: 1
        - uri: /*
          host: mp-tmf-api.127.0.0.1.nip.io
          upstream:
            nodes:
              tm-forum-api-svc:8080: 1
            type: roundrobin
          plugins:
            openid-connect:
              proxy_opts:
                https_proxy: http://squid-proxy.infra.svc.cluster.local:8888
              bearer_only: true
              use_jwks: true
              client_id: contract-management
              client_secret: unused
              ssl_verify: false
              discovery: https://verifier.mp-operations.org/services/tmf-api/.well-known/openid-configuration
            opa:
              host: http://localhost:8181
              policy: policy/main
              with_body: true
        - uri: /*
          host: contract-management.127.0.0.1.nip.io
          upstream:
            nodes:
              contract-management:8080: 1
            type: roundrobin
          plugins:
            openid-connect:
              proxy_opts:
                https_proxy: http://squid-proxy.infra.svc.cluster.local:8888
              bearer_only: true
              use_jwks: true
              client_id: contract-management
              client_secret: unused
              ssl_verify: false
              discovery: https://verifier.mp-operations.org/services/contract-management/.well-known/openid-configuration
            opa:
              host: http://localhost:8181
              policy: policy/main
              with_body: true
        - uri: /*
          host: vault-mp-operations.127.0.0.1.nip.io
          upstream:
            nodes:
              provider-vault:8200: 1
        - uri: /*
          host: tpp-service.127.0.0.1.nip.io
          upstream:
            nodes:
              rainbow:8080: 1
          plugins:
            openid-connect:
              proxy_opts:
                https_proxy: http://squid-proxy.infra.svc.cluster.local:8888
              bearer_only: true
              use_jwks: true
              client_id: data-service
              client_secret: unused
              ssl_verify: false
              discovery: https://verifier.mp-operations.org/services/data-service/.well-known/openid-configuration
            opa:
              host: http://localhost:8181
              policy: policy/main
              with_body: true
    odrl-pap:
      additionalEnvVars:
        - name: GENERAL_ORGANIZATION_DID
          value: did:web:mp-operations.org
      ingress:
        enabled: true
        hosts:
          - host: pap-provider.127.0.0.1.nip.io
            paths:
              - "/"
    tpp:
      enabled: true
      transfers:
        host: http://rainbow-provider.127.0.0.1.nip.io:8080
        path: transfers
postgresql:
  primary:
    resourcesPreset: none
    persistence:
      enabled: false
  readReplicas:
    persistence:
      enabled: false

# helper component to serve the did.json document
did:
  enabled: true
  config:
    server:
      serverPort: "3000"
      didType: "web"
      hostUrl: "http://mp-operations.org"
      outputFormat: "json_jwk"
      keystorePasswordSecretName: "provider-keystore"
      keystorePasswordSecretKey: "password"
    generateKey:
      enabled: false
    provideKeystore:
      enabled: true
      keystoreSecretName: "provider-keystore"
      keystoreSecretKey: "keystore-did.pfx"
      keyType: "EC"
  ingress:
    enabled: true
    className: ""
    annotations:
      traefik.ingress.kubernetes.io/service.passhostheader: "true"
      traefik.ingress.kubernetes.io/router.tls: "true"
    hosts:
      - host: mp-operations.org
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls:
      - secretName: tls-secret
        hosts:
          - mp-operations.org
    
# helper to suport providing additional dataspace information    
dataSpaceConfig:
  enabled: true
  serviceType: ClusterIP
  port: 3002
  supportedModels:
    - "https://raw.githubusercontent.com/smart-data-models/dataModel.Consumption/master/ConsumptionPoint/schema.json"
    - "https://raw.githubusercontent.com/smart-data-models/dataModel.Consumption/master/ConsumptionCost/schema.json"
  supportedProtocols:
    - http
    - https
  authenticationProtocols:
    - oid4vp

# context broker as tmforum backend and data provider    
scorpio:
  resources:
    limits:
      cpu: "500m"
      memory: 1Gi
    requests:
      cpu: "100m"
      memory: 128Mi
  ingress:
    enabled: true
    # only to make it available for the test initialization
    hosts:
      - host: scorpio-provider.127.0.0.1.nip.io
        paths:
          - "/"
tm-forum-api:
  defaultConfig:
    contextUrl: https://uri.etsi.org/ngsi-ld/v1/ngsi-ld-core-context.jsonld
  allInOne:
    enabled: true
  apiProxy:
    enabled: false
  registration:
    enabled: false
  ingress:
    enabled: true
    hosts:
      - host: tm-forum-api.127.0.0.1.nip.io
        paths:
          - /
# -- integration of rainbow
rainbow:
  enabled: true
  db:
    url: postgres
    user: rainbow
    existingSecret: rainbow.postgres.credentials.postgresql.acid.zalan.do
    passwordKey: password
  ingress:
    enabled: true
    hosts:
      - host: rainbow-provider.127.0.0.1.nip.io
        paths:
          - /
contract-management:
  did: did:web:mp-operations.org
  enableCentralMarketplace: false
  enableOdrlPap: true
  enableRainbow: true
  services:
    ## Config for Trusted Issuers List
    trusted-issuers-list:
      ## URL of the Trusted Issuers List Service
      url: http://trusted-issuers-list:8080
    ## Config for the TM Forum Service hosting the APIs
    product-order:
      ## URL of the TM Forum Service hosting the Product Ordering API
      url: http://tm-forum-api-svc:8080
    party:
      ## URL of the TM Forum Service hosting the Party API
      url: http://tm-forum-api-svc:8080
    product-catalog:
      ## URL of the TM Forum Service hosting the Product Catalog API
      url: http://tm-forum-api-svc:8080
    service-catalog:
      ## URL of the TM Forum Service hosting the Service Catalog API
      url: http://tm-forum-api-svc:8080
    tmforum-agreement-api:
      ## URL of the TM Forum Service hosting the Agreement API
      url: http://tm-forum-api-svc:8080
    quote:
      ## URL for TM Forum Service hosting the Quote API
      url: http://tm-forum-api-svc:8080
    odrl:
      ## URL for the ODRL-PAP
      url: http://odrl-pap:8080
  notification:
    enabled: true
    host: contract-management
  additionalEnvVars:
    - name: LOGGER_LEVELS_ROOT
      value: DEBUG
mongo-operator:
  enabled: false

managedMongo:
  enabled: true
  spec:
    statefulSet:
      spec:
        template:
          spec:
            #  Hostpath volumes are owned by root
            #  but MongoDB containers run as non root
            #  so we use an init container to change the owner of
            #  the directory (init containers run as root)
            initContainers:
              - command:
                  - chown
                  - -R
                  - "2000"
                  - /data
                image: busybox
                volumeMounts:
                  - mountPath: /data
                    name: data-volume
                securityContext:
                  runAsNonRoot: false
                  runAsUser: 0
                  runAsGroup: 0
                name: change-dir-permissions
              - name: mongodb-agent-readinessprobe
                resources:
                  limits:
                    cpu: "0.2"
                    memory: 200M
                  requests:
                    cpu: "0.1"
                    memory: 100M
            containers:
              - name: mongod
                resources:
                  limits:
                    cpu: "0.2"
                    memory: 250M
                  requests:
                    cpu: "0.1"
                    memory: 200M
              - name: mongodb-agent
                resources:
                  limits:
                    cpu: "0.2"
                    memory: 250M
                  requests:
                    cpu: "0.1"
                    memory: 200M
        volumeClaimTemplates:
          - metadata:
              name: data-volume
            spec:
              accessModes:
                - ReadWriteOnce
              storageClassName: local-path
              resources:
                requests:
                  storage: "1Gi"
          - metadata:
              name: logs-volume
            spec:
              accessModes:
                - ReadWriteOnce
              storageClassName: local-path
              resources:
                requests:
                  storage: "1Gi"

