# helper component to initialize the trusted issuers list
registration:
  enabled: true
  configMap: provider-til-registration
  til: http://trusted-issuers-list.provider.svc.cluster.local:8080
  issuer:
    - did: did:web:mp-operations.org
      credentialTypes:
        - LegalPersonCredential
    - did: did:web:fancy-marketplace.biz
      credentialTypes:
        - LegalPersonCredential
        - UserCredential
        - MembershipCredential
  prepScript: export $(curl -f -X GET did-helper:3002/did-material/did.env)
fdsc-edc:
  enabled: false

credentials:
  enabled: true
  keycloak:
    address: http://provider-keycloak:8080
    realm: test-realm
    clientId: account-console
    username: employee
    scope: openid
    password: test
  configurations:
    - id: user-credential
      format: jwt_vc
      targetFile: user-credential.jwt
    - id: membership-credential
      format: jwt_vc
      targetFile: membership-credential.jwt

dashboard:
  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: "selfsigned-issuer"
      cert-manager.io/private-key-algorithm: "ECDSA"
      cert-manager.io/common-name: "dashboard-provider.127.0.0.1.nip.io"
      cert-manager.io/alt-names: "dashboard-provider.127.0.0.1.nip.io"
      traefik.ingress.kubernetes.io/router.tls: "true"

    hosts:
      - host: dashboard-provider.127.0.0.1.nip.io
        paths:
          - "/"
    tls:
      - secretName: dashboard-provider.127.0.0.1.nip.io-tls
        hosts:
          - dashboard-provider.127.0.0.1.nip.io
  apiUrls:
    til: http://trusted-issuers-list:8080
    tir: https://tir.127.0.0.1.nip.io
    ccs: http://credentials-config-service:8080
    odrl: http://odrl-pap:8080
  auth:
    config:
      providers:
        - id: keycloak
          issuer: https://keycloak-provider.127.0.0.1.nip.io/realms/test-realm
          clientId: did:web:mp-operations.org
          scopes: ["openid", "profile"]
          rolesClaimPath: "realm_access.roles"
          roleMapping:
            fdsc-admin": "admin"
            fdsc-viewer": "viewer"
          silentRenew: true

