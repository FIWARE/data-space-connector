cert-manager:
  enabled: false

certManagerResources:
  enabled: true
  namespace: cert-manager
  type: "selfsigned"

decentralizedIam:
  enabled: true
  vcAuthentication:
    postgres-operator:
      enabled: false
    managedPostgres:
      enabled: true
      config:
        volume:
          storageClass: "local-path"
        users:
          ngb:
            - createdb
        databases:
          ngb: ngb
        preparedDatabases:
          ngb:
            extensions:
              postgis: public
    trusted-issuers-list:
      deployment:
        resources:
          limits:
            cpu: 300m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
      # only open for clean up in the tests
      ingress:
        til:
          enabled: true
          annotations:
            cert-manager.io/cluster-issuer: "selfsigned-issuer"
            cert-manager.io/private-key-algorithm: "ECDSA"
            cert-manager.io/common-name: "til-provider.127.0.0.1.nip.io"
            traefik.ingress.kubernetes.io/router.tls: "true"
          hosts:
            - host: til-provider.127.0.0.1.nip.io
              paths:
                - /
          tls:
            - secretName: til-provider.127.0.0.1.nip.io-tls
              hosts:
                - til-provider.127.0.0.1.nip.io
    credentials-config-service:
      ingress:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: "selfsigned-issuer"
          cert-manager.io/private-key-algorithm: "ECDSA"
          cert-manager.io/common-name: "provider-ccs.127.0.0.1.nip.io"
          traefik.ingress.kubernetes.io/router.tls: "true"
        hosts:
          - host: provider-ccs.127.0.0.1.nip.io
            paths:
              - "/"
        tls:
          - secretName: provider-ccs.127.0.0.1.nip.io-tls
            hosts:
              - provider-ccs.127.0.0.1.nip.io
      registration:
        enabled: true
        services:
          - id: tpp-service
            defaultOidcScope: "operator"
            authorizationType: "DEEPLINK"
            oidcScopes:
              "operator":
                credentials:
                  - type: OperatorCredential
                    trustedParticipantsLists:
                      - https://tir.127.0.0.1.nip.io
                    trustedIssuersLists:
                      - http://trusted-issuers-list:8080
                    jwtInclusion:
                      enabled: true
                      fullInclusion: true
          - id: bae
            defaultOidcScope: "openid learcredential"
            authorizationType: "FRONTEND_V2"
            oidcScopes:
              "openid learcredential":
                credentials:
                  - type: LegalPersonCredential
                    trustedParticipantsLists:
                      - https://tir.127.0.0.1.nip.io
                    trustedIssuersLists:
                      - http://trusted-issuers-list:8080
                    jwtInclusion:
                      enabled: true
                      fullInclusion: true
                dcql:
                  credentials:
                    - id: legal-person-query
                      format: "vc+sd-jwt"
                      multiple: false
                      claims:
                        - id: name-claim
                          path:
                            - firstName
                        - id: roles-claim
                          path:
                            - roles
                      meta:
                        vct_values:
                          - LegalPersonCredential
          - id: data-service
            defaultOidcScope: "default"
            authorizationType: "DEEPLINK"
            oidcScopes:
              "default":
                credentials:
                  - type: UserCredential
                    trustedParticipantsLists:
                      - https://tir.127.0.0.1.nip.io
                    trustedIssuersLists:
                      - http://trusted-issuers-list:8080
                    jwtInclusion:
                      enabled: true
                      fullInclusion: true
                dcql:
                  credentials:
                    - id: user-query
                      format: "jwt_vc_json"
                      multiple: true
                      meta:
                        type_values:
                          - UserCredential
              "legal":
                credentials:
                  - type: LegalPersonCredential
                    trustedParticipantsLists:
                      - https://tir.127.0.0.1.nip.io
                    trustedIssuersLists:
                      - http://trusted-issuers-list:8080
                    jwtInclusion:
                      enabled: true
                      fullInclusion: true
                dcql:
                  credentials:
                    - id: legal-person-query
                      format: "vc+sd-jwt"
                      multiple: false
                      claims:
                        - id: name-claim
                          path:
                            - firstName
                        - id: roles-claim
                          path:
                            - roles
                      meta:
                        vct_values:
                          - LegalPersonCredential
              "operator":
                credentials:
                  - type: OperatorCredential
                    trustedParticipantsLists:
                      - https://tir.127.0.0.1.nip.io
                    trustedIssuersLists:
                      - http://trusted-issuers-list:8080
                    jwtInclusion:
                      enabled: true
                      fullInclusion: true
                dcql:
                  credentials:
                    - id: operator-query
                      format: "jwt_vc_json"
                      multiple: true
                      meta:
                        type_values:
                          - OperatorCredential
          - id: dsp
            defaultOidcScope: "openid"
            authorizationType: "DEEPLINK"
            oidcScopes:
              "openid":
                credentials:
                  - type: MembershipCredential
                    trustedParticipantsLists:
                      - https://tir.127.0.0.1.nip.io
                    trustedIssuersLists:
                      - "*"
                    jwtInclusion:
                      enabled: true
                      fullInclusion: true
                dcql:
                  credentials:
                    - id: mc-query
                      format: "jwt_vc_json"
                      multiple: true
                      meta:
                        type_values:
                          - MembershipCredential
          - id: contract-management
            defaultOidcScope: "external-marketplace"
            authorizationType: "DEEPLINK"
            oidcScopes:
              "external-marketplace":
                credentials:
                  - type: MarketplaceCredential
                    trustedParticipantsLists:
                      - https://tir.127.0.0.1.nip.io
                    trustedIssuersLists:
                      - "*"
                    jwtInclusion:
                      enabled: true
                      fullInclusion: true
                dcql:
                  credentials:
                    - id: mc-query
                      format: "jwt_vc_json"
                      multiple: true
                      meta:
                        type_values:
                          - MarketplaceCredential
    vcverifier:
      ingress:
        enabled: true
        annotations:
          traefik.ingress.kubernetes.io/router.tls: "true"
          cert-manager.io/cluster-issuer: "selfsigned-issuer"
          cert-manager.io/private-key-algorithm: "ECDSA"
          cert-manager.io/common-name: "verifier.mp-operations.org"
        tls:
          - hosts:
              - verifier.mp-operations.org
            secretName: verifier.mp-operations.org-tls
        hosts:
          - host: verifier.mp-operations.org
            paths:
              - "/"
      deployment:
        logging:
          level: DEBUG
        verifier:
          tirAddress: https://tir.127.0.0.1.nip.io/
          did: did:web:mp-operations.org
          supportedModes: ["byValue", "byReference"]
          # required for the tests, can be longer in real world environments
          tilCacheExpiry: 1
          tirCacheExpiry: 1
          clientIdentification:
            keyPath: /signing-key/tls.key
            certificatePath: /signing-key/tls.crt
            requestKeyAlgorithm: ES256
            id: x509_san_dns:verifier.mp-operations.org
        server:
          host: https://verifier.mp-operations.org
        configRepo:
          configEndpoint: http://credentials-config-service:8080
          updateInterval: 1
        additionalVolumes:
          - name: signing-key
            secret:
              secretName: verifier.mp-operations.org-tls
          # add the cert-manager CA to the system truststore
          - name: root-ca
            emptyDir: {}
        additionalVolumeMounts:
          - name: signing-key
            mountPath: /signing-key
          # add the cert-manager CA to the system truststore
          - name: root-ca
            mountPath: /etc/ssl/cert.pem
            subPath: cert.pem
        additionalEnvVars:
          - name: HTTPS_PROXY
            value: "http://squid-proxy.infra.svc.cluster.local:8888"
          - name: HTTP_PROXY
            value: "http://squid-proxy.infra.svc.cluster.local:8888"
          - name: NO_PROXY
            value: "credentials-config-service,w3.org,trusted-issuers-list"
        initContainers:
          # add the cert-manager CA to the system truststore
          - name: add-root-ca
            image: alpine:3.21.3
            command: ["sh", "-c", "cat /etc/ssl/cert.pem /tmp/ca.crt > /root-ca/cert.pem"]
            volumeMounts:
              - name: root-ca
                mountPath: /root-ca
              - name: signing-key
                mountPath: /tmp/ca.crt
                subPath: ca.crt
          - name: register-at-tir
            image: curlimages/curl:8.18.0
            command:
              - /bin/sh
            args:
              - -ec
              - |
                curl -X 'POST' 'http://tir.trust-anchor.svc.cluster.local:8080/issuer' -H 'Content-Type: application/json' -d "{\"did\": \"did:web:mp-operations.org\", \"credentials\": []}"
  odrlAuthorization:
    apisix:
      etcd:
        replicaCount: 1
        persistence:
          enabled: false
      apisix:
        admin:
          credentials:
            admin: admin
          allow:
            ipList:
              - 0.0.0.0/0
        deployment:
          mode: traditional
          role: "traditional"
          role_traditional:
            config_provider: "etcd"
          role_data_plane:
            config_provider: "etcd"
        catchAllRoute:
          enabled: false
      ingress:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: "selfsigned-issuer"
          cert-manager.io/private-key-algorithm: "ECDSA"
          traefik.ingress.kubernetes.io/router.tls: "true"
        hosts:
          - host: mp-data-service.127.0.0.1.nip.io
            paths: ["/"]
          - host: tpp-data-service.127.0.0.1.nip.io
            paths: ["/"]
          - host: tpp-service.127.0.0.1.nip.io
            paths: ["/"]
          - host: mp-tmf-api.127.0.0.1.nip.io
            paths: ["/"]
          - host: contract-management.127.0.0.1.nip.io
            paths: ["/"]
          - host: dsp-mp-operations.127.0.0.1.nip.io
            paths: ["/"]
          - host: dcp-mp-operations.127.0.0.1.nip.io
            paths: ["/"]
          - host: identityhub-mp-operations.127.0.0.1.nip.io
            paths: ["/"]
          - host: identityhub-management-mp-operations.127.0.0.1.nip.io
            paths: ["/"]
          - host: vault-mp-operations.127.0.0.1.nip.io
            paths: ["/"]
        tls:
          - secretName: apisix-provider-tls
            hosts:
              - mp-data-service.127.0.0.1.nip.io
              - tpp-data-service.127.0.0.1.nip.io
              - tpp-service.127.0.0.1.nip.io
              - mp-tmf-api.127.0.0.1.nip.io
              - contract-management.127.0.0.1.nip.io
              - dsp-mp-operations.127.0.0.1.nip.io
              - dcp-mp-operations.127.0.0.1.nip.io
              - identityhub-mp-operations.127.0.0.1.nip.io
              - identityhub-management-mp-operations.127.0.0.1.nip.io
              - vault-mp-operations.127.0.0.1.nip.io
      catchAllRoute:
        enabled: false
      routes:
        - uri: /.well-known/openid-configuration
          host: tpp-service.127.0.0.1.nip.io
          upstream:
            nodes:
              verifier:3000: 1
            type: roundrobin
          plugins:
            proxy-rewrite:
              uri: /services/tpp-service/.well-known/openid-configuration
        - uri: /.well-known/openid-configuration
          host: mp-data-service.127.0.0.1.nip.io
          upstream:
            nodes:
              verifier:3000: 1
            type: roundrobin
          plugins:
            proxy-rewrite:
              uri: /services/data-service/.well-known/openid-configuration
        - uri: /.well-known/openid-configuration
          host: contract-management.127.0.0.1.nip.io
          upstream:
            nodes:
              verifier:3000: 1
            type: roundrobin
          plugins:
            proxy-rewrite:
              uri: /services/contract-management/.well-known/openid-configuration
        - uri: /*
          host: contract-management.127.0.0.1.nip.io
          priority: 100
          vars:
            - ["uri", "~~", "/\\.well-known/openid-configuration$"]
          upstream:
            nodes:
              verifier:3000: 1
            type: roundrobin
          plugins:
            proxy-rewrite:
              uri: /services/contract-management/.well-known/openid-configuration
        - uri: /.well-known/data-space-configuration
          upstream:
            nodes:
              dsconfig:3002: 1
            type: roundrobin
          plugins:
            proxy-rewrite:
              uri: /.well-known/data-space-configuration/data-space-configuration.json
            response-rewrite:
              headers:
                set:
                  content-type: application/json
        - uri: /*
          host: tpp-data-service.127.0.0.1.nip.io
          upstream:
            nodes:
              data-service-scorpio:9090: 1
            type: roundrobin
          plugins:
            openid-connect:
              proxy_opts:
                https_proxy: http://squid-proxy.infra.svc.cluster.local:8888
              bearer_only: true
              use_jwks: true
              client_id: contract-management
              client_secret: unused
              ssl_verify: false
              discovery: https://verifier.mp-operations.org/services/tmf-api/.well-known/openid-configuration
            opa:
              host: http://localhost:8181
              policy: tpp
        - uri: /*
          host: mp-data-service.127.0.0.1.nip.io
          upstream:
            nodes:
              data-service-scorpio:9090: 1
            type: roundrobin
          plugins:
            openid-connect:
              proxy_opts:
                https_proxy: http://squid-proxy.infra.svc.cluster.local:8888
              bearer_only: true
              use_jwks: true
              client_id: data-service
              client_secret: unused
              ssl_verify: false
              discovery: https://verifier.mp-operations.org/services/data-service/.well-known/openid-configuration
            opa:
              host: http://localhost:8181
              policy: policy/main
              with_body: true
        - uri: /.well-known/openid-configuration
          host: mp-tmf-api.127.0.0.1.nip.io
          upstream:
            nodes:
              verifier:3000: 1
            type: roundrobin
          plugins:
            proxy-rewrite:
              uri: /services/tmf-api/.well-known/openid-configuration
        - uri: /.well-known/openid-configuration
          host: dsp-mp-operations.127.0.0.1.nip.io
          upstream:
            nodes:
              verifier:3000: 1
            type: roundrobin
          plugins:
            proxy-rewrite:
              uri: /services/dsp/.well-known/openid-configuration
        - uri: /*
          host: dsp-mp-operations.127.0.0.1.nip.io
          upstream:
            nodes:
              provider-fdsc-edc-oid4vc:8080: 1
          plugins:
            openid-connect:
              proxy_opts:
                https_proxy: http://squid-proxy.infra.svc.cluster.local:8888
              bearer_only: true
              use_jwks: true
              client_id: dsp
              client_secret: unused
              ssl_verify: false
              discovery: https://verifier.mp-operations.org/services/dsp/.well-known/openid-configuration
        - uri: /api/identity/*
          host: identityhub-management-mp-operations.127.0.0.1.nip.io
          upstream:
            nodes:
              identityhub-service:8082: 1
        - uri: /api/credentials/*
          host: identityhub-mp-operations.127.0.0.1.nip.io
          upstream:
            nodes:
              identityhub-service:8083: 1
        - uri: /*
          host: dcp-mp-operations.127.0.0.1.nip.io
          upstream:
            nodes:
              provider-fdsc-edc-dcp:8080: 1
        - uri: /*
          host: mp-tmf-api.127.0.0.1.nip.io
          upstream:
            nodes:
              tm-forum-api-svc:8080: 1
            type: roundrobin
          plugins:
            openid-connect:
              proxy_opts:
                https_proxy: http://squid-proxy.infra.svc.cluster.local:8888
              bearer_only: true
              use_jwks: true
              client_id: contract-management
              client_secret: unused
              ssl_verify: false
              discovery: https://verifier.mp-operations.org/services/tmf-api/.well-known/openid-configuration
            opa:
              host: http://localhost:8181
              policy: policy/main
              with_body: true
        - uri: /*
          host: contract-management.127.0.0.1.nip.io
          upstream:
            nodes:
              contract-management:8080: 1
            type: roundrobin
          plugins:
            openid-connect:
              proxy_opts:
                https_proxy: http://squid-proxy.infra.svc.cluster.local:8888
              bearer_only: true
              use_jwks: true
              client_id: contract-management
              client_secret: unused
              ssl_verify: false
              discovery: https://verifier.mp-operations.org/services/contract-management/.well-known/openid-configuration
            opa:
              host: http://localhost:8181
              policy: policy/main
              with_body: true
        - uri: /*
          host: vault-mp-operations.127.0.0.1.nip.io
          upstream:
            nodes:
              provider-vault:8200: 1
    odrl-pap:
      additionalEnvVars:
        - name: GENERAL_ORGANIZATION_DID
          value: did:web:mp-operations.org
      ingress:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: "selfsigned-issuer"
          cert-manager.io/private-key-algorithm: "ECDSA"
          cert-manager.io/common-name: "pap-provider.127.0.0.1.nip.io"
          traefik.ingress.kubernetes.io/router.tls: "true"
        hosts:
          - host: pap-provider.127.0.0.1.nip.io
            paths:
              - "/"
        tls:
          - secretName: pap-provider.127.0.0.1.nip.io-tls
            hosts:
              - pap-provider.127.0.0.1.nip.io
    tpp:
      enabled: true
      transfers:
        host: http://rainbow-provider.127.0.0.1.nip.io:8080
        path: transfers
postgresql:
  primary:
    resourcesPreset: none
    persistence:
      enabled: false
  readReplicas:
    persistence:
      enabled: false

# helper component to serve the did.json document
did:
  enabled: true
  config:
    server:
      hostUrl: "http://mp-operations.org"
      certPath: "/certs/tls.crt"
  volumes:
    - name: certs
      secret:
        secretName: mp-operations.org-tls
        items:
          - key: tls.crt
            path: tls.crt
  volumeMounts:
    - name: certs
      mountPath: /certs
  ingress:
    enabled: true
    className: ""
    annotations:
      traefik.ingress.kubernetes.io/service.passhostheader: "true"
      traefik.ingress.kubernetes.io/router.tls: "true"
      cert-manager.io/cluster-issuer: "selfsigned-issuer"
      cert-manager.io/private-key-algorithm: "ECDSA"
      cert-manager.io/common-name: "mp-operations.org"
    hosts:
      - host: mp-operations.org
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls:
      - secretName: mp-operations.org-tls
        hosts:
          - mp-operations.org
dataSpaceConfig:
  enabled: true
  serviceType: ClusterIP
  port: 3002
  supportedModels:
    - "https://raw.githubusercontent.com/smart-data-models/dataModel.Consumption/master/ConsumptionPoint/schema.json"
    - "https://raw.githubusercontent.com/smart-data-models/dataModel.Consumption/master/ConsumptionCost/schema.json"
  supportedProtocols:
    - http
    - https
  authenticationProtocols:
    - oid4vp

# context broker as tmforum backend and data provider
scorpio:
  resources:
    limits:
      cpu: "500m"
      memory: 1Gi
    requests:
      cpu: "100m"
      memory: 128Mi
  ingress:
    enabled: true
    # only to make it available for the test initialization
    annotations:
      cert-manager.io/cluster-issuer: "selfsigned-issuer"
      cert-manager.io/private-key-algorithm: "ECDSA"
      cert-manager.io/common-name: "scorpio-provider.127.0.0.1.nip.io"
      traefik.ingress.kubernetes.io/router.tls: "true"
      
    hosts:
      - host: scorpio-provider.127.0.0.1.nip.io
        paths:
          - "/"
    tls:
      - secretName: scorpio-provider.127.0.0.1.nip.io-tls
        hosts:
          - scorpio-provider.127.0.0.1.nip.io
tm-forum-api:
  defaultConfig:
    contextUrl: https://uri.etsi.org/ngsi-ld/v1/ngsi-ld-core-context.jsonld
  allInOne:
    enabled: true
  apiProxy:
    enabled: false
  registration:
    enabled: false
  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: "selfsigned-issuer"
      cert-manager.io/private-key-algorithm: "ECDSA"
      cert-manager.io/common-name: "tm-forum-api.127.0.0.1.nip.io"
      traefik.ingress.kubernetes.io/router.tls: "true"
    hosts:
      - host: tm-forum-api.127.0.0.1.nip.io
        paths:
          - /
    tls:
      - secretName: tm-forum-api.127.0.0.1.nip.io-tls
        hosts:
          - tm-forum-api.127.0.0.1.nip.io

contract-management:
  did: did:web:mp-operations.org
  enableCentralMarketplace: true
  enableOdrlPap: true
  enableRainbow: false
  services:
    ## Config for Trusted Issuers List
    trusted-issuers-list:
      ## URL of the Trusted Issuers List Service
      url: http://trusted-issuers-list:8080
    ## Config for the TM Forum Service hosting the APIs
    product-order:
      ## URL of the TM Forum Service hosting the Product Ordering API
      url: http://tm-forum-api-svc:8080
    party:
      ## URL of the TM Forum Service hosting the Party API
      url: http://tm-forum-api-svc:8080
    product-catalog:
      ## URL of the TM Forum Service hosting the Product Catalog API
      url: http://tm-forum-api-svc:8080
    service-catalog:
      ## URL of the TM Forum Service hosting the Service Catalog API
      url: http://tm-forum-api-svc:8080
    tmforum-agreement-api:
      ## URL of the TM Forum Service hosting the Agreement API
      url: http://tm-forum-api-svc:8080
    quote:
      ## URL for TM Forum Service hosting the Quote API
      url: http://tm-forum-api-svc:8080
    odrl:
      ## URL for the ODRL-PAP
      url: http://odrl-pap:8080
  notification:
    enabled: true
    host: contract-management
  additionalEnvVars:
    - name: LOGGER_LEVELS_ROOT
      value: DEBUG
mongo-operator:
  enabled: false

managedMongo:
  enabled: true
  spec:
    statefulSet:
      spec:
        template:
          spec:
            #  Hostpath volumes are owned by root
            #  but MongoDB containers run as non root
            #  so we use an init container to change the owner of
            #  the directory (init containers run as root)
            initContainers:
              - command:
                  - chown
                  - -R
                  - "2000"
                  - /data
                image: busybox
                volumeMounts:
                  - mountPath: /data
                    name: data-volume
                securityContext:
                  runAsNonRoot: false
                  runAsUser: 0
                  runAsGroup: 0
                name: change-dir-permissions
              - name: mongodb-agent-readinessprobe
                resources:
                  limits:
                    cpu: "0.2"
                    memory: 200M
                  requests:
                    cpu: "0.1"
                    memory: 100M
            containers:
              - name: mongod
                resources:
                  limits:
                    cpu: "0.2"
                    memory: 250M
                  requests:
                    cpu: "0.1"
                    memory: 200M
              - name: mongodb-agent
                resources:
                  limits:
                    cpu: "0.2"
                    memory: 250M
                  requests:
                    cpu: "0.1"
                    memory: 200M
        volumeClaimTemplates:
          - metadata:
              name: data-volume
            spec:
              accessModes:
                - ReadWriteOnce
              storageClassName: local-path
              resources:
                requests:
                  storage: "1Gi"
          - metadata:
              name: logs-volume
            spec:
              accessModes:
                - ReadWriteOnce
              storageClassName: local-path
              resources:
                requests:
                  storage: "1Gi"

# marketplace frontend
marketplace:
  enabled: true
  siop:
    verifier:
      host: https://verifier.mp-operations.org
    allowedRoles:
      - seller
