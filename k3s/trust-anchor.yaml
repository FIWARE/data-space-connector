postgres-operator:
  enabled: false

trusted-issuers-list:
  # -- it should work as the TrustedIssuersRegistry of the dataspace, thus we publish this api only
  ingress:
    tir:
      annotations:
        traefik.ingress.kubernetes.io/router.tls: "true"
        cert-manager.io/cluster-issuer: "selfsigned-issuer"
        cert-manager.io/private-key-algorithm: "ECDSA"
        cert-manager.io/common-name: "tir.127.0.0.1.nip.io"
        cert-manager.io/alt-names: "tir.127.0.0.1.nip.io"
      enabled: true
      hosts:
        - host: tir.127.0.0.1.nip.io
    til:
      annotations:
        traefik.ingress.kubernetes.io/router.tls: "true"
        cert-manager.io/cluster-issuer: "selfsigned-issuer"
        cert-manager.io/private-key-algorithm: "ECDSA"
        cert-manager.io/common-name: "til.127.0.0.1.nip.io"
        cert-manager.io/alt-names: "til.127.0.0.1.nip.io"
      enabled: true
      hosts:
        - host: til.127.0.0.1.nip.io
  deployment:
    resources:
      limits:
        cpu: 300m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
