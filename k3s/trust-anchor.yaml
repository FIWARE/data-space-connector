trusted-issuers-list:
  # -- it should work as the TrustedIssuersRegistry of the dataspace, thus we publish this api only
  ingress:
    tir:
      enabled: true
      hosts:
        - host: tir.127.0.0.1.nip.io
    til:
      enabled: true
      hosts:
        - host: til.127.0.0.1.nip.io
  deployment:
    resources:
      limits:
        cpu: 300m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi

mysql:
  primary:
    persistence:
      enabled: false
  secondary:
    persistence:
      enabled: false