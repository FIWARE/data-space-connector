fdsc-edc:
  enabled: true

vault:
  enabled: true

did:
  enabled: false

keycloak:
  metrics:
    enabled: true
  extraEnvVars:
    - name: KEYCLOAK_EXTRA_ARGS
      value: "--import-realm"
    - name: KC_FEATURES
      value: "oid4vc-vci"
    # keycloak admin password
    - name: KC_ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: issuance-secret
          key: keycloak-admin
    # set in accordance with the memory requests, will result in OOM otherwise
    - name: KC_HEAP_SIZE
      value: "1024m"
    - name: "STORE_PASS"
      valueFrom:
        secretKeyRef:
          name: keystore-password
          key: password
    - name: KC_HEALTH_ENABLED
      value: "true"
  signingKey:
    did: did:web:mp-operations.org#key-1

identityhub:
  enabled: true
  didIngress:
    annotations:
      traefik.ingress.kubernetes.io/service.passhostheader: "true"
      traefik.ingress.kubernetes.io/router.tls: "true"
      cert-manager.io/cluster-issuer: "selfsigned-issuer"
      cert-manager.io/private-key-algorithm: "ECDSA"
      cert-manager.io/common-name: "mp-operations.org"
    hosts:
    - host: mp-operations.org
      paths:
        - /
    tls:
    - secretName: mp-operations.org-tls
      hosts:
        - mp-operations.org
  postgresql:
    host: postgres
    port: 5432
    auth:
      username: ih
      existingSecret: ih.postgres.credentials.postgresql.acid.zalan.do
      existingSecretKeyKey: "password"
  additionalVolumeMounts:
    - name: root-ca
      mountPath: /root-ca
    - name: cacerts
      mountPath: /opt/java/openjdk/lib/security/cacerts
      subPath: cacerts
  additionalVolumes:
    - name: ca-certs-script
      configMap:
        name: ca-certs-script
        defaultMode: 0755
    - name: root-ca
      secret:
        secretName: mp-operations.org-tls
        items:
          - key: ca.crt
            path: ca.crt
    - name: cacerts
      emptyDir: {}
  initContainers:
    - name: load-certs
      image: "quay.io/fiware/contract-management:3.3.0"
      command: ["/bin/sh", "-c", "/bin/import-ca.sh /certs-folder /root-ca/ca.crt /opt/java/openjdk/lib/security/cacerts"]
      volumeMounts:
        - name: ca-certs-script
          mountPath: /bin/import-ca.sh
          subPath: import-ca.sh
        - name: cacerts
          mountPath: /certs-folder/
        - name: root-ca
          mountPath: /root-ca
  endpoints:
    identity:
      authKeyAlias: "sup3r$3cr3t"
  superuser:
    key: c3VwZXItdXNlcg==.random
  env:
    JAVA_TOOL_OPTIONS: -Dhttps.proxyHost=squid-proxy.infra.svc.cluster.local -Dhttps.proxyPort=8888 -Dhttp.proxyHost=squid-proxy.infra.svc.cluster.local -Dhttp.proxyPort=8888 -Dhttp.nonProxyHosts="*-vault|*.cluster.local" -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=5005