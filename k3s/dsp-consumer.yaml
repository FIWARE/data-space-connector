fdsc-edc:
  enabled: true
  deployment:
    dcp:
      deployment:
        image:
          repository: quay.io/seamware/fdsc-edc-controlplane-dcp
      config:
        edc:
          hostname: dcp-fancy-marketplace.127.0.0.1.nip.io
          dspCallback: https://dcp-fancy-marketplace.127.0.0.1.nip.io:443/api/dsp
    oid4vc:
      deployment:
        image:
          repository: quay.io/seamware/fdsc-edc-controlplane-oid4vc
      service: {}
      config:
        edc:
          hostname: dsp-fancy-marketplace.127.0.0.1.nip.io
          dspCallback: https://dsp-fancy-marketplace.127.0.0.1.nip.io:443/api/dsp
  common:
    deployment:
      additionalVolumeMounts:
        - name: credential-repo
          mountPath: /credential-repo
        - name: signing-key
          mountPath: /signing-key
        - name: root-ca
          mountPath: /root-ca
        - name: cacerts
          mountPath: /opt/java/openjdk/lib/security/cacerts
          subPath: cacerts
        - name: did-material
          mountPath: /did-material
      additionalVolumes:
        - name: signing-key
          emptyDir: {}
        - name: did-material
          emptyDir: {}
        - name: signing-key-raw
          secret:
            secretName: fancy-marketplace.biz-tls
        - name: ca-certs-script
          configMap:
            name: ca-certs-script
            defaultMode: 0755
        - name: credential-repo
          projected:
            sources:
              - secret:
                  name: vc-fdsc-edc-credential
                  items:
                    - key: credential
                      path: membership-credential.jwt
        - name: root-ca
          secret:
            secretName: fancy-marketplace.biz-tls
            items:
              - key: ca.crt
                path: ca.crt
        - name: cacerts
          emptyDir: {}
      additionalEnvVars:
        - name: JAVA_TOOL_OPTIONS
          value: >
            -Dhttps.proxyHost=squid-proxy.infra.svc.cluster.local
            -Dhttps.proxyPort=8888
            -Dhttp.proxyHost=squid-proxy.infra.svc.cluster.local
            -Dhttp.proxyPort=8888
            -Dhttp.nonProxyHosts="*-vault|*.cluster.local"
            -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=5005
      initContainers:
        - name: convert-signing-key
          image: alpine/openssl:3.5.5
          command: ["sh", "-c", "openssl pkcs8 -topk8 -nocrypt -in /signing-key-raw/tls.key -out /signing-key/tls.key"]
          volumeMounts:
            - name: signing-key-raw
              mountPath: /signing-key-raw
            - name: signing-key
              mountPath: /signing-key
        # helper container to wait for keycloak present in local deployments, to avoid cascading crash-loops
        - name: wait-for-keycloak
          image: curlimages/curl:8.6.0
          command:
            - sh
            - -c
            - |
              set -e
              echo "Waiting for Keycloak to become ready..."

              until curl -sf http://consumer-keycloak-metrics:9000/health/ready > /dev/null; do
                echo "Keycloak not ready yet, retrying..."
                sleep 5
              done
              echo "Keycloak is ready."
        - name: wait-for-til
          image: curlimages/curl:8.6.0
          command:
            - sh
            - -c
            - |
              set -e
              echo "Waiting for Trusted Issuers List to become ready..."

              until curl -sf http://trusted-issuers-list.consumer.svc.cluster.local:8080/issuer > /dev/null; do
                echo "TIL not ready yet, retrying..."
                sleep 5
              done
              echo "Trusted Issuers List is ready."
        - name: load-certs
          image: "quay.io/seamware/fdsc-edc-controlplane-oid4vc:0.1.1"
          command: ["/bin/sh", "-c", "/bin/import-ca.sh /certs-folder /root-ca/cacert.pem /opt/java/openjdk/lib/security/cacerts"]
          volumeMounts:
            - name: ca-certs-script
              mountPath: /bin/import-ca.sh
              subPath: import-ca.sh
            - name: cacerts
              mountPath: /certs-folder/
            - name: root-ca
              mountPath: /root-ca/cacert.pem
              subPath: ca.crt
    config:
      issuerId: did:web:fancy-marketplace.biz
      ebsiTir:
        enabled: true
        tilAddress: http://trusted-issuers-list.consumer.svc.cluster.local:8080
      oauth:
        tokenUrl: http://identityhub-service.consumer.svc.cluster.local:8087/api/sts/token
        clientId: did:web:fancy-marketplace.biz
        secretAlias: did:web:fancy-marketplace.biz-sts-client-secret
      edc:
        participant:
          id: did:web:fancy-marketplace.biz
      oid4vp:
        enabled: true
        credentialsFolder: /credential-repo
        trustAnchorsFolder: /root-ca
        trustAll: true
        holder:
          id: did:web:fancy-marketplace.biz
          kid: did:web:fancy-marketplace.biz
          key:
            path: /signing-key/tls.key
        proxy:
          enabled: true
          host: squid-proxy.infra.svc.cluster.local
          port: 8888
      tmfExtension:
        quoteApi: http://tm-forum-api-svc.consumer.svc.cluster.local:8080/tmf-api/quote/v4
        agreementApi: http://tm-forum-api-svc.consumer.svc.cluster.local:8080/tmf-api/agreementManagement/v4
        productOrderApi: http://tm-forum-api-svc.consumer.svc.cluster.local:8080/tmf-api/productOrderingManagement/v4
        productCatalogApi: http://tm-forum-api-svc.consumer.svc.cluster.local:8080/tmf-api/productCatalogManagement/v4
        productInventoryApi: http://tm-forum-api-svc.consumer.svc.cluster.local:8080/tmf-api/productInventory/v4
        usageManagementApi: http://tm-forum-api-svc.consumer.svc.cluster.local:8080/tmf-api/usageManagement/v4
        partyCatalogApi: http://tm-forum-api-svc.consumer.svc.cluster.local:8080/tmf-api/party/v4
      # -- transfer extension is only needed at the provider side
      fdscTransfer:
        enabled: false
      dcp:
        enabled: true
        scopes:
          catalog: org.eclipse.tractusx.vc.type:MembershipCredential:read
          negotiation: org.eclipse.tractusx.vc.type:MembershipCredential:read
          transfer: org.eclipse.tractusx.vc.type:MembershipCredential:read
          version: org.eclipse.tractusx.vc.type:MembershipCredential:read


did:
  enabled: false

# edc requires keys directly addressed in the header, even if only one is used
keycloak:
  signingKey:
    did: did:web:fancy-marketplace.biz#key-1

# provides dcp functionality
identityhub:
  enabled: true
  didIngress:
    annotations:
      traefik.ingress.kubernetes.io/service.passhostheader: "true"
      traefik.ingress.kubernetes.io/router.tls: "true"
      cert-manager.io/cluster-issuer: "selfsigned-issuer"
      cert-manager.io/private-key-algorithm: "ECDSA"
      cert-manager.io/common-name: "fancy-marketplace.biz"
      cert-manager.io/alt-names: "fancy-marketplace.biz"
    hosts:
    - host: fancy-marketplace.biz
      paths:
        - /
    tls:
    - secretName: fancy-marketplace.biz-tls
      hosts:
        - fancy-marketplace.biz
  postgresql:
    host: postgres
    port: 5432
    auth:
      username: ih
      existingSecret: ih.postgres.credentials.postgresql.acid.zalan.do
      existingSecretKeyKey: "password"
  additionalVolumeMounts:
    - name: root-ca
      mountPath: /root-ca
    - name: cacerts
      mountPath: /opt/java/openjdk/lib/security/cacerts
      subPath: cacerts
  additionalVolumes:
    - name: ca-certs-script
      configMap:
        name: ca-certs-script
        defaultMode: 0755
    - name: root-ca
      secret:
        secretName: fancy-marketplace.biz-tls
        items:
          - key: ca.crt
            path: ca.crt
    - name: cacerts
      emptyDir: {}
  initContainers:
    - name: load-certs
      image: "quay.io/seamware/fdsc-edc-controlplane-oid4vc:0.1.1"
      command: ["/bin/sh", "-c", "/bin/import-ca.sh /certs-folder /root-ca/cacert.pem /opt/java/openjdk/lib/security/cacerts"]
      volumeMounts:
        - name: ca-certs-script
          mountPath: /bin/import-ca.sh
          subPath: import-ca.sh
        - name: cacerts
          mountPath: /certs-folder/
        - name: root-ca
          mountPath: /root-ca/cacert.pem
          subPath: ca.crt
  endpoints:
    identity:
      authKeyAlias: "sup3r$3cr3t"
  superuser:
    key: c3VwZXItdXNlcg==.random
  env:
    JAVA_TOOL_OPTIONS: -Dhttps.proxyHost=squid-proxy.infra.svc.cluster.local -Dhttps.proxyPort=8888 -Dhttp.proxyHost=squid-proxy.infra.svc.cluster.local -Dhttp.proxyPort=8888 -Dhttp.nonProxyHosts="*-vault|*.cluster.local" -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=5005

# required to provide the secrets for identity hub
vault:
  enabled: true