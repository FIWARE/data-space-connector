cert-manager:
  enabled: false

keycloak:
  enabled: false

decentralizedIam:
  enabled: true

  vcAuthentication:

    postgres-operator:
      enabled: false

    managedPostgres:
      enabled: true
      config:
        volume:
          storageClass: "local-path"
        users:
          ngb:
            - createdb
        databases:
          ngb: ngb
        preparedDatabases:
          ngb:
            extensions:
              postgis: public

    trusted-issuers-list:
      # only open for clean up in the tests
      ingress:
        til:
          enabled: true
          annotations:
            cert-manager.io/cluster-issuer: "selfsigned-issuer"
            cert-manager.io/private-key-algorithm: "ECDSA"
            cert-manager.io/common-name: "til-provider.127.0.0.1.nip.io"
            traefik.ingress.kubernetes.io/router.tls: "true"
          hosts:
            - host: til-provider.127.0.0.1.nip.io
              paths:
                - /
          tls:
            - secretName: til-provider.127.0.0.1.nip.io-tls
              hosts:
                - til-provider.127.0.0.1.nip.io

    credentials-config-service:
      ingress:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: "selfsigned-issuer"
          cert-manager.io/private-key-algorithm: "ECDSA"
          cert-manager.io/common-name: "provider-ccs.127.0.0.1.nip.io"
        hosts:
          - host: provider-ccs.127.0.0.1.nip.io
            paths:
              - "/"
        tls:
          - secretName: provider-ccs.127.0.0.1.nip.io-tls
            hosts:
              - provider-ccs.127.0.0.1.nip.io

    vcverifier:
      ingress:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: "selfsigned-issuer"
          cert-manager.io/private-key-algorithm: "ECDSA"
          cert-manager.io/common-name: "provider-verifier.127.0.0.1.nip.io"
        hosts:
          - host: provider-verifier.127.0.0.1.nip.io
            paths:
              - "/"
        tls:
          - secretName: provider-verifier.127.0.0.1.nip.io-tls
            hosts:
              - provider-verifier.127.0.0.1.nip.io
      deployment:
        logging:
          level: DEBUG
        verifier:
          tirAddress: https://tir.127.0.0.1.nip.io:8080/
          did: ${DID}
        server:
          host: https://provider-verifier.127.0.0.1.nip.io:8080
        configRepo:
          configEndpoint: http://credentials-config-service:8080
        additionalVolumes:
          - name: root-ca
            emptyDir: {}
          - name: ca-to-add
            secret:
              secretName: did-provider.127.0.0.1.nip.io-tls
              items:
                - key: ca.crt
                  path: ca.crt
        additionalVolumeMounts:
          - name: root-ca
            mountPath: /etc/ssl/cert.pem
            subPath: cert.pem
        additionalEnvVars:
          - name: HTTPS_PROXY
            value: "http://squid-proxy.infra.svc.cluster.local:8888"
          - name: HTTP_PROXY
            value: "http://squid-proxy.infra.svc.cluster.local:8888"
          - name: NO_PROXY
            value: "credentials-config-service,w3.org,trusted-issuers-list"
        initContainers:
          - name: add-root-ca
            image: alpine:3.21.3
            command:
              - /bin/sh
            args:
              - -c
              - |
                #!/bin/sh
                cp /etc/ssl/cert.pem /root-ca/cert.pem
                cat /root-ca/ca.crt >> /root-ca/cert.pem
            env:
              - name: CA_TO_ADD
                value: "-----BEGIN CERTIFICATE-----\nMIIFnDCCA4SgAwIBAgIBATANBgkqhkiG9w0BAQsFADBnMQswCQYDVQQGEwJERTEP\nMA0GA1UECAwGU2F4b255MRAwDgYDVQQHDAdEcmVzZGVuMRMwEQYDVQQKDApGSUNP\nREVTIENBMRMwEQYDVQQDDApGSUNPREVTLUNBMQswCQYDVQQFEwIwMTAeFw0yNTAy\nMjAwNzUwNDBaFw0zNTAyMTgwNzUwNDBaMGcxCzAJBgNVBAYTAkRFMQ8wDQYDVQQI\nDAZTYXhvbnkxEDAOBgNVBAcMB0RyZXNkZW4xEzARBgNVBAoMCkZJQ09ERVMgQ0Ex\nEzARBgNVBAMMCkZJQ09ERVMtQ0ExCzAJBgNVBAUTAjAxMIICIjANBgkqhkiG9w0B\nAQEFAAOCAg8AMIICCgKCAgEAwJguJDSWVxpHqbnvdTpqkiQI9aoYG06ccR50iY2Y\nJye8sLCHQXhDZYfdGFPR65N2veKQPolYgk95DL2587V668VjfqzlBIRkOXj5UkJ5\n50pxCzaXItn52bBmsW9QqXAyIxYFn4f1pT95NVGj+sE23FfSAS3O0qq4yTL42Czn\nSvq378PXak/OaTOJQ+xOAprnnPepEadPDcqEUe5PGSwejJGQd654dUk+VoTdHBTU\njRPdg0FkGI+PB6dpZKhSoeePpvFBznG9R5amDx/COCVzFx1YwhHpbDGMwiNLJqeb\nExiGT5o2O4GugV5RTWRFYuKr1xSTAHiY+g3fCzhQZCD+NGGuaPbkjRGjptwiDpMR\n3CgnkdZh6BqeCpnSiI6tQYpJ9ms5xcCSeTsyf4hisCbawHqbDmCjsuXsMw0WP6VG\nnyYwJ1gwR/RHHe44+zfgv/U7hfULTIb8yi/n24a2FVV0kEAF79UUQGLW7364rXGY\njrIF8vhATZbGAMQiQh1MJMV0kcM8pmqUawDSvZ/llQMhr3OgMybZ2dAsakHVWU2I\nffABGupX3vTONzkpGVYwJIJ21T0QXTPrZgUMzPX/bH+3BHog0QjJ7T3sp0aG4AKT\nBmzYDaU9rIUs47S6TqxBXRQW4xyyy7XMQvXfbe4tExjUkgNfOHQ/5TUjUuBSfjwS\nKZkCAwEAAaNTMFEwHQYDVR0OBBYEFDqF7FNIKOPtvfO6hmhXV6H35l0TMB8GA1Ud\nIwQYMBaAFDqF7FNIKOPtvfO6hmhXV6H35l0TMA8GA1UdEwEB/wQFMAMBAf8wDQYJ\nKoZIhvcNAQELBQADggIBAJ+vbD/9ajM9lOkBqKw2b4wb3Hs7A9olUeBzhnEH5hRI\ncXK+2CYvXf4PHfSyPSy33bhCeTqyeWjDN0eBM76tVUNu92/ft2Vlch27CoJjvkAK\nWO/+YiakgjAVC0IftAvs2YvZ54I6uU1C0EmdE1FcvDWAedyCypcl4871r4M8a55k\nJYg2FpfqOBJMFn9yBW1EkJlTPzzobP1H0q+GKXIMTLvyGRWrpb90DXxJu1i4jdtZ\n36sn6bb6TtT4pUC4OuhDvQ1N/LEbzKVTfRYBoMnEdlooybgZFu5t4uE0AJUgsRWq\nqnlHx2OMMBhhid+qjzo6jXXzXtIn8NjlF/IrwrGO0YrekVTMqKH5sx+4rFF0BO8X\n74N/fwZMHR6p3Zps4D72rogNGhmjZDBSt4tPVARPhAUbWXhRTPB1NunHvwHutfRk\nbBnyjC0BtKoYTqgPLOB4pkdGuuZ6E4dCZfzIE2s98QvY/RBYTUk+D2cJBuVC93RN\nv5wlx0WS46TNRWW0XP+P6cgPbkG5owqTyihuUx4eTh3Rf19wU1W+0wGQDFQ69uLL\n1T3Tkpg9btk/mhTWz4tu62r6NgwibM3KrGEJk0/oLq0z5qe52KW1mMRzRTGIb6pn\nGbGH8xZo2lxZcHzLDWVadXTdryUPDiFE90yyv6tW3GxJTkoi0BIWjYz3Wmf8qieU\n-----END CERTIFICATE-----"
            volumeMounts:
              - name: root-ca
                mountPath: /root-ca
              - name: ca-to-add
                mountPath: /root-ca/ca.crt
                subPath: ca.crt
          - name: register-at-tir
            image: curlimages/curl:8.18.0
            command:
              - /bin/sh
            args:
              - -ec
              - |
                curl -X 'POST' 'http://tir.trust-anchor.svc.cluster.local:8080/issuer' -H 'Content-Type: application/json' -d "{\"did\": \"did:web:did-provider.127.0.0.1.nip.io\", \"credentials\": []}"

  odrlAuthorization:
  
    apisix:
      etcd:
        replicaCount: 1
        persistence:
          enabled: false
      image:
        debug: true
      dataPlane:
        ingress:
          enabled: true
          hostname: mp-data-service.127.0.0.1.nip.io
          annotations:
            cert-manager.io/cluster-issuer: "selfsigned-issuer"
            cert-manager.io/private-key-algorithm: "ECDSA"
            cert-manager.io/common-name: "mp-data-service.127.0.0.1.nip.io"
          tls: true
          extraTls:
            - secretName: mp-data-service.127.0.0.1.nip.io-tls
              hosts:
                - mp-data-service.127.0.0.1.nip.io
          extraHosts:
            - name: mp-tmf-api.127.0.0.1.nip.io
              path: /
      catchAllRoute:
        enabled: false
      routes: |-
        - uri: /.well-known/openid-configuration
          host: mp-data-service.127.0.0.1.nip.io
          upstream:
            nodes:
              verifier:3000: 1
            type: roundrobin
          plugins:
            proxy-rewrite:
              uri: /services/data-service/.well-known/openid-configuration
        - uri: /.well-known/data-space-configuration
          upstream:
            nodes:
              dsconfig:3002: 1
            type: roundrobin
          plugins:
            proxy-rewrite:
              uri: /.well-known/data-space-configuration/data-space-configuration.json
            response-rewrite:
              headers:
                set:
                  content-type: application/json
        - uri: /*
          host: mp-data-service.127.0.0.1.nip.io
          upstream:
            nodes:
              data-service-scorpio:9090: 1
            type: roundrobin
          plugins:
            openid-connect:
              bearer_only: true
              use_jwks: true
              client_id: data-service
              client_secret: unused
              ssl_verify: false
              discovery: http://verifier:3000/services/data-service/.well-known/openid-configuration
            opa:
              host: "http://localhost:8181"
              policy: policy/main
              with_body: true
        - uri: /.well-known/openid-configuration
          host: mp-tmf-api.127.0.0.1.nip.io
          upstream:
            nodes:
              verifier:3000: 1
            type: roundrobin
          plugins:
            proxy-rewrite:
              uri: /services/tmf-api/.well-known/openid-configuration
        - uri: /*
          host: mp-tmf-api.127.0.0.1.nip.io
          upstream:
            nodes:
              tm-forum-api-svc:8080: 1
            type: roundrobin
          plugins:
            openid-connect:
              bearer_only: true
              use_jwks: true
              client_id: contract-management
              client_secret: unused
              ssl_verify: false
              discovery: http://verifier:3000/services/tmf-api/.well-known/openid-configuration
            opa:
              host: "http://localhost:8181"
              policy: policy/main
              with_body: true

    odrl-pap:
      additionalEnvVars:
        - name: GENERAL_ORGANIZATION_DID
          value: did:web:did-provider.127.0.0.1.nip.io
      ingress:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: "selfsigned-issuer"
          cert-manager.io/private-key-algorithm: "ECDSA"
          cert-manager.io/common-name: "pap-provider.127.0.0.1.nip.io"
        hosts:
          - host: pap-provider.127.0.0.1.nip.io
            paths:
              - "/"
        tls:
          - secretName: pap-provider.127.0.0.1.nip.io-tls
            hosts:
              - pap-provider.127.0.0.1.nip.io

did:
  enabled: true
  config:
    server:
      hostUrl: "http://did-provider.127.0.0.1.nip.io"
      certPath: "/certs/tls.crt"
    generateKey:
      enabled: true
      keyTypeToGenerate: "EC"
      country: "DE"
      state: "SAXONY"
      locality: "Dresden"
      organization: "M&P Operations Inc."
      commonName: "www.mp-operation.org"
  volumes:
    - name: certs
      secret:
        secretName: did-provider.127.0.0.1.nip.io-tls
        items:
          - key: tls.crt
            path: tls.crt
  volumeMounts:
    - name: certs
      mountPath: /certs
  ingress:
    enabled: true
    className: ""
    annotations:
      traefik.ingress.kubernetes.io/service.passhostheader: "true"
      traefik.ingress.kubernetes.io/router.tls: "true"
      cert-manager.io/cluster-issuer: "selfsigned-issuer"
      cert-manager.io/private-key-algorithm: "ECDSA"
      cert-manager.io/common-name: "did-provider.127.0.0.1.nip.io"
    hosts:
      - host: did-provider.127.0.0.1.nip.io
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls:
      - secretName: did-provider.127.0.0.1.nip.io-tls
        hosts:
          - did-provider.127.0.0.1.nip.io
dataSpaceConfig:
  enabled: true
  serviceType: ClusterIP
  port: 3002
  supportedModels:
    - "https://raw.githubusercontent.com/smart-data-models/dataModel.Consumption/master/ConsumptionPoint/schema.json"
    - "https://raw.githubusercontent.com/smart-data-models/dataModel.Consumption/master/ConsumptionCost/schema.json"
  supportedProtocols:
    - http
    - https
  authenticationProtocols:
    - oid4vp
scorpio:
  ingress:
    enabled: true
    # only to make it available for the test initialization
    annotations:
      cert-manager.io/cluster-issuer: "selfsigned-issuer"
      cert-manager.io/private-key-algorithm: "ECDSA"
      cert-manager.io/common-name: "scorpio-provider.127.0.0.1.nip.io"
    hosts:
      - host: scorpio-provider.127.0.0.1.nip.io
        paths:
          - "/"
    tls:
      - secretName: scorpio-provider.127.0.0.1.nip.io-tls
        hosts:
          - scorpio-provider.127.0.0.1.nip.io
  ccs:
    enabled: true
    defaultOidcScope:
      name: default
    oidcScopes:
      default:
        - type: UserCredential
          trustedParticipantsLists:
            - url: https://registry.127.0.0.1.nip.io
              type: gaia-x
          trustedIssuersLists:
            - http://trusted-issuers-list:8080
      operator:
        - type: OperatorCredential
          trustedParticipantsLists:
            - url: https://registry.127.0.0.1.nip.io
              type: gaia-x
          trustedIssuersLists:
            - http://trusted-issuers-list:8080

tm-forum-api:
  defaultConfig:
    contextUrl: https://uri.etsi.org/ngsi-ld/v1/ngsi-ld-core-context.jsonld
  allInOne:
    enabled: true
  apiProxy:
    enabled: false
  registration:
    ccs:
      defaultOidcScope:
        credentialTypes:
          - UserCredential
        trustedParticipantsLists: http://tir.trust-anchor.svc.cluster.local:8080
  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: "selfsigned-issuer"
      cert-manager.io/private-key-algorithm: "ECDSA"
      cert-manager.io/common-name: "tm-forum-api.127.0.0.1.nip.io"
    hosts:
      - host: tm-forum-api.127.0.0.1.nip.io
        paths:
          - /
    tls:
      - secretName: tm-forum-api.127.0.0.1.nip.io-tls
        hosts:
          - tm-forum-api.127.0.0.1.nip.io
contract-management:
  services:
    ## Config for the TM Forum Service hosting the APIs
    product-order:
      ## URL of the TM Forum Service hosting the Product Ordering API
      url: http://tm-forum-api-svc:8080
    party:
      ## URL of the TM Forum Service hosting the Party API
      url: http://tm-forum-api-svc:8080
    product-catalog:
      ## URL of the TM Forum Service hosting the Product Catalog API
      url: http://tm-forum-api-svc:8080
    service-catalog:
      ## URL of the TM Forum Service hosting the Service Catalog API
      url: http://tm-forum-api-svc:8080
    tmforum-agreement-api:
      ## URL of the TM Forum Service hosting the Agreement API
      url: http://tm-forum-api-svc:8080
    quote:
      ## URL for TM Forum Service hosting the Quote API
      url: http://tm-forum-api-svc:8080
  til:
    credentialType: OperatorCredential