apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: verifiablecredentialrequests.vc.vc-operator.io
spec:
  group: vc.vc-operator.io
  names:
    kind: VerifiableCredentialRequest
    listKind: VerifiableCredentialRequestList
    plural: verifiablecredentialrequests
    singular: verifiablecredentialrequest
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: The referenced CredentialIssuer
      jsonPath: .spec.issuerRef.name
      name: Issuer
      type: string
    - description: The requested credential type
      jsonPath: .spec.credentialType
      name: Credential Type
      type: string
    - description: The credential format
      jsonPath: .spec.format
      name: Format
      type: string
    - description: Whether a valid credential is stored
      jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - description: Credential expiry time
      jsonPath: .status.credentialExpiryTime
      name: Expiry
      type: date
    - description: Number of successful renewals
      jsonPath: .status.renewalCount
      name: Renewals
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          VerifiableCredentialRequest declares a Verifiable Credential that a service
          needs. The operator obtains the credential from the referenced CredentialIssuer
          via the OID4VCI protocol, stores it in the configured storage backend, and
          automatically renews it before expiry.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired credential and its storage configuration.
            properties:
              additionalClaims:
                additionalProperties:
                  type: string
                description: |-
                  AdditionalClaims allows specifying extra claims to include in the
                  credential request. These are issuer-specific and passed through
                  as-is in the credential request body.
                type: object
              credentialType:
                description: |-
                  CredentialType is the type identifier for the credential to request,
                  as advertised in the issuer's credential_configurations_supported metadata.
                minLength: 1
                type: string
              format:
                default: jwt_vc_json
                description: |-
                  Format specifies the credential format to request from the issuer
                  (e.g., "jwt_vc_json", "ldp_vc"). Defaults to "jwt_vc_json".
                enum:
                - jwt_vc_json
                - ldp_vc
                - jwt_vc
                - vc+sd-jwt
                type: string
              holderDID:
                description: |-
                  HolderDID optionally specifies a DID URL to include as the "kid" header
                  in the proof-of-possession JWT instead of embedding the full JWK.
                  The DID must resolve to the public key corresponding to the private
                  key referenced by HolderKeyRef.
                  Requires HolderKeyRef to be set.
                type: string
              holderKeyRef:
                description: |-
                  HolderKeyRef optionally references a Kubernetes Secret containing the
                  holder's ECDSA P-256 private key in PEM format (expected data keys:
                  "key.pem" or "tls.key"). When set, the operator uses this key to sign
                  the proof-of-possession JWT in the credential request, causing the
                  issuer to bind the credential to this key's identity.
                  When omitted, no proof-of-possession is included in the request.
                properties:
                  name:
                    description: Name is the name of the Secret.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              issuerRef:
                description: |-
                  IssuerRef references a CredentialIssuer resource in the same namespace.
                  The referenced issuer must be in a Ready state before credentials
                  can be obtained.
                properties:
                  name:
                    description: Name is the name of the referenced resource.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              renewBefore:
                description: |-
                  RenewBefore specifies how long before credential expiry the operator
                  should attempt renewal. If not specified, defaults to 5 minutes.
                type: string
              storageType:
                default: kubernetes
                description: |-
                  StorageType selects the credential storage backend.
                  Supported values: "kubernetes" (default). Future backends may include "vault".
                enum:
                - kubernetes
                type: string
              targetSecretRef:
                description: |-
                  TargetSecretRef specifies the target reference in the storage backend
                  where the obtained credential will be stored (e.g., a Kubernetes Secret name).
                properties:
                  key:
                    default: credential
                    description: |-
                      Key is the data key within the target resource under which the
                      credential will be stored. Defaults to "credential".
                    type: string
                  name:
                    description: |-
                      Name is the name of the target resource in the storage backend
                      (e.g., the Kubernetes Secret name).
                    minLength: 1
                    type: string
                required:
                - name
                type: object
            required:
            - credentialType
            - issuerRef
            - targetSecretRef
            type: object
          status:
            description: status defines the observed state of the credential request.
            properties:
              conditions:
                description: |-
                  Conditions represent the current state of the VerifiableCredentialRequest resource.

                  Condition types include:
                  - "Ready": a valid credential has been obtained and stored.
                  - "CredentialIssued": a credential was successfully obtained from the issuer.
                  - "RenewalScheduled": automatic renewal has been scheduled before expiry.
                  - "Error": a non-transient error occurred during credential acquisition.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              credentialExpiryTime:
                description: |-
                  CredentialExpiryTime is the expiry time of the currently stored credential,
                  extracted from the credential's claims (e.g., the "exp" JWT claim).
                format: date-time
                type: string
              credentialFormat:
                description: CredentialFormat is the format of the stored credential
                  (e.g., "jwt_vc_json").
                type: string
              lastIssuanceTime:
                description: LastIssuanceTime is the timestamp of the last successful
                  credential issuance.
                format: date-time
                type: string
              lastRenewalTime:
                description: |-
                  LastRenewalTime is the timestamp of the last successful credential renewal.
                  This differs from LastIssuanceTime in that it tracks only renewals,
                  not the initial issuance.
                format: date-time
                type: string
              nextRenewalTime:
                description: |-
                  NextRenewalTime is the scheduled time for the next credential renewal attempt.
                  Computed as credentialExpiryTime - renewBefore.
                format: date-time
                type: string
              renewalCount:
                description: |-
                  RenewalCount tracks the total number of times this credential has been
                  successfully renewed. This counter is monotonically increasing and is
                  useful for observability and auditing.
                format: int32
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
