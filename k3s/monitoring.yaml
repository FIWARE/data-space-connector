grafana:
  enabled: true

  grafana.ini:
    #server:
      #root_url: "%(protocol)s://%(domain)s/api/grafana"
      #serve_from_sub_path: true
    security:
      allow_embedding: true
    auth.proxy:
      enabled: true
      header_name: X-WEBAUTH-USER
      header_property: username
      auto_sign_up: true
      enable_login_token: true
  # the above configuration delegates auth to the proxy(e.g. the fdsc-dashboard). Do not enable the grafana ingress without additional auth measures
  ingress:
    enabled: false

  # sidecar that auto-imports dashboards from ConfigMaps labeled `grafana_dashboard: "1"`
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
      folderAnnotation: grafana_folder
      provider:
        foldersFromFilesStructure: true
    datasources:
      # -- enable the Kubernetes sidecar that watches for ConfigMaps
      # labelled `grafana_datasource` and auto-provisions them as
      # Grafana datasources. Required for automatic Tempo datasource
      # registration.
      enabled: true
      # -- label that the sidecar watches for on ConfigMaps. ConfigMaps
      # with this label set to "1" are imported as datasource definitions.
      label: grafana_datasource

  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-server.monitoring.svc.cluster.local
        access: proxy
      isDefault: true

fdsc-dashboard:
  enabled: true
  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: "selfsigned-issuer"
      cert-manager.io/private-key-algorithm: "ECDSA"
      cert-manager.io/common-name: "dashboard-provider.127.0.0.1.nip.io"
      cert-manager.io/alt-names: "dashboard-provider.127.0.0.1.nip.io"
      traefik.ingress.kubernetes.io/router.tls: "true"

    hosts:
      - host: dashboard-provider.127.0.0.1.nip.io
        paths:
          - "/"
    tls:
      - secretName: dashboard-provider.127.0.0.1.nip.io-tls
        hosts:
          - dashboard-provider.127.0.0.1.nip.io
  grafana:
    enabled: false
    url: http://provider-grafana:80

  apisix:
    enabled: true
    dashboardUrl: http://provider-apisix-admin:9180/ui
    adminKey: admin
  apiUrls:
    til: http://trusted-issuers-list:8080
    ccs: http://credentials-config-service:8080
    odrl: http://odrl-pap:8080
  auth:
    config:
      providers:
        - id: keycloak
          displayName: Keycloak
          issuer: https://keycloak-provider.127.0.0.1.nip.io/realms/test-realm
          clientId: did:web:mp-operations.org
          scopes: ["openid", "profile", "roles"]
          rolesClaimPath: "client_roles"
          roleMapping:
            admin: "admin"
          silentRenew: true

fdsc-dashboard:
  grafana:
    enabled: true
    panelsJson: "[{\"title\":\"\",\"path\":\"/d/apisix-routes/apisix-routes?orgId=1&from=now-1h&to=now&timezone=browser&var-datasource=PBFA97CFB590B2093&var-route=$__all&var-service=$__all&refresh=30s\",\"span\":12}]"

tracing:
  enabled: true
  autoInstrumentation:
    enabled: true

tempo:
  enabled: true

opentelemetry-operator:
  enabled: true

opentelemetry-collector:
  enabled: true

# Auto-instrumentation via OTel Operator: the operator's mutating webhook
# reads these annotations and injects the appropriate language agent into
# the pod at creation time. Static OTEL_* env vars are removed because
# the operator injects them from the Instrumentation CR.
scorpio:
  podAnnotations:
    instrumentation.opentelemetry.io/inject-java: "true"

tm-forum-api:
  defaultConfig:
    additionalAnnotations:
      instrumentation.opentelemetry.io/inject-java: "true"
    additionalEnvVars:
      - name: API_EXTENSION_ENABLED
        value: "true"
      - name: GENERAL_NGSILDORQUERYVALUE
        value: ","
      - name: GENERAL_NGSILDORQUERYKEY
        value: ","
      - name: GENERAL_ENCLOSEQUERY
        value: "false"

contract-management:
  deployment:
    additionalAnnotations:
      instrumentation.opentelemetry.io/inject-java: "true"
  additionalEnvVars:
    - name: LOGGER_LEVELS_ROOT
      value: DEBUG

decentralizedIam:
  vcAuthentication:
    trusted-issuers-list:
      deployment:
        additionalAnnotations:
          instrumentation.opentelemetry.io/inject-java: "true"
  odrlAuthorization:
    odrl-pap:
      deployment:
        additionalAnnotations:
          instrumentation.opentelemetry.io/inject-java: "true"
    # APISIX native OpenTelemetry plugin: traces are produced by the
    # built-in Lua plugin, not by the Kubernetes OTel Operator.
    # opentelemetry is NOT in APISIX's default plugin list, so it must
    # be added explicitly. Setting apisix.plugins overrides the entire
    # default list, so all needed plugins must be listed here.
    # pluginAttrs configures the collector connection. A global rule is
    # registered via the admin API so the plugin runs on every route
    # (see apisix-otel-global-rule-job.yaml).
    apisix:
      apisix:
        plugins:
          - real-ip
          - client-control
          - proxy-control
          - request-id
          - zipkin
          - ext-plugin-pre-req
          - fault-injection
          - mocking
          - serverless-pre-function
          - cors
          - ip-restriction
          - ua-restriction
          - referer-restriction
          - csrf
          - uri-blocker
          - request-validation
          - multi-auth
          - openid-connect
          - wolf-rbac
          - ldap-auth
          - hmac-auth
          - basic-auth
          - jwt-auth
          - key-auth
          - consumer-restriction
          - forward-auth
          - opa
          - authz-keycloak
          - proxy-cache
          - body-transformer
          - proxy-mirror
          - proxy-rewrite
          - workflow
          - api-breaker
          - limit-conn
          - limit-count
          - limit-req
          - gzip
          - traffic-split
          - redirect
          - response-rewrite
          - grpc-transcode
          - grpc-web
          - public-api
          - prometheus
          - datadog
          - echo
          - http-logger
          - skywalking-logger
          - tcp-logger
          - kafka-logger
          - syslog
          - udp-logger
          - file-logger
          - clickhouse-logger
          - ext-plugin-post-req
          - ext-plugin-post-resp
          - opentelemetry
        pluginAttrs:
          opentelemetry:
            resource:
              service.name: apisix
            collector:
              address: provider-opentelemetry-collector:4317
              request_timeout: 3
            trace_id_source: x-request-id
            batch_span_processor:
              max_queue_size: 1024
              batch_timeout: 2
              inactive_timeout: 1
              max_export_batch_size: 16

marketplace:
  bizEcosystemChargingBackend:
    deployment:
      additionalAnnotations:
        instrumentation.opentelemetry.io/inject-python: "true"
    extraEnvVars:
      - name: OTEL_SDK_DISABLED
        value: "false"
      - name: OTEL_SERVICE_NAME
        value: "marketplace-charging-backend"
  bizEcosystemLogicProxy:
    statefulset:
      additionalAnnotations:
        instrumentation.opentelemetry.io/inject-nodejs: "true"
    additionalEnvVars:
      - name: OTEL_SDK_DISABLED
        value: "false"
      - name: OTEL_SERVICE_NAME
        value: "marketplace-logic-proxy"
