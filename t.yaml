apiVersion: v1
kind: ConfigMap
metadata:
  name: dsc-grafana-tempo-datasource
  namespace: "default"
  labels:
    app.kubernetes.io/name: data-space-connector
    helm.sh/chart: data-space-connector-10.3.0
    app.kubernetes.io/instance: dsc
    app.kubernetes.io/managed-by: Helm
    grafana_datasource: "1"
data:
  tempo-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Tempo
        type: tempo
        access: proxy
        url: http://dsc-tempo:3200
        isDefault: true
        editable: true
