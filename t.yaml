apiVersion: apps/v1
kind: Deployment
metadata:
  name: dsc-apisix
  namespace: default
  labels:
    helm.sh/chart: apisix-2.13.0
    
    app.kubernetes.io/name: apisix
    app.kubernetes.io/instance: dsc
    app.kubernetes.io/version: "3.15.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      
      app.kubernetes.io/name: apisix
      app.kubernetes.io/instance: dsc
  template:
    metadata:
      annotations:
        checksum/config: ef9a9fd47d8e6cb2df573c9212841d18589324cff001c61b5d08083945105f21
        
        prometheus.io/path: /apisix/prometheus/metrics
        prometheus.io/port: "9091"
        prometheus.io/scrape: "true"
      labels:
        
        app.kubernetes.io/name: apisix
        app.kubernetes.io/instance: dsc
    spec:
      serviceAccountName: default
      containers:
        - name: apisix
          image: "apache/apisix:3.15.0-ubuntu"
          command: ["sh", "-c","ln -s /apisix-config/apisix.yaml /usr/local/apisix/conf/apisix.yaml && /docker-entrypoint.sh docker-start"]
          imagePullPolicy: IfNotPresent
          env:

          ports:
            - name: http
              containerPort: 9080
              protocol: TCP     
            - name: tls
              containerPort: 9443
              protocol: TCP
            - name: admin
              containerPort: 9180
              protocol: TCP
            - name: control
              containerPort: 9090
              protocol: TCP
            - name: prometheus
              containerPort: 9091
              protocol: TCP
          readinessProbe:
            failureThreshold: 6
            initialDelaySeconds: 10
            periodSeconds: 10
            successThreshold: 1
            tcpSocket:
              port: 9080
            timeoutSeconds: 1
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - "sleep 30"
          volumeMounts:
            - mountPath: /apisix-config
              name: apisix-admin
            - mountPath: /usr/local/apisix/conf/config.yaml
              name: apisix-config
              subPath: config.yaml
            - mountPath: /opts/custom_plugins/apisix/plugins/opa.lua
              name: plugin-opa-lua
              subPath: opa.lua
            - mountPath: /opts/custom_plugins/apisix/plugins/helper.lua
              name: plugin-opa-lua
              subPath: helper.lua
          resources:
            {}
        - args:
          - run
          - --ignore=.*
          - --server
          - -l
          - debug
          - -c
          - /config/opa.yaml
          - --addr
          - 0.0.0.0:8181
          - /tpp/tpp.rego
          image: openpolicyagent/opa:1.11.0
          imagePullPolicy: IfNotPresent
          name: open-policy-agent
          ports:
          - containerPort: 8181
            name: opa-http
            protocol: TCP
          volumeMounts:
          - mountPath: /config
            name: opa-config
          - mountPath: /tpp
            name: tpp-policy
      hostNetwork: false
      initContainers:
        - name: wait-etcd
          image: busybox:1.28
          command: ['sh', '-c', "until nc -z dsc-etcd.default.svc.cluster.local 2379; do echo waiting for etcd `date`; sleep 2; done;"]
      volumes:
        - configMap:
            name: apisix-routes
          name: apisix-admin
        - configMap:
            name: dsc-apisix
          name: apisix-config
        - name: plugin-opa-lua
          configMap:
            name: opa-lua
        - configMap:
            name: tpp-policy
          name: tpp-policy
        - configMap:
            name: opa-config
          name: opa-config
