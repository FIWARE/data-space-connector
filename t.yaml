# Source: data-space-connector/templates/keycloak-tracing-cm.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: dsc-keycloak-tracing
  namespace: "default"
  labels:
    app.kubernetes.io/name: data-space-connector
    helm.sh/chart: data-space-connector-10.3.0
    app.kubernetes.io/instance: dsc
    app.kubernetes.io/managed-by: Helm
data:
  # Keycloak 25+ native OpenTelemetry support toggle
  KC_TRACING_ENABLED: "true"
  OTEL_SERVICE_NAME: "keycloak"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://dsc-opentelemetry-collector:4317"
  OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
  OTEL_EXPORTER_OTLP_INSECURE: "true"
  # Quarkus-specific env vars required because Keycloak's Quarkus runtime
  # does not read the standard OTEL_EXPORTER_OTLP_ENDPOINT for traces.
  QUARKUS_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://dsc-opentelemetry-collector:4317"
  QUARKUS_OTEL_EXPORTER_OTLP_TRACES_PROTOCOL: "grpc"
  OTEL_TRACES_SAMPLER: "parentbased_traceidratio"
  OTEL_TRACES_SAMPLER_ARG: "1.0"
  OTEL_PROPAGATORS: "tracecontext,baggage"
  OTEL_RESOURCE_ATTRIBUTES: "service.name=keycloak"
  OTEL_METRICS_EXPORTER: "none"
  OTEL_LOGS_EXPORTER: "none"
---
# Source: data-space-connector/templates/otel-collector-config-cm.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: dsc-otel-collector-config
  namespace: "default"
  labels:
    app.kubernetes.io/name: data-space-connector
    helm.sh/chart: data-space-connector-10.3.0
    app.kubernetes.io/instance: dsc
    app.kubernetes.io/managed-by: Helm
data:
  relay: |
    exporters:
      debug:
        verbosity: basic
      otlp/tempo:
        endpoint: http://dsc-tempo:4317
        tls:
          insecure: true
    extensions:
      health_check:
        endpoint: ${env:MY_POD_IP}:13133
    processors:
      batch:
        send_batch_max_size: 1024
        send_batch_size: 512
        timeout: 5s
      filter/healthcheck:
        error_mode: ignore
        traces:
          span:
          - IsMatch(attributes["url.path"], ".*/health.*") or IsMatch(attributes["url.path"],
            ".*/ready.*") or IsMatch(attributes["url.path"], ".*/prometheus.*")
          - IsMatch(attributes["http.target"], ".*/health.*") or IsMatch(attributes["http.target"],
            ".*/ready.*") or IsMatch(attributes["http.target"], ".*/prometheus.*")
      memory_limiter:
        check_interval: 5s
        limit_percentage: 80
        spike_limit_percentage: 25
      resource:
        attributes:
        - action: upsert
          key: deployment.environment
          value: development
        - action: upsert
          key: service.namespace
          value: fiware-dsc
    receivers:
      jaeger:
        protocols:
          grpc:
            endpoint: ${env:MY_POD_IP}:14250
          thrift_compact:
            endpoint: ${env:MY_POD_IP}:6831
          thrift_http:
            endpoint: ${env:MY_POD_IP}:14268
      otlp:
        protocols:
          grpc:
            endpoint: ${env:MY_POD_IP}:4317
          http:
            endpoint: ${env:MY_POD_IP}:4318
      prometheus:
        config:
          scrape_configs:
          - job_name: opentelemetry-collector
            scrape_interval: 10s
            static_configs:
            - targets:
              - ${env:MY_POD_IP}:8888
      zipkin:
        endpoint: ${env:MY_POD_IP}:9411
    service:
      extensions:
      - health_check
      pipelines:
        logs:
          exporters:
          - debug
          processors:
          - memory_limiter
          - batch
          receivers:
          - otlp
        metrics:
          exporters:
          - debug
          processors:
          - memory_limiter
          - batch
          receivers:
          - otlp
          - prometheus
        traces:
          exporters:
          - debug
          - otlp/tempo
          processors:
          - memory_limiter
          - filter/healthcheck
          - resource
          - batch
          receivers:
          - otlp
      telemetry:
        metrics:
          readers:
          - pull:
              exporter:
                prometheus:
                  host: ${env:MY_POD_IP}
                  port: 8888
        resource:
          host.name: ${env:OTEL_K8S_NODE_NAME}
          k8s.namespace.name: ${env:OTEL_K8S_NAMESPACE}
          k8s.node.ip: ${env:OTEL_K8S_NODE_IP}
          k8s.node.name: ${env:OTEL_K8S_NODE_NAME}
          k8s.pod.ip: ${env:OTEL_K8S_POD_IP}
          k8s.pod.name: ${env:OTEL_K8S_POD_NAME}
---
