        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: copy-quarkus-lib
          securityContext: 
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: false
            runAsGroup: 1001
            runAsNonRoot: true
            runAsUser: 1001
          image: quay.io/seamware/keycloak:26.6.3
          imagePullPolicy: Always
          command: ["sh", "-c", "cp -r /opt/keycloak/lib/quarkus/* /shared-quarkus/"]
          volumeMounts:
            - name: keycloak-lib-quarkus
              mountPath: /shared-quarkus
          resources:
            {}
      containers:
        - name: keycloak
          securityContext: 
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: false
            runAsGroup: 1001
            runAsNonRoot: true
            runAsUser: 1001
          image: quay.io/seamware/keycloak:26.6.3
          imagePullPolicy: Always
          command:
            - /opt/keycloak/bin/kc.sh
          args:
            - start
            - --import-realm
            - --http-enabled=true
            - --hostname-strict=false
            - --proxy-headers=xforwarded
            - --http-port=8080
            - --https-port=8443
            - --db=postgres
            - --db-url=jdbc:postgresql://postgres:5432/keycloakdb
            - --features=oid4vc-vci,oid4vc-vci-preauth-code,oid4vc-vci-rest-credential-offer
            - --metrics-enabled=true
            - --health-enabled=true
          env:
            - name: KC_HTTP_RELATIVE_PATH
              value: "/"
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: "keycloak-admin"
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: issuance-secret
                  key: keycloak-admin
            - name: KC_DB
              value: postgres
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres.postgres.credentials.postgresql.acid.zalan.do
                  key: username
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres.postgres.credentials.postgresql.acid.zalan.do
                  key: password
            - name: KC_HEAP_SIZE
              value: 1024m
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: management
              containerPort: 9000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health/live
              port: management
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 20
          readinessProbe:
            httpGet:
              path: /health/ready
              port: management
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 20
          startupProbe:
            httpGet:
              path: /health/live
              port: management
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 60
          resources:
            limits:
              cpu: "1"
              memory: 2Gi
            requests:
              cpu: "0.5"
              memory: 500Mi
          volumeMounts:
            - name: data
              mountPath: /opt/keycloak/data
            - name: tmp
              mountPath: /tmp
            - name: keycloak-work
              mountPath: /opt/keycloak/work
            - name: keycloak-lib-quarkus
              mountPath: /opt/keycloak/lib/quarkus
            - name: keycloak-themes
              mountPath: /opt/keycloak/themes
            - name: keycloak-providers
              mountPath: /opt/keycloak/providers
            - mountPath: /opt/keycloak/data/import
              name: realms
      volumes:
        - name: data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: keycloak-work
          emptyDir: {}
        - name: keycloak-lib-quarkus
          emptyDir: {}
        - name: keycloak-themes
          emptyDir: {}
        - name: keycloak-providers
