# Source: data-space-connector/templates/otel-restart-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: dsc-otel-restart
  namespace: "default"
  labels:
    app.kubernetes.io/name: data-space-connector
    helm.sh/chart: data-space-connector-10.3.0
    app.kubernetes.io/instance: dsc
    app.kubernetes.io/managed-by: Helm
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-restart
        app.kubernetes.io/instance: dsc
    spec:
      serviceAccountName: dsc-otel-restart
      restartPolicy: Never
      containers:
        - name: restart
          image: bitnami/kubectl:latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              WEBHOOK_SVC="dsc-opentelemetry-operator-webhook"
              NS="default"

              echo "Waiting for operator webhook endpoints..."
              until kubectl get endpoints "$WEBHOOK_SVC" -n "$NS" \
                -o jsonpath='{.subsets[0].addresses[0].ip}' 2>/dev/null | grep -q .; do
                sleep 5
              done
              echo "Webhook ready."

              echo "Restarting annotated deployments..."
              for deploy in $(kubectl get deployments -n "$NS" -o json | \
                jq -r '.items[] |
                  select(.spec.template.metadata.annotations // {} |
                    keys[] | startswith("instrumentation.opentelemetry.io/inject-")) |
                  .metadata.name' 2>/dev/null | sort -u); do
                echo "  Restarting deployment/$deploy"
                kubectl rollout restart "deployment/$deploy" -n "$NS"
              done

              echo "Restarting annotated statefulsets..."
              for sts in $(kubectl get statefulsets -n "$NS" -o json | \
                jq -r '.items[] |
                  select(.spec.template.metadata.annotations // {} |
                    keys[] | startswith("instrumentation.opentelemetry.io/inject-")) |
                  .metadata.name' 2>/dev/null | sort -u); do
                echo "  Restarting statefulset/$sts"
                kubectl rollout restart "statefulset/$sts" -n "$NS"
              done

              echo "Done."
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
---
