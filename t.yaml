# Source: data-space-connector/templates/apisix-otel-global-rule-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: dsc-apisix-otel-rule
  namespace: "default"
  labels:
    app.kubernetes.io/name: data-space-connector
    helm.sh/chart: data-space-connector-10.3.0
    app.kubernetes.io/instance: dsc
    app.kubernetes.io/managed-by: Helm
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: apisix-otel-rule
        app.kubernetes.io/instance: dsc
    spec:
      restartPolicy: Never
      containers:
        - name: register-rule
          image: bitnami/kubectl:latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              APISIX_ADMIN="http://dsc-apisix-admin:9180"
              API_KEY="edd1c9f034335f136f87ad84b625c8f1"

              echo "Waiting for APISIX admin API..."
              until curl -sf -o /dev/null "$APISIX_ADMIN/apisix/admin/routes" \
                -H "X-API-KEY: $API_KEY"; do
                sleep 5
              done
              echo "APISIX admin API ready."

              echo "Registering opentelemetry global rule..."
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                -X PUT "$APISIX_ADMIN/apisix/admin/global_rules/otel-tracing" \
                -H "X-API-KEY: $API_KEY" \
                -H "Content-Type: application/json" \
                -d '{"plugins":{"opentelemetry":{}}}')

              if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
                echo "Global rule registered (HTTP $HTTP_CODE)."
              else
                echo "Failed to register global rule (HTTP $HTTP_CODE)."
                exit 1
              fi
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
