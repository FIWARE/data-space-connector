name: Release

on:
  push:
    branches:
      - main

jobs:

    generate-version:
      name: "Generate version"
      runs-on: ubuntu-latest

      outputs:
        version: ${{ steps.out.outputs.version }}

      steps:
        - uses: actions/checkout@v5

        - uses: actions/setup-java@v1
          with:
            java-version: '17'
            java-package: jdk

        - id: pr
          uses: actions-ecosystem/action-get-merged-pull-request@v1.0.1
          with:
            github_token: ${{ secrets.GITHUB_TOKEN }}

        - name: Match semver label via bash
          id: match-label-bash
          run: |
            LABELS=$(cat <<-END
            ${{ steps.pr.outputs.labels }}
            END
            )
            IFS='\n' read -ra LABEL <<< "$LABELS"
            for i in "${LABEL[@]}"; do
                echo $i
                case $i in
                    # Will just use the first occurence
                    'major'|'minor'|'patch')
                        echo "RELEASE_LABEL=$i" >> $GITHUB_OUTPUT
                        break
                esac
            done
          
        - uses: zwaldowski/semver-release-action@v2
          with:
            dry_run: true
            bump: minor
            github_token: ${{ secrets.GITHUB_TOKEN }}

        - name: Set version output
          id: out
          run: echo "version=${VERSION}" >> $GITHUB_OUTPUT

    deploy:
      name: "Release charts"
      needs:
        - "generate-version"
      runs-on: ubuntu-latest

      steps:
        - uses: actions/checkout@v5

        - name: Fetch history
          run: git fetch --prune --unshallow

        - name: Configure Git
          run: |
            git config user.name "$GITHUB_ACTOR"
            git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

        - name: Install Helm
          run: |
            curl -fsSLo get_helm.sh https://raw.githubusercontent.com/helm/helm/master/scripts/get-helm-3
            chmod 700 get_helm.sh
            ./get_helm.sh

        - name: Run chart-releaser
          uses: helm/chart-releaser-action@v1.5.0
          env:
            CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
            CR_SKIP_EXISTING: true

    git-release:
      name: "Create Git Release"
      needs: ["generate-version", "deploy"]
      runs-on: ubuntu-latest

      steps:

        - uses: actions/checkout@v5

        - name: Generate Table of contents
          uses: technote-space/toc-generator@v4
          with:
            TARGET_PATHS: "./README.md,./doc/README.md"
            COMMIT_MESSAGE: "Update ToC"

        - uses: "marvinpinto/action-automatic-releases@latest"
          with:
            repo_token: "${{ secrets.GITHUB_TOKEN }}"
            automatic_release_tag: ${{ needs.generate-version.outputs.version }}
            prerelease: false
            title: ${{ needs.generate-version.outputs.version }}
            files: |
              LICENSE

    oci-release:
      name: "Publish OCI artifact"
      needs: ["deploy"]
      runs-on: ubuntu-latest

      steps:
        - uses: actions/checkout@v5

        - name: Install Helm
          uses: azure/setup-helm@v4

        - name: Get chart version
          id: version
          run: |
            CHART_VERSION=$(grep '^version:' charts/data-space-connector/Chart.yaml | awk '{print $2}')
            echo "version=$CHART_VERSION" >> $GITHUB_OUTPUT

        - name: Login to quay.io
          run: helm registry login quay.io -u ${{ secrets.QUAY_USERNAME }} -p ${{ secrets.QUAY_PASSWORD }}

        - name: Check if version already exists
          id: check
          run: |
            if helm show chart oci://quay.io/fiware/helm-charts/data-space-connector --version ${{ steps.version.outputs.version }} > /dev/null 2>&1; then
              echo "exists=true" >> $GITHUB_OUTPUT
              echo "Version ${{ steps.version.outputs.version }} already exists in quay.io, skipping push"
            else
              echo "exists=false" >> $GITHUB_OUTPUT
              echo "Version ${{ steps.version.outputs.version }} not found in quay.io, will publish"
            fi

        - name: Add Helm repositories
          if: steps.check.outputs.exists == 'false'
          run: |
            helm repo add fiware-iam https://fiware.github.io/decentralized-iam
            helm repo add mongodb https://mongodb.github.io/helm-charts
            helm repo add hashicorp https://helm.releases.hashicorp.com
            helm repo add jetstack https://charts.jetstack.io
            helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
            helm repo add grafana-community https://grafana-community.github.io/helm-charts
            helm repo add open-telemetry https://open-telemetry.github.io/opentelemetry-helm-charts
            helm repo add grafana https://grafana.github.io/helm-charts

        - name: Build dependencies
          if: steps.check.outputs.exists == 'false'
          run: helm dependency update charts/data-space-connector

        - name: Package chart
          if: steps.check.outputs.exists == 'false'
          run: helm package charts/data-space-connector

        - name: Push OCI artifact
          if: steps.check.outputs.exists == 'false'
          run: helm push data-space-connector-${{ steps.version.outputs.version }}.tgz oci://quay.io/fiware/helm-charts

