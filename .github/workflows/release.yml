name: Release

on:
  push:
    branches:
      - main

jobs:

    generate-version:
      name: "Generate version"
      runs-on: ubuntu-latest

      outputs:
        version: ${{ steps.out.outputs.version }}

      steps:
        - uses: actions/checkout@v6

        - uses: actions/setup-java@v5
          with:
            java-version: '17'
            distribution: temurin

        - name: Match semver label via bash
          id: match-label-bash
          run: |
            LABELS=$(gh pr list --state merged --base main --limit 1 --json labels \
              --jq '.[] | .labels[].name')
            for i in $LABELS; do
                case $i in
                    # Will just use the first occurence
                    'major'|'minor'|'patch')
                        echo "RELEASE_LABEL=$i" >> $GITHUB_OUTPUT
                        break
                esac
            done
          env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
        - uses: zwaldowski/semver-release-action@v2
          with:
            dry_run: true
            bump: minor
            github_token: ${{ secrets.GITHUB_TOKEN }}

        - name: Set version output
          id: out
          run: echo "version=${VERSION}" >> $GITHUB_OUTPUT

    deploy:
      name: "Release charts"
      needs:
        - "generate-version"
      runs-on: ubuntu-latest

      steps:
        - uses: actions/checkout@v6

        - name: Fetch history
          run: git fetch --prune --unshallow

        - name: Configure Git
          run: |
            git config user.name "$GITHUB_ACTOR"
            git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

        - name: Install Helm
          run: |
            curl -fsSLo get_helm.sh https://raw.githubusercontent.com/helm/helm/master/scripts/get-helm-3
            chmod 700 get_helm.sh
            ./get_helm.sh

        - name: Run chart-releaser
          uses: helm/chart-releaser-action@v1.7.0
          env:
            CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
            CR_SKIP_EXISTING: true

    git-release:
      name: "Create Git Release"
      needs: ["generate-version", "deploy"]
      runs-on: ubuntu-latest

      steps:

        - uses: actions/checkout@v6

        - name: Generate Table of contents
          uses: technote-space/toc-generator@v4
          with:
            TARGET_PATHS: "./README.md,./doc/README.md"
            COMMIT_MESSAGE: "Update ToC"

        - name: Create release
          run: |
            gh release create ${{ needs.generate-version.outputs.version }} \
              --title "${{ needs.generate-version.outputs.version }}" \
              LICENSE
          env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

