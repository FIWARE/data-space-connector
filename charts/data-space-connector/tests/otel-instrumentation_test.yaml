# ---------------------------------------------------------------------------
# Helm-unittest suite for the OpenTelemetry Operator Instrumentation CR.
#
# Covers the otel-instrumentation.yaml template which renders the
# `Instrumentation` custom resource used by the OTel Operator's mutating
# webhook to inject auto-instrumentation agents into annotated pods.
# ---------------------------------------------------------------------------
suite: OpenTelemetry Operator - Instrumentation CR
templates:
  - templates/otel-instrumentation.yaml
tests:
  # ==========================================================================
  # Auto-instrumentation disabled (default)
  # ==========================================================================

  - it: should not render Instrumentation CR when autoInstrumentation is disabled
    set:
      tracing.autoInstrumentation.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render Instrumentation CR when tracing.autoInstrumentation is absent
    asserts:
      - hasDocuments:
          count: 0

  # ==========================================================================
  # Auto-instrumentation enabled — basic rendering
  # ==========================================================================

  - it: should render Instrumentation CR when autoInstrumentation is enabled
    set:
      tracing.autoInstrumentation.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Instrumentation
      - isAPIVersion:
          of: opentelemetry.io/v1alpha1

  - it: should use release-name-based CR name
    set:
      tracing.autoInstrumentation.enabled: true
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-auto-instrumentation

  - it: should set namespace from release namespace
    set:
      tracing.autoInstrumentation.enabled: true
    asserts:
      - equal:
          path: metadata.namespace
          value: "NAMESPACE"

  # ==========================================================================
  # Exporter endpoint
  # ==========================================================================

  - it: should use default collector endpoint when tracing.exporter.otlp.endpoint is empty
    set:
      tracing.autoInstrumentation.enabled: true
    asserts:
      - equal:
          path: spec.exporter.endpoint
          value: "http://RELEASE-NAME-opentelemetry-collector:4317"

  - it: should use custom endpoint when tracing.exporter.otlp.endpoint is set
    set:
      tracing.autoInstrumentation.enabled: true
      tracing.exporter.otlp.endpoint: "http://custom-collector:4317"
    asserts:
      - equal:
          path: spec.exporter.endpoint
          value: "http://custom-collector:4317"

  # ==========================================================================
  # Propagators
  # ==========================================================================

  - it: should use default propagators (tracecontext and baggage)
    set:
      tracing.autoInstrumentation.enabled: true
    asserts:
      - equal:
          path: spec.propagators
          value:
            - tracecontext
            - baggage

  - it: should use custom propagators
    set:
      tracing.autoInstrumentation.enabled: true
      tracing.propagators: "tracecontext,baggage,b3"
    asserts:
      - equal:
          path: spec.propagators
          value:
            - tracecontext
            - baggage
            - b3

  # ==========================================================================
  # Sampler
  # ==========================================================================

  - it: should use default sampler settings
    set:
      tracing.autoInstrumentation.enabled: true
    asserts:
      - equal:
          path: spec.sampler.type
          value: parentbased_traceidratio
      - equal:
          path: spec.sampler.argument
          value: "1.0"

  - it: should use custom sampler settings
    set:
      tracing.autoInstrumentation.enabled: true
      tracing.sampler: "always_on"
      tracing.samplerArg: "0.5"
    asserts:
      - equal:
          path: spec.sampler.type
          value: always_on
      - equal:
          path: spec.sampler.argument
          value: "0.5"

  # ==========================================================================
  # Environment variables
  # ==========================================================================

  - it: should set gRPC protocol and disable metrics and logs exporters in the CR env
    set:
      tracing.autoInstrumentation.enabled: true
    asserts:
      - contains:
          path: spec.env
          content:
            name: OTEL_EXPORTER_OTLP_PROTOCOL
            value: "grpc"
      - contains:
          path: spec.env
          content:
            name: OTEL_METRICS_EXPORTER
            value: "none"
      - contains:
          path: spec.env
          content:
            name: OTEL_LOGS_EXPORTER
            value: "none"

  # ==========================================================================
  # Agent images
  # ==========================================================================

  - it: should use default Java agent image
    set:
      tracing.autoInstrumentation.enabled: true
    asserts:
      - equal:
          path: spec.java.image
          value: "ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-java:2.11.0"

  - it: should use default Python agent image
    set:
      tracing.autoInstrumentation.enabled: true
    asserts:
      - equal:
          path: spec.python.image
          value: "ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-python:0.52b1"

  - it: should use default Node.js agent image
    set:
      tracing.autoInstrumentation.enabled: true
    asserts:
      - equal:
          path: spec.nodejs.image
          value: "ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-nodejs:0.57.0"

  - it: should use custom Java agent image when overridden
    set:
      tracing.autoInstrumentation.enabled: true
      tracing.autoInstrumentation.java.image: "my-registry/java-agent:1.0.0"
    asserts:
      - equal:
          path: spec.java.image
          value: "my-registry/java-agent:1.0.0"

  - it: should use custom Python agent image when overridden
    set:
      tracing.autoInstrumentation.enabled: true
      tracing.autoInstrumentation.python.image: "my-registry/python-agent:1.0.0"
    asserts:
      - equal:
          path: spec.python.image
          value: "my-registry/python-agent:1.0.0"

  - it: should use custom Node.js agent image when overridden
    set:
      tracing.autoInstrumentation.enabled: true
      tracing.autoInstrumentation.nodejs.image: "my-registry/nodejs-agent:1.0.0"
    asserts:
      - equal:
          path: spec.nodejs.image
          value: "my-registry/nodejs-agent:1.0.0"
