# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
#
# ---------------------------------------------------------------------------
# Helm-unittest suite for the Keycloak tracing Secret.
#
# The Secret is injected into the CloudPirates Keycloak subchart via the
# `extraEnvVarsSecret` hook and provides OTEL_* / QUARKUS_OTEL_* / KC_*
# environment variables for Keycloak's built-in tracing support.
# ---------------------------------------------------------------------------
suite: OpenTelemetry tracing - Keycloak Secret
templates:
  - templates/keycloak-tracing-secret.yaml
tests:
  # ==========================================================================
  # Rendering gate
  # ==========================================================================

  - it: should not render when keycloak is disabled
    set:
      keycloak.enabled: false
      tracing.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: should render an empty-data Secret when tracing is disabled
    set:
      keycloak.enabled: true
      tracing.enabled: false
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - isNull:
          path: stringData

  - it: should render stringData entries when tracing is enabled
    set:
      keycloak.enabled: true
      tracing.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - isNotNull:
          path: stringData

  # ==========================================================================
  # Keycloak-specific env vars
  # ==========================================================================

  - it: should set KC_TRACING_ENABLED to true when tracing is on
    set:
      keycloak.enabled: true
      tracing.enabled: true
    asserts:
      - equal:
          path: stringData.KC_TRACING_ENABLED
          value: "true"

  - it: should set OTEL_SERVICE_NAME to keycloak by default
    set:
      keycloak.enabled: true
      tracing.enabled: true
    asserts:
      - equal:
          path: stringData.OTEL_SERVICE_NAME
          value: "keycloak"

  - it: should use custom service name when keycloak.tracing.serviceName is set
    set:
      keycloak.enabled: true
      tracing.enabled: true
      keycloak.tracing.serviceName: my-keycloak
    asserts:
      - equal:
          path: stringData.OTEL_SERVICE_NAME
          value: "my-keycloak"

  # ==========================================================================
  # Standard OTEL env vars
  # ==========================================================================

  - it: should set default OTLP endpoint
    set:
      keycloak.enabled: true
      tracing.enabled: true
    asserts:
      - equal:
          path: stringData.OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://RELEASE-NAME-opentelemetry-collector:4317"

  - it: should use custom OTLP endpoint when configured
    set:
      keycloak.enabled: true
      tracing.enabled: true
      tracing.exporter.otlp.endpoint: "http://external-collector:4317"
    asserts:
      - equal:
          path: stringData.OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://external-collector:4317"

  - it: should set gRPC protocol by default
    set:
      keycloak.enabled: true
      tracing.enabled: true
    asserts:
      - equal:
          path: stringData.OTEL_EXPORTER_OTLP_PROTOCOL
          value: "grpc"

  - it: should disable metrics and logs exporters
    set:
      keycloak.enabled: true
      tracing.enabled: true
    asserts:
      - equal:
          path: stringData.OTEL_METRICS_EXPORTER
          value: "none"
      - equal:
          path: stringData.OTEL_LOGS_EXPORTER
          value: "none"

  # ==========================================================================
  # Quarkus-specific env vars
  # ==========================================================================

  - it: should set Quarkus OTEL traces endpoint
    set:
      keycloak.enabled: true
      tracing.enabled: true
    asserts:
      - equal:
          path: stringData.QUARKUS_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
          value: "http://RELEASE-NAME-opentelemetry-collector:4317"

  - it: should set Quarkus OTEL traces protocol
    set:
      keycloak.enabled: true
      tracing.enabled: true
    asserts:
      - equal:
          path: stringData.QUARKUS_OTEL_EXPORTER_OTLP_TRACES_PROTOCOL
          value: "grpc"

  # ==========================================================================
  # Per-component override
  # ==========================================================================

  - it: should enable tracing via keycloak.tracing.enabled even when global is off
    set:
      keycloak.enabled: true
      tracing.enabled: false
      keycloak.tracing.enabled: true
    asserts:
      - equal:
          path: stringData.KC_TRACING_ENABLED
          value: "true"
      - isNotNull:
          path: stringData.OTEL_EXPORTER_OTLP_ENDPOINT

  - it: should disable tracing via keycloak.tracing.enabled even when global is on
    set:
      keycloak.enabled: true
      tracing.enabled: true
      keycloak.tracing.enabled: false
    asserts:
      - isNull:
          path: stringData
