apiVersion: v2
name: data-space-connector
description: Umbrella Chart for the FIWARE Data Space Connector, combining all essential parts to be used by a participant.
type: application
version: 10.3.0
dependencies:
  - name: decentralized-iam
    alias: decentralizedIam
    condition: decentralizedIam.enabled
    version: 2.1.16
    repository: https://fiware.github.io/decentralized-iam
  # data-service
  - name: scorpio-broker-aaio
    alias: scorpio
    condition: scorpio.enabled
    repository: oci://quay.io/fiware/helm-charts
    version: 0.4.15
  # issuance
  - name: keycloak
    condition: keycloak.enabled
    version: 0.21.7
    repository: oci://registry-1.docker.io/cloudpirates
  # contract management
  - name: tm-forum-api
    condition: tm-forum-api.enabled
    version: 0.17.10
    repository: oci://quay.io/fiware/helm-charts
  - name: contract-management
    condition: contract-management.enabled
    version: 3.5.31
    repository: oci://quay.io/fiware/helm-charts
  # marketplace
  - name: business-api-ecosystem
    alias: marketplace
    condition: marketplace.enabled
    version: 1.0.4
    repository: oci://quay.io/fiware/helm-charts
  - name: community-operator
    alias: mongo-operator
    condition: mongo-operator.enabled
    version: 0.13.0
    repository: https://mongodb.github.io/helm-charts
  # dsp
  - name: fdsc-edc
    condition: fdsc-edc.enabled
    version: 0.2.10
    repository: oci://quay.io/fiware/helm-charts
  - name: vault
    alias: vault
    condition: vault.enabled
    version: 0.29.1
    repository: https://helm.releases.hashicorp.com
  # dashboard
  - name: fdsc-dashboard
    condition: fdsc-dashboard.enabled
    version: 0.6.3
    repository: oci://quay.io/fiware/helm-charts
  # did-helper
  - name: did-helper
    alias: did
    condition: did.enabled
    version: 0.1.21
    repository: oci://quay.io/fiware/helm-charts
  # cert-manager
  - name: cert-manager
    alias: cert-manager
    condition: cert-manager.enabled
    version: v1.20.0
    repository: https://charts.jetstack.io
  # vc-operator
  - name: vc-operator
    alias: vc-operator
    condition: vc-operator.enabled
    version: 0.1.3
    repository: oci://quay.io/seamware/helm-charts
  - name: prometheus
    condition: prometheus.enabled
    version: 29.2.1
    repository: https://prometheus-community.github.io/helm-charts
  - name: grafana
    condition: grafana.enabled
    version: 12.1.1
    repository: https://grafana-community.github.io/helm-charts
  # observability - OpenTelemetry Operator for auto-instrumentation (opt-in)
  - name: opentelemetry-operator
    condition: opentelemetry-operator.enabled
    version: 0.86.0
    repository: https://open-telemetry.github.io/opentelemetry-helm-charts
  # observability - OpenTelemetry Collector for distributed tracing (opt-in)
  - name: opentelemetry-collector
    condition: opentelemetry-collector.enabled
    version: 0.152.0
    repository: https://open-telemetry.github.io/opentelemetry-helm-charts
  # observability - Grafana Tempo for trace storage backend (opt-in)
  - name: tempo
    condition: tempo.enabled
    version: 1.24.4
    repository: https://grafana.github.io/helm-charts
