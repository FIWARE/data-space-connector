{{- if ((.Values.tracing).enabled) }}
{{- /*
ConfigMap providing the OpenTelemetry Collector pipeline configuration.
The opentelemetry-collector subchart references this ConfigMap via its
`configMap.existingName` value hook (with `configMap.create: false`),
mounting the `relay` key as the collector config file.

When Tempo is enabled (`tempo.enabled=true`), an `otlp/tempo` exporter
is auto-injected into the pipeline so spans flow from the Collector to
the in-cluster Tempo instance with no manual configuration required.
When Tempo is disabled, the config renders as-is from the user-supplied
`opentelemetry-collector.config` values (debug exporter only by default).
*/ -}}
{{- $collectorValues := index .Values "opentelemetry-collector" | default dict -}}
{{- $config := ($collectorValues.config | default dict) | deepCopy -}}
{{- if ((.Values.tempo).enabled) -}}
{{-   $tempoEndpoint := include "dsc.tempo.endpoint" . -}}
{{-   $tempoExporter := dict "endpoint" $tempoEndpoint "tls" (dict "insecure" true) -}}
{{-   $exporters := $config.exporters | default dict -}}
{{-   $_ := set $exporters "otlp/tempo" $tempoExporter -}}
{{-   $_ := set $config "exporters" $exporters -}}
{{-   $service := $config.service | default dict -}}
{{-   $pipelines := $service.pipelines | default dict -}}
{{-   $traces := $pipelines.traces | default dict -}}
{{-   $currentExporters := $traces.exporters | default list -}}
{{-   $_ := set $traces "exporters" (append $currentExporters "otlp/tempo") -}}
{{-   $_ := set $pipelines "traces" $traces -}}
{{-   $_ := set $service "pipelines" $pipelines -}}
{{-   $_ := set $config "service" $service -}}
{{- end -}}
