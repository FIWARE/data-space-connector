{{- if .Values.credentials.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: credentials-script
  namespace: {{ $.Release.Namespace | quote }}
data:
  get-credential.sh: |-
    #!/bin/sh

    wget -O jq https://github.com/stedolan/jq/releases/download/jq-1.8.1/jq-linux64
    chmod +x ./jq
    
    {{- $values := .Values.credentials -}}
    {{- range $index, $config := .Values.credentials.configurations }}
    access_token=$(curl -k -X POST "{{ $values.keycloak.address }}/realms/{{ $values.keycloak.realm }}/protocol/openid-connect/token" \
      --header 'Accept: */*' \
      --header 'Content-Type: application/x-www-form-urlencoded' \
      --data grant_type=password \
      --data client_id={{ $values.keycloak.clientId }} \
      --data username={{ $values.keycloak.username }} \
      --data scope={{ $values.keycloak.scope }} \
      --data password={{ $values.keycloak.password }} | ./jq '.access_token' -r)

    offer_uri=$(curl -k -X GET "{{ $values.keycloak.address }}/realms/{{ $values.keycloak.realm }}/protocol/oid4vc/create-credential-offer?credential_configuration_id={{ $config.id }}&pre_authorized=true" \
      --header "Authorization: Bearer ${access_token}" | ./jq '"\(.issuer)/\(.nonce)"' -r)

    replaced_host_url=$(echo "$offer_uri" | sed -E "s|^https?://[^/]+|{{ $values.keycloak.address }}|")

    echo OU $replaced_host_url

    export pre_authorized_code=$(curl -k -X GET ${replaced_host_url} \
      --header "Authorization: Bearer ${access_token}" | ./jq '.grants."urn:ietf:params:oauth:grant-type:pre-authorized_code"."pre-authorized_code"' -r)

    echo PAC $pre_authorized_code

    # Capture the full token response so we can also extract the
    # `credential_identifier` that KC main (carried by the SEAMWARE-patched
    # 26.6.2 image, keycloak/keycloak#47404) now requires in the body of
    # /credential. Older Keycloaks do not populate `authorization_details`,
    # so we fall back to `credential_configuration_id` in that case.
    token_response=$(curl -k -X POST "{{ $values.keycloak.address }}/realms/{{ $values.keycloak.realm }}/protocol/openid-connect/token" \
      --header 'Accept: */*' \
      --header 'Content-Type: application/x-www-form-urlencoded' \
      --data grant_type=urn:ietf:params:oauth:grant-type:pre-authorized_code \
      --data pre-authorized_code=${pre_authorized_code})

    credential_access_token=$(echo "$token_response" | ./jq -r '.access_token')
    credential_identifier=$(echo "$token_response" | ./jq -r '.authorization_details[0].credential_identifiers[0] // empty')

    echo CAT $credential_access_token
    echo CID $credential_identifier

    if [ -n "$credential_identifier" ]; then
      credential_body="{\"credential_identifier\":\"${credential_identifier}\"}"
    else
      credential_body="{\"credential_configuration_id\":\"{{ $config.id }}\"}"
    fi

    # KC 26.4+ response shape changed from {"credential":"..."} to
    # {"credentials":[{"credential":"..."}]}; the jq selector accepts both
    # for back-compat with older KC versions.
    curl -s -k -X POST "{{ $values.keycloak.address }}/realms/{{ $values.keycloak.realm }}/protocol/oid4vc/credential" \
      --header 'Accept: */*' \
      --header 'Content-Type: application/json' \
      --header "Authorization: Bearer ${credential_access_token}" \
      --data "$credential_body" \
      | ./jq -r '(.credentials[0].credential // .credential // empty)' \
      | tr -d '\n' > $1/{{ $config.targetFile }}

    if [ -s $1/{{ $config.targetFile }} ]; then 
      cat $1/{{ $config.targetFile }}
    else 
      exit 1
    fi
    {{- end }}
{{- end }}