{{- if and ((.Values.grafana).enabled) ((.Values.tempo).enabled) }}
{{- /*
ConfigMap that auto-provisions Tempo as a Grafana datasource.
The Grafana sidecar watches for ConfigMaps labelled with
`grafana_datasource: "1"` and provisions them as datasources
automatically, so operators see traces in the Grafana UI immediately
without any manual configuration.

This ConfigMap is rendered only when both `grafana.enabled=true` AND
`tempo.enabled=true` — if either subchart is disabled, the ConfigMap
is omitted entirely.
*/ -}}
