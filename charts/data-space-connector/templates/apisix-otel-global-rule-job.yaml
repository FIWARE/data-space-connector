{{- if and .Values.tracing.enabled .Values.decentralizedIam.enabled }}
{{- /*
Post-install/post-upgrade hook that registers an APISIX global rule
enabling the built-in opentelemetry plugin on every route. The plugin's
collector connection is configured separately via
`decentralizedIam.odrlAuthorization.apisix.apisix.pluginAttrs.opentelemetry`
in the APISIX subchart values.

APISIX stores global rules in etcd, so they survive pod restarts but not
a full etcd wipe. The hook is idempotent (PUT creates or replaces).
*/ -}}
{{- $apisixAdmin := printf "%s-apisix-admin" .Release.Name -}}
{{- $apisixCreds := (((.Values.decentralizedIam).odrlAuthorization).apisix).apisix | default dict -}}
{{- $adminKey := (($apisixCreds).admin).credentials | default dict -}}
{{- $apiKey := $adminKey.admin | default "edd1c9f034335f136f87ad84b625c8f1" -}}
