{{- if .Values.keycloak.enabled }}
{{- /*
ConfigMap providing OpenTelemetry tracing environment variables for the
Keycloak StatefulSet. The Bitnami Keycloak subchart references this
ConfigMap via the `extraEnvVarsCM` value hook, which injects every key
as an environment variable through `envFrom.configMapRef`.

When tracing is disabled the ConfigMap is created but contains no data
entries, so no environment variables are added to the container and the
runtime behaviour is unchanged.

The tracing gate follows the same inheritance pattern used by other
first-party workloads: an explicit `keycloak.tracing.enabled` value
takes precedence; otherwise the component inherits the global
`tracing.enabled` toggle.
*/ -}}
{{- $keycloakTracing := .Values.keycloak.tracing | default dict -}}
{{- $otelEnabled := (.Values.tracing | default dict).enabled | default false -}}
{{- $kcOverride := get $keycloakTracing "enabled" -}}
{{- if not (kindIs "invalid" $kcOverride) -}}
{{-   $otelEnabled = $kcOverride -}}
{{- end -}}
{{- if kindIs "invalid" $otelEnabled -}}{{- $otelEnabled = false -}}{{- end -}}
{{- $serviceName := default "keycloak" (get $keycloakTracing "serviceName") -}}
{{- $tracing := .Values.tracing | default dict -}}
{{- $exporter := get $tracing "exporter" | default dict -}}
{{- $otlp := get $exporter "otlp" | default dict -}}
{{- $protocol := get $otlp "protocol" | default "grpc" -}}
{{- $insecure := get $otlp "insecure" -}}
{{- if kindIs "invalid" $insecure -}}{{- $insecure = true -}}{{- end -}}
{{- $sampler := get $tracing "sampler" | default "parentbased_traceidratio" -}}
{{- $samplerArg := get $tracing "samplerArg" | default "1.0" -}}
{{- $propagators := get $tracing "propagators" | default "tracecontext,baggage" -}}
