apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dsc.otel.keycloak.cmName" . }}
  namespace: {{ .Release.Namespace | default "default" | quote }}
  labels:
    {{- include "dsc.labels" . | nindent 4 }}
{{- if $otelEnabled }}
data:
  # Keycloak 25+ native OpenTelemetry support toggle
  KC_TRACING_ENABLED: "true"
  OTEL_SERVICE_NAME: {{ $serviceName | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ include "dsc.otel.endpoint" . | quote }}
  OTEL_EXPORTER_OTLP_PROTOCOL: {{ $protocol | quote }}
  OTEL_EXPORTER_OTLP_INSECURE: {{ ternary "true" "false" $insecure | quote }}
  OTEL_TRACES_SAMPLER: {{ $sampler | quote }}
  OTEL_TRACES_SAMPLER_ARG: {{ $samplerArg | quote }}
  OTEL_PROPAGATORS: {{ $propagators | quote }}
  OTEL_RESOURCE_ATTRIBUTES: {{ include "dsc.otel.resourceAttributes" (dict "ctx" . "service" $serviceName) | quote }}
  OTEL_METRICS_EXPORTER: "none"
  OTEL_LOGS_EXPORTER: "none"
{{- end }}
{{- end }}
