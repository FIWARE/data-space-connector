{{- if .Values.keycloak.enabled }}
{{- /*
Secret providing extra environment variables for the Keycloak
StatefulSet. The CloudPirates Keycloak subchart references this Secret
via the `extraEnvVarsSecret` value hook, which injects every key as an
environment variable through `envFrom.secretRef`.

Currently carries two optional feature blocks:
  1. OpenTelemetry tracing — OTEL_* / KC_TRACING_ENABLED env vars
  2. HTTP forward proxy — HTTPS_PROXY / HTTP_PROXY / NO_PROXY and
     the Keycloak SPI proxy mapping env var

When neither feature is enabled the Secret is created but contains
no data entries, so no environment variables are added to the container
and the runtime behaviour is unchanged.
*/ -}}
{{- $keycloakTracing := .Values.keycloak.tracing | default dict -}}
{{- $otelEnabled := (.Values.tracing | default dict).enabled | default false -}}
{{- $kcOverride := get $keycloakTracing "enabled" -}}
{{- if not (kindIs "invalid" $kcOverride) -}}
{{-   $otelEnabled = $kcOverride -}}
{{- end -}}
{{- if kindIs "invalid" $otelEnabled -}}{{- $otelEnabled = false -}}{{- end -}}
{{- $serviceName := default "keycloak" (get $keycloakTracing "serviceName") -}}
{{- $tracing := .Values.tracing | default dict -}}
{{- $exporter := get $tracing "exporter" | default dict -}}
{{- $otlp := get $exporter "otlp" | default dict -}}
{{- $protocol := get $otlp "protocol" | default "grpc" -}}
{{- $insecure := get $otlp "insecure" -}}
{{- if kindIs "invalid" $insecure -}}{{- $insecure = true -}}{{- end -}}
{{- $sampler := get $tracing "sampler" | default "parentbased_traceidratio" -}}
{{- $samplerArg := get $tracing "samplerArg" | default "1.0" -}}
{{- $propagators := get $tracing "propagators" | default "tracecontext,baggage" -}}
{{- $proxyConfig := .Values.keycloak.proxy | default dict -}}
{{- $proxyEnabled := get $proxyConfig "enabled" | default false -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dsc.keycloak.envSecretName" . }}
  namespace: {{ .Release.Namespace | default "default" | quote }}
  labels:
    {{- include "dsc.labels" . | nindent 4 }}
{{- if or $otelEnabled $proxyEnabled }}
stringData:
{{- if $otelEnabled }}
  # Keycloak 25+ native OpenTelemetry support toggle
  KC_TRACING_ENABLED: "true"
  OTEL_SERVICE_NAME: {{ $serviceName | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ include "dsc.otel.endpoint" . | quote }}
  OTEL_EXPORTER_OTLP_PROTOCOL: {{ $protocol | quote }}
  OTEL_EXPORTER_OTLP_INSECURE: {{ ternary "true" "false" $insecure | quote }}
  # Quarkus-specific env vars required because Keycloak's Quarkus runtime
  # does not read the standard OTEL_EXPORTER_OTLP_ENDPOINT for traces.
  QUARKUS_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: {{ include "dsc.otel.endpoint" . | quote }}
  QUARKUS_OTEL_EXPORTER_OTLP_TRACES_PROTOCOL: {{ $protocol | quote }}
  OTEL_TRACES_SAMPLER: {{ $sampler | quote }}
  OTEL_TRACES_SAMPLER_ARG: {{ $samplerArg | quote }}
  OTEL_PROPAGATORS: {{ $propagators | quote }}
  OTEL_RESOURCE_ATTRIBUTES: {{ include "dsc.otel.resourceAttributes" (dict "ctx" . "service" $serviceName) | quote }}
  OTEL_METRICS_EXPORTER: "none"
  OTEL_LOGS_EXPORTER: "none"
{{- end }}
{{- if $proxyEnabled }}
  {{- $httpsProxy := get $proxyConfig "httpsProxy" | default "" }}
  {{- $httpProxy := get $proxyConfig "httpProxy" | default $httpsProxy }}
  HTTPS_PROXY: {{ $httpsProxy | quote }}
  HTTP_PROXY: {{ $httpProxy | quote }}
  NO_PROXY: {{ get $proxyConfig "noProxy" | default "localhost,*.cluster.local,*.svc" | quote }}
  {{- $spiMapping := get $proxyConfig "spiProxyMappings" | default "" }}
  {{- if $spiMapping }}
  KC_SPI_CONNECTIONS_HTTP_CLIENT_DEFAULT_PROXY_MAPPINGS: {{ $spiMapping | quote }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
