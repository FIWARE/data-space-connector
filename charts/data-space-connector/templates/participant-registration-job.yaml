{{- if .Values.registration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.registration.configMap }}-job
  namespace: {{ $.Release.Namespace | quote }}
  {{- if .Values.registration.annotations }}
  annotations:
    {{- toYaml .Values.registration.annotations | nindent 4 }}
  {{- end }}
  labels:
    {{- include "dsc.labels" . | nindent 4 }}
spec:
  template:
    spec:
      {{- if or .Values.registration.initContainers.waitForHost.enabled .Values.registration.extraInitContainers }}
      initContainers:
        {{- if .Values.registration.initContainers.waitForHost.enabled }}
        - name: wait-for-host
          image: {{ .Values.registration.initContainers.waitForHost.image.repository }}:{{ .Values.registration.initContainers.waitForHost.image.tag }}
          imagePullPolicy: {{ .Values.registration.initContainers.waitForHost.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              until curl -sf "{{ .Values.registration.til }}{{ .Values.registration.initContainers.waitForHost.path }}"; do
                echo "Waiting for {{ .Values.registration.til }}{{ .Values.registration.initContainers.waitForHost.path }}..."
                sleep {{ .Values.registration.initContainers.waitForHost.interval }}
              done
        {{- end }}
        {{- if .Values.registration.extraInitContainers }}
        {{- toYaml .Values.registration.extraInitContainers | nindent 8 }}
        {{- end }}
      {{- end }}
      containers:
        - name: register-credential-config
          image: {{ .Values.registration.image.repository }}:{{ .Values.registration.image.tag }}
          imagePullPolicy: {{ .Values.registration.image.pullPolicy }}
          command: {{- toYaml .Values.registration.command | nindent 12 }}
          {{- if .Values.registration.extraEnvVars }}
          env:
            {{- toYaml .Values.registration.extraEnvVars | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: participant-registration
              mountPath: /bin/init.sh
              subPath: init.sh
            {{- if .Values.registration.extraVolumeMounts }}
            {{- toYaml .Values.registration.extraVolumeMounts | nindent 12 }}
            {{- end }}
      volumes:
        - name: participant-registration
          configMap:
            name: {{ .Values.registration.configMap }}
            defaultMode: 0755
        {{- if .Values.registration.extraVolumes }}
        {{- toYaml .Values.registration.extraVolumes | nindent 8 }}
        {{- end }}
      restartPolicy: Never
  backoffLimit: 10
{{- end }}