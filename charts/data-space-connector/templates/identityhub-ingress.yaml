{{- if (and (eq .Values.identityhub.enabled true) (eq .Values.identityhub.didIngress.enabled true)) }}

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: identityhub-did
  namespace: {{ $.Release.Namespace | quote }}
  {{- if .Values.identityhub.didIngress.annotations }}
  annotations:
    {{- with .Values.identityhub.didIngress.annotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  {{- if .Values.identityhub.didIngress.className }}
  ingressClassName: {{ .Values.identityhub.didIngress.className }}
  {{- end }}
  {{- if .Values.identityhub.didIngress.tls }}
  tls:
    {{- range .Values.identityhub.didIngress.tls }}
    - hosts:
      {{- range .hosts }}
        - {{ . | quote }}
      {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
  {{- range .Values.identityhub.didIngress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
        {{- range .paths }}
        - path: {{ . }}
          pathType: Prefix
          backend:
            service:
              name: identityhub-service
              port:
                name: {{ $.Values.identityhub.didIngress.port }}
        {{- end }}
  {{- end }}
{{- end }}