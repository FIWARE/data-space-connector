{{- if ((.Values.tracing).autoInstrumentation).enabled }}
{{- /*
Instrumentation custom resource for the OpenTelemetry Operator.

The Operator's mutating webhook watches for pods annotated with
`instrumentation.opentelemetry.io/inject-<lang>: "true"` and injects
the appropriate language-specific auto-instrumentation agent (Java, Python,
Node.js) at pod creation time. This CR defines the agent images, exporter
endpoint, sampler, and propagator settings shared by all injected pods.

Prerequisites:
  - The `opentelemetry-operator` subchart must be enabled (provides the CRD
    and webhook).
  - cert-manager must be installed (the operator's webhook certificates are
    managed by cert-manager).

Gate: `tracing.autoInstrumentation.enabled`
*/ -}}
{{- $tracing := .Values.tracing | default dict -}}
{{- $autoInst := $tracing.autoInstrumentation | default dict -}}
{{- $sampler := get $tracing "sampler" | default "parentbased_traceidratio" -}}
{{- $samplerArg := get $tracing "samplerArg" | default "1.0" -}}
{{- $propagators := get $tracing "propagators" | default "tracecontext,baggage" -}}
{{- $java := $autoInst.java | default dict -}}
{{- $python := $autoInst.python | default dict -}}
{{- $nodejs := $autoInst.nodejs | default dict -}}
