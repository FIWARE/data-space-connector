apiVersion: opentelemetry.io/v1alpha1
kind: Instrumentation
metadata:
  name: {{ .Release.Name }}-auto-instrumentation
  namespace: {{ .Release.Namespace | default "default" | quote }}
  labels:
    {{- include "dsc.labels" . | nindent 4 }}
spec:
  exporter:
    endpoint: {{ include "dsc.otel.endpoint" . | quote }}
  propagators:
    {{- range (splitList "," $propagators) }}
    - {{ . | trim }}
    {{- end }}
  sampler:
    type: {{ $sampler }}
    argument: {{ $samplerArg | quote }}
  env:
    - name: OTEL_EXPORTER_OTLP_PROTOCOL
      value: "grpc"
    - name: OTEL_METRICS_EXPORTER
      value: "none"
    - name: OTEL_LOGS_EXPORTER
      value: "none"
  java:
    image: {{ $java.image | default "ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-java:2.11.0" | quote }}
  python:
    image: {{ $python.image | default "ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-python:0.54b0" | quote }}
  nodejs:
    image: {{ $nodejs.image | default "ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-nodejs:0.75.0" | quote }}
{{- end }}
