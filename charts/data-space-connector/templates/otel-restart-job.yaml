{{- if ((.Values.tracing).autoInstrumentation).enabled }}
{{- /*
Post-install/post-upgrade hook that waits for the OpenTelemetry Operator
webhook to become ready, then restarts all Deployments and StatefulSets
whose pods carry an `instrumentation.opentelemetry.io/inject-*` annotation.

This solves the single-release bootstrap problem: during initial install
the operator webhook has no endpoints yet, so pods created with
`failurePolicy: Ignore` miss agent injection. This Job runs after all
resources are submitted, polls until the webhook is reachable, then
triggers a rolling restart so the new pods pass through the now-ready
webhook and receive the auto-instrumentation agent.

On subsequent upgrades the operator is already running, so the restart
is near-instantaneous (pods are recreated immediately with injection).
*/ -}}

apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-otel-restart
  namespace: {{ .Release.Namespace | default "default" | quote }}
  labels:
    {{- include "dsc.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-otel-restart
  namespace: {{ .Release.Namespace | default "default" | quote }}
  labels:
    {{- include "dsc.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "patch"]
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-otel-restart
  namespace: {{ .Release.Namespace | default "default" | quote }}
  labels:
    {{- include "dsc.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-otel-restart
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-otel-restart
    namespace: {{ .Release.Namespace | default "default" | quote }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-otel-restart
  namespace: {{ .Release.Namespace | default "default" | quote }}
  labels:
    {{- include "dsc.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-restart
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Release.Name }}-otel-restart
      restartPolicy: Never
      containers:
        - name: restart
          image: bitnami/kubectl:latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              WEBHOOK_SVC="{{ .Release.Name }}-opentelemetry-operator-webhook"
              NS="{{ .Release.Namespace | default "default" }}"

              echo "Waiting for operator webhook endpoints..."
              until kubectl get endpoints "$WEBHOOK_SVC" -n "$NS" \
                -o jsonpath='{.subsets[0].addresses[0].ip}' 2>/dev/null | grep -q .; do
                sleep 5
              done
              echo "Webhook ready."

              echo "Restarting annotated deployments..."
              for deploy in $(kubectl get deployments -n "$NS" -o json | \
                jq -r '.items[] |
                  select(.spec.template.metadata.annotations // {} |
                    keys[] | startswith("instrumentation.opentelemetry.io/inject-")) |
                  .metadata.name' 2>/dev/null | sort -u); do
                echo "  Restarting deployment/$deploy"
                kubectl rollout restart "deployment/$deploy" -n "$NS"
              done

              echo "Restarting annotated statefulsets..."
              for sts in $(kubectl get statefulsets -n "$NS" -o json | \
                jq -r '.items[] |
                  select(.spec.template.metadata.annotations // {} |
                    keys[] | startswith("instrumentation.opentelemetry.io/inject-")) |
                  .metadata.name' 2>/dev/null | sort -u); do
                echo "  Restarting statefulset/$sts"
                kubectl rollout restart "statefulset/$sts" -n "$NS"
              done

              echo "Done."
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
{{- end }}
