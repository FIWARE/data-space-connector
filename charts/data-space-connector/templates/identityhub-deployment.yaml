apiVersion: apps/v1
kind: Deployment
metadata:
  name: identityhub
  namespace: {{ .Release.Namespace | default "default" | quote }}
  labels:
    app.kubernetes.io/name: identityhub
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  {{- if not .Values.identityhub.autoscaling.enabled }}
  replicas: {{ .Values.identityhub.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: identityhub
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      {{- with .Values.identityhub.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app.kubernetes.io/name: identityhub
        app.kubernetes.io/instance: {{ .Release.Name }}
        {{- with .Values.identityhub.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: default
      securityContext:
        {{- toYaml .Values.identityhub.podSecurityContext | nindent 8 }}
      {{- if or .Values.identityhub.initContainers $otelInjectAgent }}
      initContainers:
        {{- if $otelInjectAgent }}
        # tracing: copy the OpenTelemetry Java agent JAR from the
        # pinned upstream image into the shared `otel-agent` volume so
        # the main container can attach it via `JAVA_TOOL_OPTIONS`.
        - name: otel-agent-init
          image: {{ $otelAgentImage | quote }}
          imagePullPolicy: {{ $otelAgentPullPolicy }}
          command:
            - cp
            - /javaagent.jar
            - /otel-agent/opentelemetry-javaagent.jar
          securityContext:
            {{- toYaml .Values.identityhub.securityContext | nindent 12 }}
          volumeMounts:
            - name: otel-agent
              mountPath: /otel-agent
        {{- end }}
        {{- with .Values.identityhub.initContainers }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.identityhub.securityContext | nindent 12 }}
          # either use the specified image, or use the default one
          {{- if .Values.identityhub.image.repository }}
          image: "{{ .Values.identityhub.image.repository }}:{{ .Values.identityhub.image.tag | default .Chart.AppVersion }}"
          {{- else }}
          image: "tractusx/identityhub:{{ .Values.identityhub.image.tag | default .Chart.AppVersion }}"
          {{- end }}

          imagePullPolicy: {{ .Values.identityhub.image.pullPolicy }}
          ports:
          {{- range $key,$value := .Values.identityhub.endpoints }}
            - name: {{ $key }}
              containerPort: {{ $value.port }}
              protocol: TCP
          {{- end }}
          {{- if .Values.identityhub.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.identityhub.endpoints.default.path }}/check/liveness
              port: {{ .Values.identityhub.endpoints.default.port }}
            initialDelaySeconds: {{ .Values.identityhub.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.identityhub.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.identityhub.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.identityhub.livenessProbe.failureThreshold }}
            successThreshold: {{ .Values.identityhub.livenessProbe.successThreshold }}
          {{- end }}
          {{- if .Values.identityhub.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.identityhub.endpoints.default.path }}/check/readiness
              port: {{ .Values.identityhub.endpoints.default.port }}
            initialDelaySeconds: {{ .Values.identityhub.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.identityhub.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.identityhub.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.identityhub.readinessProbe.failureThreshold }}
            successThreshold: {{ .Values.identityhub.readinessProbe.successThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.identityhub.resources | nindent 12 }}
          env:
            - name: EDC_DATASOURCE_PARTICIPANTCONTEXT_PASSWORD
              {{- if .Values.identityhub.postgresql.auth.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.identityhub.postgresql.auth.existingSecret }}
                  key: {{ .Values.identityhub.postgresql.auth.existingSecretPasswordKey }}                
              {{- else }}
              value: {{ .Values.identityhub.postgresql.auth.password | quote }}
              {{- end }}
            - name: EDC_DATASOURCE_KEYPAIR_PASSWORD
              {{- if .Values.identityhub.postgresql.auth.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.identityhub.postgresql.auth.existingSecret }}
                  key: {{ .Values.identityhub.postgresql.auth.existingSecretPasswordKey }}                
              {{- else }}
              value: {{ .Values.identityhub.postgresql.auth.password | quote }}
              {{- end }}
            - name: EDC_DATASOURCE_STSCLIENT_PASSWORD
              {{- if .Values.identityhub.postgresql.auth.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.identityhub.postgresql.auth.existingSecret }}
                  key: {{ .Values.identityhub.postgresql.auth.existingSecretPasswordKey }}                
              {{- else }}
              value: {{ .Values.identityhub.postgresql.auth.password | quote }}
              {{- end }}
            - name: EDC_DATASOURCE_CREDENTIALREQUEST_PASSWORD
              {{- if .Values.identityhub.postgresql.auth.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.identityhub.postgresql.auth.existingSecret }}
                  key: {{ .Values.identityhub.postgresql.auth.existingSecretPasswordKey }}                
              {{- else }}
              value: {{ .Values.identityhub.postgresql.auth.password | quote }}
              {{- end }}
            - name: EDC_DATASOURCE_CREDENTIALS_PASSWORD
              {{- if .Values.identityhub.postgresql.auth.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.identityhub.postgresql.auth.existingSecret }}
                  key: {{ .Values.identityhub.postgresql.auth.existingSecretPasswordKey }}                
              {{- else }}
              value: {{ .Values.identityhub.postgresql.auth.password | quote }}
              {{- end }}
            - name: EDC_DATASOURCE_JTI_PASSWORD
              {{- if .Values.identityhub.postgresql.auth.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.identityhub.postgresql.auth.existingSecret }}
                  key: {{ .Values.identityhub.postgresql.auth.existingSecretPasswordKey }}                
              {{- else }}
              value: {{ .Values.identityhub.postgresql.auth.password | quote }}
              {{- end }}
            - name: EDC_DATASOURCE_DIDRESOURCE_PASSWORD
              {{- if .Values.identityhub.postgresql.auth.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.identityhub.postgresql.auth.existingSecret }}
                  key: {{ .Values.identityhub.postgresql.auth.existingSecretPasswordKey }}                
              {{- else }}
              value: {{ .Values.identityhub.postgresql.auth.password | quote }}
              {{- end }}
            - name: EDC_IH_API_SUPERUSER_KEY
              {{- if .Values.identityhub.superuser.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.identityhub.superuser.existingSecret }}
                  key: {{ .Values.identityhub.superuser.existingSecretKeyKey }}
              {{- else }}
              value: {{ .Values.identityhub.superuser.key | quote }}
              {{- end }}
            {{- if $otelInjectAgent }}
            # tracing: attach the OpenTelemetry Java agent to the JVM.
            # Any user-provided JAVA_TOOL_OPTIONS value is preserved by
            # concatenation; the final list skips the user entry below
            # to keep env-var names unique.
            - name: JAVA_TOOL_OPTIONS
              value: {{ (printf "%s %s" $otelJavaToolOption $otelUserJto) | trim | quote }}
            {{- end }}
            {{- if $otelEnabled }}
            # tracing: standard OpenTelemetry SDK environment variables
            # (service name, exporter endpoint, sampler, ...). Rendered
            # by the shared `dsc.otel.env` helper so every traced
            # component sees the same surface.
            {{- include "dsc.otel.env" (dict "ctx" . "service" $otelServiceName "enabled" $otelEnabled) | nindent 12 }}
            {{- end }}

            ######################################
            ## Additional environment variables ##
            ######################################
          {{- range $key, $value := .Values.identityhub.envValueFrom }}
            - name: {{ $key | quote }}
              valueFrom:
                {{- tpl (toYaml $value) $ | nindent 16 }}
          {{- end }}
          {{- range $key, $value := .Values.identityhub.env }}
            {{- /* When tracing is on we already emitted JAVA_TOOL_OPTIONS
                 (with the user value concatenated); skip the duplicate. */}}
            {{- if not (and $otelInjectAgent (eq $key "JAVA_TOOL_OPTIONS")) }}
            - name: {{ $key | quote }}
              value: {{ $value | quote }}
            {{- end }}
          {{- end }}
          {{- if or .Values.identityhub.envSecretNames .Values.identityhub.envConfigMapNames }}
          envFrom:
          {{- range $value := .Values.identityhub.envSecretNames }}
            - secretRef:
                name: {{ $value | quote }}
          {{- end }}
          {{- range $value := .Values.identityhub.envConfigMapNames }}
            - configMapRef:
                name: {{ $value | quote }}
          {{- end }}
          {{- end }}
          volumeMounts:
            {{- if .Values.identityhub.customCaCerts }}
            - name: custom-cacerts
              mountPath: /opt/java/openjdk/lib/security/cacerts
              subPath: cacerts
            {{- end }}
            - name: "tmp"
              mountPath: "/tmp"
            - name : configuration
              mountPath: /app/logging.properties
              subPath: logging.properties
            - name: logs
              mountPath: {{ .Values.identityhub.logging.path }}
            {{- if $otelInjectAgent }}
            # tracing: read-only view of the `otel-agent` volume seeded
            # by the `otel-agent-init` init container.
            - name: otel-agent
              mountPath: /otel-agent
              readOnly: true
            {{- end }}
            {{- if .Values.identityhub.additionalVolumeMounts }}
            {{- with .Values.identityhub.additionalVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- end }}
      volumes:
        {{- if .Values.identityhub.additionalVolumes }}
        {{- with .Values.identityhub.additionalVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- end }}
        {{- if $otelInjectAgent }}
        # tracing: shared scratch volume that holds the copy of
        # `opentelemetry-javaagent.jar` produced by the init container.
        - name: otel-agent
          emptyDir:
            sizeLimit: 32Mi
        {{- end }}
        - name: "configuration"
          configMap:
            name: identityhub-logging
            items:
              - key: "logging.properties"
                path: "logging.properties"
        {{- if .Values.identityhub.customCaCerts }}
        - name: custom-cacertificates
          configMap:
            name: identityhub-custom-cacerts
            defaultMode: 0400
        - name: custom-cacerts
          emptyDir:
            sizeLimit: 1Mi
        {{- end }}
        - name: "tmp"
          emptyDir: { }
        - name: logs # aim for persistent volume in localhost
        {{- if and .Values.identityhub.logging.enabled .Values.identityhub.logging.persistence.enabled }}
          persistentVolumeClaim:
            claimName: identityhub-pvc-logs
        {{- else }}
          emptyDir: { }
        {{- end }}
      {{- with .Values.identityhub.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.identityhub.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.identityhub.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}