{{- if .Values.identityhub.enabled }}
{{- /*
Resolve the effective tracing state for the IdentityHub workload.
`identityhub.tracing.enabled` takes precedence when explicitly set;
otherwise the component inherits the global `tracing.enabled` toggle.
The Java agent init container is only injected when both tracing is
enabled and `identityhub.tracing.javaagent.enabled` is true, so operators
can turn auto-instrumentation off per-component without disabling the
OTEL env vars.
*/ -}}
{{- $ihTracing := .Values.identityhub.tracing | default dict -}}
{{- $otelEnabled := .Values.tracing.enabled -}}
{{- /* Only apply the per-component override when the value is explicitly
     set. `hasKey` returns true for present-but-null keys, so we must use
     `kindIs "invalid"` to detect the "inherit from global" case. */ -}}
{{- $ihOverride := get $ihTracing "enabled" -}}
{{- if not (kindIs "invalid" $ihOverride) -}}
{{- $otelEnabled = $ihOverride -}}
{{- end -}}
{{- if kindIs "invalid" $otelEnabled -}}{{- $otelEnabled = false -}}{{- end -}}
{{- $otelServiceName := default "identityhub" (get $ihTracing "serviceName") -}}
{{- $otelAgent := get $ihTracing "javaagent" | default dict -}}
{{- $otelAgentEnabled := true -}}
{{- $otelAgentOverride := get $otelAgent "enabled" -}}
{{- if not (kindIs "invalid" $otelAgentOverride) -}}{{- $otelAgentEnabled = $otelAgentOverride -}}{{- end -}}
{{- $otelInjectAgent := and $otelEnabled $otelAgentEnabled -}}
{{- $otelAgentImage := default "ghcr.io/open-telemetry/opentelemetry-java-instrumentation/autoinstrumentation-java:2.11.0" (get $otelAgent "image") -}}
{{- $otelAgentPullPolicy := default "IfNotPresent" (get $otelAgent "pullPolicy") -}}
{{- $otelJavaToolOption := "-javaagent:/otel-agent/opentelemetry-javaagent.jar" -}}
{{- $otelUserJto := default "" (get (default dict .Values.identityhub.env) "JAVA_TOOL_OPTIONS") -}}
