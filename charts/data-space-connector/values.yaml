    extraDefaultClientScopes: []

    defaultOptionalClientScopes:
      - microprofile-jwt
      - phone
      - address
      - offline_access
    extraOptionalClientScopes: []

    defaultKeyProviders:
      - name: ecdh-generated
        providerId: ecdh-generated
        subComponents: {}
        config:
          ecGenerateCertificate: ["false"]
          active: ["true"]
          priority: ["0"]
          ecdhAlgorithm: ["ECDH-ES"]
          ecdhEllipticCurveKey: ["P-256"]
          enabled: ["true"]
    extraKeyProviders: []

    # -- Map of verifiable credentials supported by the realm. Each key is the
    # credential (and ClientScope) name. The chart renders one ClientScope per
    # entry with protocol "oid4vc" and the entry's `attributes` attached to it.
    # Attribute keys are auto-prefixed with `vc.` if the user didn't already.
    # Set `clientScope.create: false` to skip ClientScope generation for an entry.
    #
    # ref: https://github.com/keycloak/keycloak/blob/26.6.2/server-spi-private/src/main/java/org/keycloak/models/oid4vci/CredentialScopeModel.java
    # NOTE: this model is the post-26.4 redesign (PR keycloak#39768). The pre-26.4
    # `vc.{name}.*` realm-attribute scheme and `components.CredentialBuilder`
    # block were removed. Format strings also changed: `jwt_vc` -> `jwt_vc_json`,
    # `vc+sd-jwt` -> `dc+sd-jwt`.
    #
    # verifiableCredentials:
    #   LegalPersonCredential:
    #     attributes:
    #       # -- VC format (e.g. "dc+sd-jwt", "jwt_vc_json"). Maps to vc.format
    #       format: "dc+sd-jwt"
    #       # -- VC type URI. Maps to vc.verifiable_credential_type (drives the
    #       # SD-JWT `vct` claim and the metadata `vct` field). When
    #       # `supported_credential_types` is not set explicitly below, the
    #       # template uses this same value for it (which drives the
    #       # JWT_VC_JSON `type` array and the metadata `credential_definition.type`).
    #       # Set `supported_credential_types` explicitly only if you need a
    #       # different VCT in the JWT_VC_JSON `type` array.
    #       verifiable_credential_type: "LegalPersonCredential"
    #       # -- Signing algorithm. Maps to vc.credential_signing_alg
    #       credential_signing_alg: "ES256"
    #       # -- `typ` of the JWS header. Maps to vc.credential_build_config.token_jws_type
    #       credential_build_config.token_jws_type: "vc+sd-jwt"
    #       # -- Claims kept disclosed in the SD-JWT. KC 26.4+ enforces a "red list"
    #       # of standard claims that must NOT be undisclosed (iss, iat, nbf, exp,
    #       # cnf, vct, status). Always include those if you override this list,
    #       # otherwise issuance fails with `UndisclosedClaims contains red listed
    #       # claim names`.
    #       credential_build_config.sd_jwt.visible_claims: "iss,iat,nbf,exp,cnf,vct,status,roles,email"
    #       # -- Number of SD-JWT decoys
    #       sd_jwt.number_of_decoys: "3"
    #       # -- Whether holder binding is required
    #       binding_required: "true"
    #       # -- Allowed proof types (CSV)
    #       binding_required_proof_types: "jwt"
    #     clientScope:
    #       create: true
    #     # -- protocolMappers belong to this scope only. KC 26.4+ removed the
    #     # legacy `supportedCredentialTypes` filter; mapper-to-VC association
    #     # is now structural. Renamed: `subjectProperty` -> `claim.name`.
    #     protocolMappers:
    #       - name: context-mapper
    #         protocol: oid4vc
    #         protocolMapper: oid4vc-context-mapper
    #         config:
    #           context: https://www.w3.org/2018/credentials/v1
    #       - name: email-mapper
    #         protocol: oid4vc
    #         protocolMapper: oid4vc-user-attribute-mapper
    #         config:
    #           claim.name: email
    #           userAttribute: email
    #       - name: role-mapper
    #         protocol: oid4vc
    #         protocolMapper: oid4vc-target-role-mapper
    #         config:
    #           claim.name: roles
    #           clientId: did:web:my-client.example.org
    verifiableCredentials: {}

    # -- Wallet preset — opinionated, off by default. Turn `enabled` on to
    # ship a realm with the OIDC clients that Lissi (iOS/Android) and the
    # EUDI Reference Wallet (iOS/Android) need. Every wallet-specific value
    # below has a default; override any leaf without redefining the whole
    # client (e.g. `wallets.lissi.clientId: foo` changes just that field).
    #
    # This flag DOES NOT define the credentials the realm issues — that is
    # the deployer's job via `keycloak.realm.verifiableCredentials` above
    # (each entry there becomes an OID4VC client scope rendered by
    # `dsc.vcClientScopes`).
    wallets:
      # -- Master toggle. When true, the chart adds the Lissi + EUDI public
      # OIDC clients (see `lissi.*` / `eudi.*` below). It does NOT touch
      # `verifiableCredentials` — if you want SD-JWT VC issuance to work,
      # declare the credentials there as well.
      enabled: false
      # -- Global flag. When true, users in `keycloak.realm.users` that do
      # NOT already declare their own `verifiableCredentials` get an
      # auto-populated array with the name of every entry in
      # `keycloak.realm.verifiableCredentials`. Keycloak then auto-issues
      # those credentials at first login, avoiding the manual "Issue
      # credential" admin step. Users that DO declare an explicit
      # `verifiableCredentials` array are left untouched — set it to `[]`
      # to opt that user out entirely. If `verifiableCredentials` is empty,
      # turning this flag on is a no-op.
      issueCredentialsToUsers: false
      # -- Lissi defaults. The clientId is what the Lissi iOS/Android app
      # currently looks for in the realm — override only if Lissi rotates it.
      lissi:
        clientId: 9c481dc3-2ad0-4fe0-881d-c32ad02fe0fc
        name: "Lissi ID Wallet"
        description: "Hardcoded clientId expected by the Lissi ID Wallet (iOS/Android)."
        redirectUri: https://oob.lissi.io/vci-cb
        attributes:
          oid4vci.enabled: "true"
          post.logout.redirect.uris: "+"
          pkce.code.challenge.method: "S256"
      # -- EUDI Reference Wallet (.DEV variant) defaults. PAR + DPoP + PKCE
      # S256 are mandatory for the wallet's OID4VCI flow.
      eudi:
        clientId: wallet-dev
        name: "EUDI Reference Wallet (dev)"
        description: "Public client used by EUDI Reference Wallet (.DEV variant). PKCE + PAR + DPoP-bound access tokens."
        redirectUri: eu.europa.ec.euidi://authorization
        attributes:
          oid4vci.enabled: "true"
          post.logout.redirect.uris: "+"
          pkce.code.challenge.method: "S256"
          require.pushed.authorization.requests: "true"
          dpop.bound.access.tokens: "true"

  # -- configuration for the signing key to be used for issuing credentials
  # signingKey:
  # -- path to the keystore containing the signing key
  # storePath:
  # -- password for the keystore containing the signing key
  # storePassword:
  # -- alias of the signing key
  # keyAlias:
  # -- password of the signing key
  # keyPassword:
  # -- algorithm of the signing key
  # keyAlgorithm:
  # -- did that the key belongs to
  # did:

## configuration of the tm-forum-api - see https://github.com/FIWARE/helm-charts/tree/main/charts/tm-forum-api for details
tm-forum-api:
  # -- should it be enabled? set to false if one outside the chart is used.
  enabled: true
  # -- All TM Forum APIs in a single deployment, using the all-in-one image. This is recommended for testing and development, but not for production use. When set to false, every API will be deployed separately, allowing for more flexibility and scalability.
  allInOne:
    enabled: false

  # -- distributed-tracing configuration for the tm-forum-api subchart.
  # tm-forum-api is a Java application that supports the standard
  # OpenTelemetry SDK environment variables. Because tm-forum-api is a
  # third-party subchart whose templates are not owned by this umbrella
  # chart, tracing is wired through the subchart's
  # `defaultConfig.additionalEnvVars` extension point. The SDK disable
  # flag (`OTEL_SDK_DISABLED`) is set to `true` by default so tracing has
  # no runtime effect until explicitly enabled. To activate tracing,
  # override the env vars below (or pass
  # `--set tm-forum-api.defaultConfig.additionalEnvVars[4].value=false`)
  # together with `--set tracing.enabled=true`.
  tracing:
    # -- toggle OpenTelemetry tracing on the tm-forum-api workload. Leave
    # unset (default) to inherit `tracing.enabled` from the global
    # block; set to `true` / `false` to override.
    enabled:
    # -- logical service name exposed as `OTEL_SERVICE_NAME` and recorded
    # as the service identity on every span emitted by tm-forum-api.
    serviceName: tm-forum-api

  ## configuration to be used by every api-deployment if nothing specific is provided.
  defaultConfig:
    # --  ngsi-ld broker connection information
    ngsiLd:
      # -- address of the broker
      url: http://data-service-scorpio:9090
    contextUrl: https://raw.githubusercontent.com/SEAMWARE/fdsc-edc/refs/heads/main/schemas/odrl-context.jsonld
    additionalEnvVars:
      - name: API_EXTENSION_ENABLED
        value: "true"
      - name: GENERAL_NGSILDORQUERYVALUE
        value: ","
      - name: GENERAL_NGSILDORQUERYKEY
        value: ","
      - name: GENERAL_ENCLOSEQUERY
        value: "false"
      # -- OpenTelemetry SDK disable flag. Set to "false" to enable
      # tracing. When "true" the OTEL SDK is completely deactivated so
      # the remaining OTEL_* vars below are inert.
      - name: OTEL_SDK_DISABLED
        value: "true"
      # -- OTEL service name. Override via
      # `tm-forum-api.tracing.serviceName`.
      - name: OTEL_SERVICE_NAME
        value: "tm-forum-api"
      # -- OTLP endpoint. Adjust to match your release name or external
      # collector.
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: ""
      # -- OTLP protocol (`grpc` | `http/protobuf`).
      - name: OTEL_EXPORTER_OTLP_PROTOCOL
        value: "grpc"
      # -- trace sampler name.
      - name: OTEL_TRACES_SAMPLER
        value: "parentbased_traceidratio"
      # -- trace sampler argument (sampling probability).
      - name: OTEL_TRACES_SAMPLER_ARG
        value: "1.0"
      # -- propagators for distributed context propagation.
      - name: OTEL_PROPAGATORS
        value: "tracecontext,baggage"
      # -- disable metrics exporter (traces-only configuration).
      - name: OTEL_METRICS_EXPORTER
        value: "none"
      # -- disable logs exporter (traces-only configuration).
      - name: OTEL_LOGS_EXPORTER
        value: "none"
  # enable the api proxy
  apiProxy:
    enabled: true
    image:
      tag: distroless-v1.27-latest
    service:
      # -- name to be used for the proxy service.
      nameOverride: tm-forum-api

  # -- list of apis to be deployed
  # -- every api needs to define a name and image. Basepath is required when routes or ingress will be enabled. Beside that, they can overwrite the default-config by using the same keys.
  # -- be aware: when you change the image repositrory or the tag for an api, you have to provide both values for the changes to take effect
  apis:
    - name: party-catalog
      image: tmforum-party-catalog
      basePath: /tmf-api/party/v4

    - name: customer-bill-management
      image: tmforum-customer-bill-management
      basePath: /tmf-api/customerBillManagement/v4

    - name: customer-management
      image: tmforum-customer-management
      basePath: /tmf-api/customerManagement/v4

    - name: product-catalog
      image: tmforum-product-catalog
      basePath: /tmf-api/productCatalogManagement/v4

    - name: product-inventory
      image: tmforum-product-inventory
      basePath: /tmf-api/productInventory/v4

    - name: product-ordering-management
      image: tmforum-product-ordering-management
      basePath: /tmf-api/productOrderingManagement/v4

    - name: resource-catalog
      image: tmforum-resource-catalog
      basePath: /tmf-api/resourceCatalog/v4

    - name: resource-function-activation
      image: tmforum-resource-function-activation
      basePath: /tmf-api/resourceFunctionActivation/v4

    - name: resource-inventory
      image: tmforum-resource-inventory
      basePath: /tmf-api/resourceInventoryManagement/v4

    - name: service-catalog
      image: tmforum-service-catalog
      basePath: /tmf-api/serviceCatalogManagement/v4

    - name: agreement
      image: tmforum-agreement
      basePath: /tmf-api/agreementManagement/v4

    - name: usage-management
      image: tmforum-usage-management
      basePath: /tmf-api/usageManagement/v4

    - name: quote
      image: tmforum-quote
      basePath: /tmf-api/quote/v4

    - name: account
      image: tmforum-account
      basePath: /tmf-api/accountManagement/v4

  # redis caching
  redis:
    enabled: false

  registration:
    enabled: true
    # -- name to be used for the registration jobs
    name: tmf-api-registration
    annotations:
      "helm.sh/hook": post-install
      "helm.sh/hook-weight": "0"
      "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    image:
      repository: quay.io/curl/curl
      tag: 8.1.2
      pullPolicy: IfNotPresent
    command: [ /bin/sh, -c, /bin/init.sh ]
    extraEnvVars: []
    extraVolumes: []
    extraVolumeMounts: []
    backoffLimit: 10
    restartPolicy: Never
    # -- configuration to register the dataplane at the credentials-config-service
    ccs:
      # -- endpoint of the ccs to regsiter at
      endpoint: http://verifier:8090
      # -- service id of the data-service to be used
      id: tmf-api
      # -- default scope to be created for the data plane
      defaultOidcScope:
        # -- name of the scope
        name: default
        # -- name of the default credential to be configured
        credentialTypes:
          - VerifiableCredential
        # -- needs to be updated for the concrete dataspace
        trustedParticipantsLists: http://tir.trust-anchor.org
        trustedIssuersLists: http://trusted-issuers-list:8080

## configuration of rainbow to provide integration with the Dataspace Protocol
rainbow:
  # -- should rainbow be enabled
  enabled: false
  # -- database configuration of rainbow
  db:
    # -- host of the database to be used
    url:
    # -- user to be used when accesing the database
    user:
    # -- secret containing the password for the database
    existingSecret:
    # -- key of the password inside that secret
    passwordKey:
  # -- configuration for external access to rainbow
  ingress:
    # -- should the ingress be enabled
    enabled: false
    # -- annotations to be added to the ingress
    annotations: {}
      # kubernetes.io/ingress.class: "ambassador"
      ## example annotations, allowing cert-manager to automatically create tls-certs and forcing everything to use ssl.
      # kubernetes.io/tls-acme: "true"
      # ingress.kubernetes.io/ssl-redirect: "true"
    # -- all hosts to be provided
    hosts: []
      ## provide a hosts and the paths that should be available
      # - host: localhost
      # paths:
      # - /
    # -- configure the ingress' tls
    tls: []
      # - secretName: rainbow-tls
      # hosts:
      # - rainbow.fiware.org
  # -- configuration of service access to rainbow
  service:
    # -- service type to be used
    serviceType: ClusterIP
    # -- port of the service
    port: 8080
  # -- configuration to register rainbow at the credentials-config-service
  ccs:
    # -- should the registration at the credentials-config-service be enabled
    enabled: false
    # -- endpoint of the ccs to regsiter at
    endpoint: http://verifier:8090
    # -- configmap to get the registration information from
    configMap: rainbow-registration
    # -- service id of the data-service to be used
    id: tpp-service

## configuration of the tm-forum-api - see https://github.com/FIWARE/helm-charts/tree/main/charts/contract-management for details
contract-management:
  # -- should it be enabled? set to false if one outside the chart is used.
  enabled: true
  fullnameOverride: contract-management
  # -- distributed-tracing configuration for the contract-management subchart.
  # contract-management is a Micronaut (Java) application that supports the
  # standard OpenTelemetry SDK environment variables. Because
  # contract-management is a third-party subchart whose templates are not
  # owned by this umbrella chart, tracing is wired through the subchart's
  # `additionalEnvVars` extension point. The SDK disable flag
  # (`OTEL_SDK_DISABLED`) is set to `true` by default so tracing has no
  # runtime effect until explicitly enabled. To activate tracing, override
  # the env vars below (or pass
  # `--set contract-management.additionalEnvVars[0].value=false`)
  # together with `--set tracing.enabled=true`.
  tracing:
    # -- toggle OpenTelemetry tracing on the contract-management workload.
    # Leave unset (default) to inherit `tracing.enabled` from the global
    # block; set to `true` / `false` to override.
    enabled:
    # -- logical service name exposed as `OTEL_SERVICE_NAME` and recorded
    # as the service identity on every span emitted by contract-management.
    serviceName: contract-management
  til:
    credentialType: OperatorCredential
  services:
    ## Config for Trusted Issuers List
    trusted-issuers-list:
      ## URL of the Trusted Issuers List Service
      url: http://trusted-issuers-list:8080
    ## Config for the TM Forum Service hosting the APIs
    product-order:
      ## URL of the TM Forum Service hosting the Product Ordering API
      url: http://tm-forum-api:8080
    party:
      ## URL of the TM Forum Service hosting the Party API
      url: http://tm-forum-api:8080
    product-catalog:
      ## URL of the TM Forum Service hosting the Product Catalog API
      url: http://tm-forum-api:8080
    service-catalog:
      ## URL of the TM Forum Service hosting the Service Catalog API
      url: http://tm-forum-api:8080
    tmforum-agreement-api:
      ## URL of the TM Forum Service hosting the Agreement API
      url: http://tm-forum-api:8080
    quote:
      ## URL of the TM Forum Service hosting the Quote API
      url: http://tm-forum-api:8080
    rainbow:
      ## URL for the Rainbow service
      url: http://rainbow:8080
    odrl:
      ## URL to the ODRL-PAP
      url: http://odrl-pap:8080
  # -- additional environment variables for the contract-management container.
  # The OpenTelemetry SDK vars below are included by default with
  # `OTEL_SDK_DISABLED=true` so the SDK skips initialisation. When
  # overriding, include all entries below to keep tracing functional
  # (adjust the endpoint to match your release name or external collector):
  #   - name: OTEL_SDK_DISABLED
  #     value: "false"
  #   - name: OTEL_EXPORTER_OTLP_ENDPOINT
  #     value: "http://<release>-opentelemetry-collector:4317"
  additionalEnvVars:
    # -- OpenTelemetry SDK disable flag. Set to "false" to enable
    # tracing. When "true" the OTEL SDK is completely deactivated so
    # the remaining OTEL_* vars below are inert.
    - name: OTEL_SDK_DISABLED
      value: "true"
    # -- OTEL service name. Override via
    # `contract-management.tracing.serviceName`.
    - name: OTEL_SERVICE_NAME
      value: "contract-management"
    # -- OTLP endpoint. Adjust to match your release name or external
    # collector.
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: ""
    # -- OTLP protocol (`grpc` | `http/protobuf`).
    - name: OTEL_EXPORTER_OTLP_PROTOCOL
      value: "grpc"
    # -- trace sampler name.
    - name: OTEL_TRACES_SAMPLER
      value: "parentbased_traceidratio"
    # -- trace sampler argument (sampling probability).
    - name: OTEL_TRACES_SAMPLER_ARG
      value: "1.0"
    # -- propagators for distributed context propagation.
    - name: OTEL_PROPAGATORS
      value: "tracecontext,baggage"
    # -- disable metrics exporter (traces-only configuration).
    - name: OTEL_METRICS_EXPORTER
      value: "none"
    # -- disable logs exporter (traces-only configuration).
    - name: OTEL_LOGS_EXPORTER
      value: "none"

# -- configuration for the did-helper, see https://github.com/wistefan/did-helper
did:
  enabled: false

# -- configuration for registering a participant at the til. Allows to preconfigure trust-relationships on deployment
registration:
  enabled: false
  configMap: til-registration
  prepScript: ""
  image:
