## Installation of the mongo-operator - see https://github.com/mongodb/helm-charts/tree/main/charts/community-operator
mongo-operator:
  # -- should the mongo-operator be installed
  enabled: false

## Usage of the mongo-operator - see https://github.com/mongodb/mongodb-kubernetes-operator
managedMongo:
  # -- should it be enabled?
  enabled: false
  # -- spec as defined in https://github.com/mongodb/helm-charts/tree/main/charts/community-operator-crds
  spec:
    additionalMongodConfig:
      storage.wiredTiger.engineConfig.journalCompressor: zlib

# -- configuration for the marketplace components
marketplace:
  enabled: false

  # -- should random passwords for the database connection of marketplace components be generated in the cluster.
  # When `true` (and on `helm install` only) the chart creates `mongodb-admin-password`, `mongodb-charging-password`
  # and `mongodb-belp-password` Secrets with random values. The Secrets are annotated with
  # `helm.sh/resource-policy: keep` so they survive `helm upgrade` and `helm uninstall` and the passwords are
  # never rotated by Helm. This is convenient for local/demo deployments but NOT recommended for production:
  # since the Secrets are annotated as kept, Helm will not adopt or update them, and re-installs may collide
  # with stale Secrets. For production, set this to `false` and provide the three Secrets externally
  # (e.g. via External Secrets Operator, Sealed Secrets, SOPS, or an out-of-band `kubectl apply`).
  generatePasswords: true

  # -- distributed-tracing configuration for the marketplace workload.
  # Because marketplace (business-api-ecosystem) is a third-party subchart
  # whose templates are not owned by this umbrella chart, tracing is wired
  # through the subchart's extension points (`extraEnvVars` for the Charging
  # Backend and `additionalEnvVars` for the Logic Proxy). The SDK disable
  # flag (`OTEL_SDK_DISABLED`) is set to `true` by default so tracing has no
  # runtime effect until explicitly enabled. To activate tracing, override
  # the env vars below (or pass
  # `--set marketplace.bizEcosystemChargingBackend.extraEnvVars[0].value=false`)
  # together with `--set tracing.enabled=true`.
  tracing:
    # -- toggle OpenTelemetry tracing on the marketplace workload.
    # Leave unset (default) to inherit `tracing.enabled` from the global
    # block; set to `true` / `false` to override.
    enabled:
    # -- logical service name exposed as `OTEL_SERVICE_NAME` and recorded
    # as the service identity on every span emitted by marketplace components.
    serviceName: marketplace

  # -- should the tmforum deployed together with the marketplace?
  bizEcosystemApis:
    enabled: false
  # -- should RSS be enabled?
  bizEcosystemRss:
    enabled: false
  # -- should vc based auth enabled?
  siop:
    enabled: true
    # -- should the market place automatically registered in the credentials config service?
    ccs:
      enabled: false
    # -- paths to the verifier
    verifier:
      qrCodePath: /api/v2/loginQR
      tokenPath: /token
      jwksPath: /.well-known/jwks
    # -- roles allowed by the market
    allowedRoles:
      - seller
      - customer
      - admin

  # -- configuration for the charging backend
  bizEcosystemChargingBackend:
    existingSecret: mongodb-charging-password

    # -- max size to be used for the market
    maxUploadSize: "5242880"

    serviceAccount:
      create: false

    # -- configuration of the charging backend to be deployed
    deployment:
      image:
        tag: 10.5.0

    # -- should plugin support be enabled
    plugins:
      enabled: false

    media:
      enabled: false

    port: 8006

    loglevel: debug

    payment:
      method: None

    backup:
      enabled: false

    initContainers: false
    propagateToken: true
    basePath: /opt/business-ecosystem-charging-backend
    token:
      enabled: false

    db:
      host: mongodb-svc
      database: charging_db
      user: charging
      secretKey: password

    # -- additional environment variables for the Charging Backend container.
    # The OpenTelemetry SDK vars below are included by default with
    # `OTEL_SDK_DISABLED=true` so the SDK skips initialisation. When
    # overriding, include all entries below to keep tracing functional
    # (adjust the endpoint to match your release name or external collector):
    #   - name: OTEL_SDK_DISABLED
    #     value: "false"
    #   - name: OTEL_EXPORTER_OTLP_ENDPOINT
    #     value: "http://<release>-opentelemetry-collector:4317"
    extraEnvVars:
      # -- OpenTelemetry SDK disable flag. Set to "false" to enable
      # tracing. When "true" the OTEL SDK is completely deactivated so
      # the remaining OTEL_* vars below are inert.
      - name: OTEL_SDK_DISABLED
        value: "true"
      # -- OTEL service name. Override via
      # `marketplace.tracing.serviceName`.
      - name: OTEL_SERVICE_NAME
        value: "marketplace"
      # -- OTLP endpoint. Adjust to match your release name or external
      # collector.
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: ""
      # -- OTLP protocol (`grpc` | `http/protobuf`).
      - name: OTEL_EXPORTER_OTLP_PROTOCOL
        value: "grpc"
      # -- trace sampler name.
      - name: OTEL_TRACES_SAMPLER
        value: "parentbased_traceidratio"
      # -- trace sampler argument (sampling probability).
      - name: OTEL_TRACES_SAMPLER_ARG
        value: "1.0"
      # -- propagators for distributed context propagation.
      - name: OTEL_PROPAGATORS
        value: "tracecontext,baggage"
      # -- disable metrics exporter (traces-only configuration).
      - name: OTEL_METRICS_EXPORTER
        value: "none"
      # -- disable logs exporter (traces-only configuration).
      - name: OTEL_LOGS_EXPORTER
        value: "none"

  oauth:
    provider: "vc"

  # -- configuration for the logic proxy
  bizEcosystemLogicProxy:
    serviceAccount:
      create: true

    existingSecret: mongodb-belp-password

    # -- image to be used for the statefulset
    statefulset:
      image:
        repository: fiware/biz-ecosystem-logic-proxy
        tag: "11.15.0"
        pullPolicy: Always

    port: 8004
    nodeEnvironment: production

    # -- db config
    db:
      host: mongodb-svc
      database: belp_db
      user: belp
      secretKey: password
    basePath: /opt/business-ecosystem-logic-proxy

    externalIdp:
      enabled: true
    initContainers: false
    propagateToken: true

    # -- additional environment variables for the Logic Proxy container.
    # The OpenTelemetry SDK vars below are included by default with
    # `OTEL_SDK_DISABLED=true` so the SDK skips initialisation. When
    # overriding, include all entries below to keep tracing functional
    # (adjust the endpoint to match your release name or external collector):
    #   - name: OTEL_SDK_DISABLED
    #     value: "false"
    #   - name: OTEL_EXPORTER_OTLP_ENDPOINT
    #     value: "http://<release>-opentelemetry-collector:4317"
    additionalEnvVars:
      # -- OpenTelemetry SDK disable flag. Set to "false" to enable
      # tracing. When "true" the OTEL SDK is completely deactivated so
      # the remaining OTEL_* vars below are inert.
      - name: OTEL_SDK_DISABLED
        value: "true"
      # -- OTEL service name. Override via
      # `marketplace.tracing.serviceName`.
      - name: OTEL_SERVICE_NAME
        value: "marketplace"
      # -- OTLP endpoint. Adjust to match your release name or external
      # collector.
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: ""
      # -- OTLP protocol (`grpc` | `http/protobuf`).
      - name: OTEL_EXPORTER_OTLP_PROTOCOL
        value: "grpc"
      # -- trace sampler name.
      - name: OTEL_TRACES_SAMPLER
        value: "parentbased_traceidratio"
      # -- trace sampler argument (sampling probability).
      - name: OTEL_TRACES_SAMPLER_ARG
        value: "1.0"
      # -- propagators for distributed context propagation.
      - name: OTEL_PROPAGATORS
        value: "tracecontext,baggage"
      # -- disable metrics exporter (traces-only configuration).
      - name: OTEL_METRICS_EXPORTER
        value: "none"
      # -- disable logs exporter (traces-only configuration).
      - name: OTEL_LOGS_EXPORTER
        value: "none"

fdsc-edc:
  # -- distributed-tracing configuration for the fdsc-edc workload.
  # Because fdsc-edc is a third-party subchart whose templates are not
  # owned by this umbrella chart, tracing is wired through the subchart's
  # extension points (`additionalEnvVars`, `initContainers`,
  # `additionalVolumes`, `additionalVolumeMounts`) rather than conditional
  # template blocks. The tracing entries are included in the default
  # `common.deployment` lists below, so every fdsc-edc deployment
  # automatically carries the OpenTelemetry Java agent and the standard
  # `OTEL_*` SDK env vars.  Operators who override these lists must merge
  # the tracing entries manually; see the inline comments for a
  # ready-to-copy snippet.
  # NOTE: since `fdsc-edc.deployment` defaults to an empty map, no
  # fdsc-edc pods are rendered unless the operator explicitly defines at
  # least one deployment entry; the default chart output is therefore
  # unaffected.
  tracing:
    # -- toggle OpenTelemetry tracing on the fdsc-edc workload. Leave
    # unset (default) to inherit `tracing.enabled` from the global
    # block; set to `true` / `false` to override.
    enabled:
    # -- logical service name exposed as `OTEL_SERVICE_NAME` and recorded
    # as `service.name` on every span emitted by this workload.
    serviceName: fdsc-edc
    # -- OpenTelemetry Java auto-instrumentation agent configuration.
    # The agent JAR is shipped as a container image and copied into a
    # shared `emptyDir` volume (`otel-agent`) by an init container; the
    # main container then mounts the volume read-only and the JVM picks
    # the agent up via `JAVA_TOOL_OPTIONS`.
    javaagent:
      # -- toggle the Java agent init container. Disable to run fdsc-edc
      # without auto-instrumentation (e.g. when the runtime already
      # carries the agent or manual SDK instrumentation is used). Only
      # meaningful when `fdsc-edc.tracing.enabled` (or the global
      # `tracing.enabled`) is true.
      enabled: true
      # -- container image providing the OpenTelemetry Java agent JAR
      # at `/javaagent.jar`. Pinned to a stable upstream release so
      # behaviour is reproducible across chart versions.
      image: "ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-java:2.11.0"
      # -- [Kubernetes image pull policy](https://kubernetes.io/docs/concepts/containers/images/#image-pull-policy)
      # for the agent init container.
      pullPolicy: IfNotPresent
  common:
    ## configuration for the k8s service to access cp
    service:
      # -- service type
      type: ClusterIP
      # -- port to be used by the service
      port: 8081
      # -- additional annotations, if required
      annotations: {}
      # -- define the name of the service and avoid generating one
      serviceNameOverride: ""
      protocol:
        port: 8080
      control:
        port: 8082
      catalog:
        port: 8083
      version:
        port: 8084
      management:
        port: 8085

    ## deployment specific configuration
    deployment:
      # -- port that the cp container uses
      port: 8080
      # -- base path of the controlplane
      path: /api
      # -- initial number of target replications, can be different if autoscaling is enabled
      replicaCount: 1
      # -- number of old replicas to be retained
      revisionHistoryLimit: 3
      ## configuration of the cp update strategy
      updateStrategy:
        # -- type of the update
        type: RollingUpdate
        # -- new pods will be added gradually
        rollingUpdate:
          # -- number of pods that can be created above the desired amount while updating
          maxSurge: 1
          # -- number of pods that can be unavailable while updating
          maxUnavailable: 0
      # -- secrets for pulling images from a private repository
      # ref: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
      imagePullSecrets: []
      # -- additional labels for the deployment, if required
      additionalLabels: {}
      # -- additional annotations for the deployment, if required
      additionalAnnotations: {}

      # -- additional environment variables for the fdsc-edc containers.
      # The subchart template renders these via
      # `$cfg.deployment.additionalEnvVars`.
      # When overriding, include the tracing entries below to keep
      # OpenTelemetry instrumentation functional (adjust the endpoint to
      # match your release name or external collector):
      #   - name: JAVA_TOOL_OPTIONS
      #     value: "-javaagent:/otel-agent/opentelemetry-javaagent.jar"
      #   - name: OTEL_SERVICE_NAME
      #     value: "fdsc-edc"
      #   - name: OTEL_EXPORTER_OTLP_ENDPOINT
      #     value: "http://<release>-opentelemetry-collector:4317"
      #   - name: OTEL_EXPORTER_OTLP_PROTOCOL
      #     value: "grpc"
      #   - name: OTEL_EXPORTER_OTLP_INSECURE
      #     value: "true"
      #   - name: OTEL_TRACES_SAMPLER
      #     value: "parentbased_traceidratio"
      #   - name: OTEL_TRACES_SAMPLER_ARG
      #     value: "1.0"
      #   - name: OTEL_PROPAGATORS
      #     value: "tracecontext,baggage"
      #   - name: OTEL_RESOURCE_ATTRIBUTES
      #     value: "service.name=fdsc-edc"
      #   - name: OTEL_METRICS_EXPORTER
      #     value: "none"
      #   - name: OTEL_LOGS_EXPORTER
      #     value: "none"
      additionalEnvVars:
        # tracing: attach the OpenTelemetry Java agent to the JVM.
        # Any user-provided JAVA_TOOL_OPTIONS value should be
        # concatenated after the agent flag to preserve both.
        - name: JAVA_TOOL_OPTIONS
          value: "-javaagent:/otel-agent/opentelemetry-javaagent.jar"
        # tracing: standard OpenTelemetry SDK environment variables.
        # These mirror the settings from the global `tracing` section.
        # Adjust `OTEL_EXPORTER_OTLP_ENDPOINT` to match your deployment
        # – the default targets the bundled collector using a release
        # name of "dsc"; override when the Helm release name differs or
        # an external collector is used.
        - name: OTEL_SERVICE_NAME
          value: "fdsc-edc"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: ""
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: "grpc"
        - name: OTEL_EXPORTER_OTLP_INSECURE
          value: "true"
        - name: OTEL_TRACES_SAMPLER
          value: "parentbased_traceidratio"
        - name: OTEL_TRACES_SAMPLER_ARG
          value: "1.0"
        - name: OTEL_PROPAGATORS
          value: "tracecontext,baggage"
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: "service.name=fdsc-edc"
        - name: OTEL_METRICS_EXPORTER
          value: "none"
        - name: OTEL_LOGS_EXPORTER
          value: "none"

      # -- additional volume mounts for the fdsc-edc containers.
      # When overriding, include the `otel-agent` entry below to keep
      # tracing functional:
      #   - name: otel-agent
      #     mountPath: /otel-agent
      #     readOnly: true
      additionalVolumeMounts:
        - name: credential-repo
          mountPath: /credential-repo
        - name: signing-key
          mountPath: /signing-key
        # add the self generated root ca to the system truststore
        - name: root-ca
          mountPath: /etc/ssl/cacert.pem
          subPath: cacert.pem
        - name: cacerts
          mountPath: /usr/lib/jvm/java-21/lib/security/cacerts
          subPath: cacerts
        # tracing: read-only view of the `otel-agent` volume seeded
        # by the `otel-agent-init` init container.
        - name: otel-agent
          mountPath: /otel-agent
          readOnly: true
      # -- additional volumes to be added for the fdsc-edc containers.
      # When overriding, include the `otel-agent` entry below to keep
      # tracing functional:
      #   - name: otel-agent
      #     emptyDir:
      #       sizeLimit: 32Mi
      additionalVolumes:
        - name: marketplace-credential-script
          configMap:
            name: marketplace-credential
            defaultMode: 0755
        - name: ca-certs-script
          configMap:
            name: ca-certs-script
            defaultMode: 0755
        - name: credential-repo
          emptyDir: {}
        # -- signing-key holds the PKCS#8-converted private key, written by the convert-signing-key init container
        - name: signing-key
          emptyDir: {}
        # -- signing-key-raw holds the cert-manager TLS secret whose EC key is in SEC1 format;
        # override secretName per participant (e.g. fancy-marketplace.biz-tls or mp-operations.org-tls)
        - name: signing-key-raw
          secret:
            secretName: signing-key
        - name: root-ca
          secret:
            secretName: root-ca
        - name: cacerts
          emptyDir: {}
        # tracing: shared scratch volume that holds the copy of
        # `opentelemetry-javaagent.jar` produced by the init container.
        - name: otel-agent
          emptyDir:
            sizeLimit: 32Mi
      # -- init containers for the fdsc-edc deployment.
      # When overriding, include the `otel-agent-init` entry below to
      # keep tracing functional:
      #   - name: otel-agent-init
      #     image: "ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-java:2.11.0"
      #     imagePullPolicy: IfNotPresent
      #     command: ["cp", "/javaagent.jar", "/otel-agent/opentelemetry-javaagent.jar"]
      #     securityContext:
      #       runAsNonRoot: true
      #       readOnlyRootFilesystem: true
      #       allowPrivilegeEscalation: false
      #       capabilities:
      #         drop: [ALL]
      #     volumeMounts:
      #       - name: otel-agent
      #         mountPath: /otel-agent
      initContainers:
        # -- converts the SEC1 EC private key from the cert-manager TLS secret to PKCS#8 format
        - name: convert-signing-key
          image: alpine/openssl:3.5.5
          command: ["sh", "-c", "openssl pkcs8 -topk8 -nocrypt -in /signing-key-raw/tls.key -out /signing-key/tls.key"]
          volumeMounts:
            - name: signing-key-raw
              mountPath: /signing-key-raw
            - name: signing-key
              mountPath: /signing-key
        # tracing: copy the OpenTelemetry Java agent JAR from the
        # pinned upstream image into the shared `otel-agent` volume so
        # the main container can attach it via `JAVA_TOOL_OPTIONS`.
        - name: otel-agent-init
          image: "ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-java:2.11.0"
          imagePullPolicy: IfNotPresent
          command:
            - cp
            - /javaagent.jar
            - /otel-agent/opentelemetry-javaagent.jar
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: otel-agent
              mountPath: /otel-agent
      ## cp resource requests and limits, we leave the default empty to make that a concious choice by the user.
      ## for the autoscaling to make sense, you should configure this.
      # resources:
      # limits:
      # cpu: 100m
      # memory: 128Mi
      # requests:
      # cpu: 100m
      # memory: 128Mi
      # -- selector template
      # ref: https://kubernetes.io/docs/user-guide/node-selection/
      nodeSelector: {}
      # -- tolerations template
      # ref: ref: https://kubernetes.io/docs/concepts/configuration/taint-and-toleration/
      tolerations: []
      # -- affinity template
      # ref: https://kubernetes.io/docs/concepts/configuration/assign-pod-node/#affinity-and-anti-affinity
      affinity: {}
      ## liveness and readiness probes
      # ref: https://kubernetes.io/docs/concepts/workloads/pods/pod-lifecycle/#container-probes
      livenessProbe:
        initialDelaySeconds: 30
        periodSeconds: 10
        successThreshold: 1
        timeoutSeconds: 30
      readinessProbe:
        initialDelaySeconds: 31
        periodSeconds: 10
        successThreshold: 1
        timeoutSeconds: 30
      # -- arguments to be set for the container
      args: []
      # -- command to be used for starting the container
      command: []
      # -- individual ports and paths

    ## pod autoscaling configuration, use for automatic scaling of the broker pods
    autoscaling:
      #  -- should autoscaling be enabled for cp
      enabled: false

    # -- a list of additional env vars to be set
    additonalEnvVars: []

    config:
      oauth:
        tokenUrl:
      # -- configuration for the OID4VP extension
      oid4vp:
        # -- should the extension be enabled
        enabled: false
        # -- client id to be used for OID4VP
        clientId: "dsp"
        # -- scope to be used
        scope: "openid"
        # -- trust all certificates presented at https. DO NOT USE IN PRODUCTION
        trustAll: true
        # -- identification of the credentials holder
        holder:
          # -- id of the holder
          id:
          # -- kid to be used for signing, often the same as id
          kid:
          # -- algorithm to be used for signing the verifiable presentations
          signatureAlgorithm: ECDH-ES
          # -- key to be used for signing the presentations
          key:
            # -- type of the key
            type: EC
            # -- path to the key
            path: oid4vp/private-key.pem
        # -- folder of the credentials to be used for authentication
        credentialsFolder: oid4vp/credentials
        # -- additional trust-anchors to be used for client identification(e.g. the verifier)
        trustAnchorsFolder:
        # -- claim used inside the jwts for identifying the organization
        organizationClaim: verifiableCredential.issuer
        # -- configuration of the proxy to be used for OID4VP authentication
        proxy:
          # -- should a proxy be used at all
          enabled: false
          # -- host of the proxy
          host:
          # port of the proxy
          port:
      # -- configuration of the test-extension. Only relevant for running conformance tests
      testExtension:
        # -- should it be enabled
        enabled: false
        # -- configuration of the test controller
        controller:
          # -- should the controller providing additional test endpoints be enabled
          enabled: false
          # -- port that the test endpoints are available at
          port: 8687
          # -- path that the test endpoints are available at
          path: /tck
        # -- configuration of the test identity service
        identity:
          enabled: false

      # -- configuration of the TMForum extension
      tmfExtension:
        # -- should the extension be enabled
        enabled: true
        # -- address of the quote api to be used
        quoteApi:
        # -- address of the agreement api to be used
        agreementApi:
        # -- address of the product ordering api to be used
        productOrderApi:
        # -- address of the product catalog api to be used
        productCatalogApi:
        # -- address of the product inventory api to be used
        productInventoryApi:
        # -- address of the usage management api to be used
        usageManagementApi:
        # -- address of the party catalog api to be used
        partyCatalogApi:
        # -- should the tmforum extension for the catalog endpoint be enable
        catalog:
          enabled: true

      # -- configuration of the transfer process extension
      fdscTransfer:
        # -- should it be enabled
        enabled: true
        # -- host to be used for offering the transfer processes
        transferHost:
        # -- configuration to be used in case provisioning of DCP secured resources is supported
        dcp:
          # -- should it be enabled
          enabled: false
          # -- address of the dsp-jwks endpoint
          oid:
            host:
            jwksPath: /.well-known/jwks
            openIdPath: /.well-known/openid-configuration

        # -- configuration to be used in case provisioning of OID4VC secured resources is supported
        oid4vc:
          # -- should OID4VC provisioning be enabled
          enabled: false
          # -- address of the credentials config service to be used
          credentialsConfigAddress:
          # -- external host of the verifier to be used for OID4VP on transfers
          verifierHost:
          # -- internal host of the verifier to be used for OID4VP on transfers, the external one can also be reused here
          verifierInternalHost:
          # -- internal address of the open policy agent - to be used as PDP on the incoming routes
          opaHost: http://localhost:8181
          # -- host of the ODRL-PAP to register the policies
          odrlPapHost: http://odrl-pap:8080
        # -- configuration of the apisix to be confiugured for serving the process
        apisix:
          # -- address of the management api of apisix
          address:
          # -- token to be used as an API-Key at the mangement api
          token:
          # -- in case the route should use a proxy, configure it here
          httpsProxy:

      ## -- configuration of the trusted issuers list to be use in case of DCP
      ebsiTir:
        ## -- should an ebsi-api based tir be used?
        enabled: false
        ## -- address to the trusted issuers list
        tilAddress:

      ## -- configuration for dcp based authn/z
      dcp:
        ## -- should it be enabled
        enabled: false
        ## -- configuration of the default scopes for the endpoints
        scopes:
          ## -- scope for the catalog
          catalog:
          ## -- scope for interacting with the negotiation protocol
          negotiation:
          ## -- scope for interacting with the transfer protocol
          transfer:
          ## -- scope for the version endpoint
          version:

      ## -- general configuration for the edc
      edc:
        participant:
          ## -- id of the participant to be used
          id:
        log:
          ## -- loglevel to be used
          level: DEBUG
        # -- handling of edc internal json-ld resolution
        jsonld:
          https:
            enabled: true
          http:
            enabled: trusted
      ## -- endpoints to be provided by the edc
      web:
        http:
          port: 8081
          ## -- configuration of the dsp protocol
          protocol:
            path: /api/dsp
            port: 8080
          ## -- configuration of the control api
          control:
            path: /api/control
            port: 8082
          ## -- configuration of the catalog api
          catalog:
            path: /api/catalog
            port: 8083
          ## -- configuration of the version api
          version:
            path: /api/version
            port: 8084
          ## -- configuration of the management api
          management:
            path: /api/v1/management
            port: 8085

      vault:
        hashicorp:
          enabled: true
          url: "http://{{ .Release.Name }}-vault:8200"
          token: "root"
          timeout: 30

# -- helper script to retrieve credentials for applications
credentials:
  # -- should the script be enabled
  enabled: false
  # -- config of the keycloak to get credentials from
  keycloak:
    # -- address of the keycloak
    address:
    # -- realm to be used
    realm:
    # -- clientId to be used for retrieval
    clientId:
    # -- username to get the credentials for
    username:
    # -- scope to be used for the client
    scope:
    # -- password to authenticate with at keycloak
    password:
  # -- configurations of the credentials to be retrieved
  configurations: []
    # -- id of the credentials config to be used
    # - id:
    # -- format to request the credential in
    # format:
    # -- name of the file to store the credential at
    # targetFile:

identityhub:
  enabled: false
  image:
    repository: "tractusx/identityhub"
    # -- Overrides the image tag whose default is the chart appVersion
    tag: sha-687d69f
    # -- [Kubernetes image pull policy](https://kubernetes.io/docs/concepts/containers/images/#image-pull-policy) to use
    pullPolicy: IfNotPresent
  initContainers: []
  # -- configuration of the super user to be created in the identity hub
  # -- the api key needs to be in form base64(<username>).<random-string>
  superuser:
    # -- reference to the existing secret containing the key
    existingSecret:
    # -- key in the secret containing the key
    existingSecretKeyKey:
    # -- the plain key, will be ignored if existingSecret is set
    key:
  livenessProbe:
    # -- Whether to enable kubernetes [liveness-probe](https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/)
    enabled: true
    # -- seconds to wait before performing the first liveness check
    initialDelaySeconds: 5
    # -- this fields specifies that kubernetes should perform a liveness check every 5 seconds
    periodSeconds: 5
    # -- number of seconds after which the probe times out
    timeoutSeconds: 5
    # -- when a probe fails kubernetes will try 6 times before giving up
    failureThreshold: 6
    # -- number of consecutive successes for the probe to be considered successful after having failed
    successThreshold: 1
  readinessProbe:
    # -- Whether to enable kubernetes [readiness-probes](https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/)
    enabled: true
    # -- seconds to wait before performing the first readiness check
    initialDelaySeconds: 5
    # -- this fields specifies that kubernetes should perform a readiness check every 5 seconds
    periodSeconds: 5
    # -- number of seconds after which the probe times out
    timeoutSeconds: 5
    # -- when a probe fails kubernetes will try 6 times before giving up
    failureThreshold: 6
    # -- number of consecutive successes for the probe to be considered successful after having failed
    successThreshold: 1
  didIngress:
    enabled: true
    port: did
  # -- endpoints of the control plane
  endpoints:
    # -- default api for health checks, should not be added to any ingress
    default:
      # -- port for incoming api calls
      port: 8081
      # -- path for incoming api calls
      path: /api
    # -- management api, used by internal users, can be added to an ingress and must not be internet facing
    identity:
      # -- port for incoming api calls
      port: 8082
      # -- path for incoming api calls
      path: /api/identity
      # -- authentication key, must be attached to each 'X-Api-Key' request header
      authKeyAlias:
    # -- DCP Presentation API endpoint
    credentials:
      # -- port for incoming api calls
      port: 8083
      # -- path for incoming api calls
      path: /api/credentials
    # -- DID service endpoint. DID documents can be resolved from here.
    did:
      # -- port for incoming api calls
      port: 8084
      # -- path for incoming api calls
      path: /
    # -- STS Accounts API, used to manipulate STS accounts
    accounts:
      port: 8085
      path: /api/accounts
    # -- Version API, used to obtain exact version information about all APIs at runtime
    version:
      port: 8086
      path: /.well-known/api
    # -- STS Endpoint, used to obtain tokens
    sts:
      port: 8087
      path: /api/sts
  service:
    # -- [Service type](https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types) to expose the running application on a set of Pods as a network service.
    type: ClusterIP
    annotations: {}
  # -- additional labels for the pod
  podLabels: {}
  # -- additional annotations for the pod
  podAnnotations: {}
  # -- The [pod security context](https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-pod) defines privilege and access control settings for a Pod within the deployment
  podSecurityContext:
    seccompProfile:
      # -- Restrict a Container's Syscalls with seccomp
      type: RuntimeDefault
    # -- Runs all processes within a pod with a special uid
    runAsUser: 10100
    # -- Processes within a pod will belong to this guid
    runAsGroup: 10100
    # -- The owner for volumes and any files created within volumes will belong to this guid
    fsGroup: 10100
  # The [container security context](https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-container) defines privilege and access control settings for a Container within a pod
  securityContext:
    capabilities:
      # -- Specifies which capabilities to drop to reduce syscall attack surface
      drop:
        - ALL
      # -- Specifies which capabilities to add to issue specialized syscalls
      add: []
    # -- Whether the root filesystem is mounted in read-only mode
    readOnlyRootFilesystem: true
    # -- Controls [Privilege Escalation](https://kubernetes.io/docs/concepts/security/pod-security-policy/#privilege-escalation) enabling setuid binaries changing the effective user ID
    allowPrivilegeEscalation: false
    # -- Requires the container to run without root privileges
    runAsNonRoot: true
    # -- The container's process will run with the specified uid
    runAsUser: 10100
  # Extra environment variables that will be pass onto deployment pods
  env: {}
  #  ENV_NAME: value

  # "valueFrom" environment variable references that will be added to deployment pods. Name is templated.
  # ref: https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.19/#envvarsource-v1-core
  envValueFrom: {}
  #  ENV_NAME:c
  #    configMapKeyRef:
  #      name: configmap-name
  #      key: value_key
  #    secretKeyRef:
  #      name: secret-name
  #      key: value_key

  # [Kubernetes Secret Resource](https://kubernetes.io/docs/concepts/configuration/secret/) names to load environment variables from
  envSecretNames: []
  #  - first-secret
  #  - second-secret

  # [Kubernetes ConfigMap Resource](https://kubernetes.io/docs/concepts/configuration/configmap/) names to load environment variables from
  envConfigMapNames: ["identityhub-config", "identityhub-datasource-config"]
  #  - first-config-map
  #  - second-config-map

  # -- declare where to mount [volumes](https://kubernetes.io/docs/concepts/storage/volumes/) into the container
  volumeMounts: []
  # -- [volume](https://kubernetes.io/docs/concepts/storage/volumes/) directories
  volumes: []
  # -- [resource management](https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/) for the container
  resources:
    limits:
      cpu: 1.5
      memory: 512Mi
    requests:
      cpu: 500m
      memory: 128Mi
  replicaCount: 1
  autoscaling:
    # -- Enables [horizontal pod autoscaling](https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/)
    enabled: false
    # -- Minimal replicas if resource consumption falls below resource threshholds
    minReplicas: 1
    # -- Maximum replicas if resource consumption exceeds resource threshholds
    maxReplicas: 100
    # -- targetAverageUtilization of cpu provided to a pod
    targetCPUUtilizationPercentage: 80
    # -- targetAverageUtilization of memory provided to a pod
    targetMemoryUtilizationPercentage: 80
  # Configuration of the [Java Util Logging Facade](https://docs.oracle.com/javase/7/docs/technotes/guides/logging/overview.html)
  logging:
    # -- Enable logging to create .log files
    enabled: true
    persistence:
      # -- Enable .log files to persist in local machine
      enabled: false
    # -- List of handlers to use in the logger
    handlers:
      - java.util.logging.ConsoleHandler
      - java.util.logging.FileHandler
    handlersConfig:
      # -- Console handler configuration
      java.util.logging.ConsoleHandler:
        level: FINE
        formatter: org.eclipse.tractusx.identityhub.monitor.ColorfulFormatter
      java.util.logging.FileHandler:
        # -- Log level of handler
        level: FINE
        # -- Formatter to use in handler, formatter must be set in identityhub.logging.formatters
        formatter: org.eclipse.tractusx.identityhub.monitor.ColorfulFormatter
        # -- Path where the log is created, must be the same path as the logging.path values
        pattern: /app/logs/identityhub.log
        # -- Limit of bytes to write before log file rotation
        limit: 0
        # -- Number of files to use in log file rotation
        count: 1
        # -- Append logs to the file or create new file every deployment
        append: true
    formatters:
      # -- configuration of custom colorful formatter
      org.eclipse.tractusx.identityhub.monitor.ColorfulFormatter:
        format: "%7$s[%1$tY-%1$tm-%1$td %1$tH:%1$tM:%1$tS] [%4$s] %5$s%6$s%n%8$s"
    # -- root log level
    level: INFO
    # -- package level control
    # @default -- `{"org.eclipse.edc": "FINE"}`
    logLevels:
      org.glassfish: "OFF"
      jdk.event: "OFF"
      jakarta.json: "OFF"
      org.jvnet: "OFF"
      okhttp3.internal: "OFF"
      org.flywaydb: "OFF"
      org.postgresql: "OFF"
      org.eclipse.edc: "FINE"
      org.eclipse.tractusx: "FINE"
    # -- path where the log resides, must be the same path as the fileHandler pattern
    path: /app/logs
    # -- default logging properties if logging is not enabled
    default: |-
      .level=INFO
      org.eclipse.edc.level=INFO
      handlers=java.util.logging.ConsoleHandler
      java.util.logging.ConsoleHandler.formatter=org.eclipse.tractusx.identityhub.monitor.ColorfulFormatter
      java.util.logging.ConsoleHandler.level=ALL
      org.eclipse.tractusx.identityhub.monitor.ColorfulFormatter.format=%7$s[%1$tY-%1$tm-%1$td %1$tH:%1$tM:%1$tS] [%4$s] %5$s%6$s%n%8$s
  # [node selector](https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#nodeselector) to constrain pods to nodes
  nodeSelector: {}
  # [tolerations](https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/) to configure preferred nodes
  tolerations: []
  # [affinity](https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#affinity-and-anti-affinity) to configure which nodes the pods can be scheduled on
  affinity: {}
  url:
    # -- Explicitly declared url for reaching the dsp api (e.g. if ingresses not used)
    protocol: ""
    public: ""
    readiness: ""
  postgresql:
    host: postgres
    port: "5432"
    database: "ih"
    auth:
      username: ih
      password:
      existingSecret: ih.postgres.credentials.postgresql.acid.zalan.do
      existingSecretPasswordKey: password
  # -- distributed-tracing configuration for the IdentityHub component.
  # Values here override or complement the global `tracing:` block. When
  # tracing is active the deployment gains an init container that copies
  # the OpenTelemetry Java auto-instrumentation agent into a shared
  # volume, mounts the volume read-only into the IdentityHub container,
  # prepends `-javaagent:/otel-agent/opentelemetry-javaagent.jar` to
  # `JAVA_TOOL_OPTIONS`, and receives the standard `OTEL_*` SDK
  # environment variables rendered by the `dsc.otel.env` helper.
  tracing:
    # -- toggle OpenTelemetry tracing on the IdentityHub workload. Leave
    # unset (default) to inherit `tracing.enabled` from the global
    # block; set to `true` / `false` to override.
    enabled:
    # -- logical service name exposed as `OTEL_SERVICE_NAME` and recorded
    # as `service.name` on every span emitted by this workload.
    serviceName: identityhub
    # -- OpenTelemetry Java auto-instrumentation agent configuration.
    # The agent JAR is shipped as a container image and copied into a
    # shared `emptyDir` volume (`otel-agent`) by an init container; the
    # main container then mounts the volume read-only and the JVM picks
    # the agent up via `JAVA_TOOL_OPTIONS`.
    javaagent:
      # -- toggle the Java agent init container. Disable to run the
      # IdentityHub without auto-instrumentation (e.g. when the runtime
      # already carries the agent or manual SDK instrumentation is
      # used). Only meaningful when `identityhub.tracing.enabled` (or
      # the global `tracing.enabled`) is true.
      enabled: true
      # -- container image providing the OpenTelemetry Java agent JAR
      # at `/javaagent.jar`. Pinned to a stable upstream release so
      # behaviour is reproducible across chart versions.
      image: "ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-java:2.11.0"
      # -- [Kubernetes image pull policy](https://kubernetes.io/docs/concepts/containers/images/#image-pull-policy)
      # for the agent init container.
      pullPolicy: IfNotPresent

vault:
  enabled: false
  injector:
    enabled: false
  server:
    dev:
      enabled: true
      devRootToken: "root"
    postStart: # must be set externally!
  hashicorp:
    url: "http://{{ .Release.Name }}-vault:8200"
    token: "root"
    timeout: 30
    healthCheck:
      enabled: true
      standbyOk: true
    paths:
      secret: /v1/secret
      health: /v1/sys/health

# -- configuration for the cert-manager component (https://github.com/cert-manager/cert-manager/blob/master/deploy/charts/cert-manager/values.yaml)
cert-manager:
  enabled: false
  startupapicheck:
    # -- Hook annotations to ensure the cert-manager webhook is ready
    # before creating Issuers/Certificates in the post-install hooks.
    jobAnnotations:
      "helm.sh/hook": post-install,post-upgrade
      "helm.sh/hook-weight": "0"
      "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation

# -- configuration for additional resources to be deployed for cert-manager, like ClusterIssuers
certManagerResources:
  # -- Toggle for deploying additional ClusterIssuers and bootstrap resources.
  # Set to true to automate certificate infrastructure after the subchart install.
  enabled: false
  # -- The namespace where cert-manager is deployed.
  # Required to place the CA Secret for the 'selfsigned' mode.
  namespace: cert-manager
  # -- Type of certificate issuer to configure.
  # "selfsigned": Generates a local self-signed CA (ideal for Dev/Internal labs).
  # "prod": Configures Let's Encrypt Production issuer (real trusted SSL).
  type: "prod"
  # -- Email address for ACME registration (required for "prod" mode).
  # Let's Encrypt will send expiration notifications to this address.
  acmeEmail: "admins@example.com"
  # -- The Ingress Class that cert-manager will use for HTTP-01 challenges (required for "prod" mode).
  # Must match the 'ingressClassName' of your controller (e.g., nginx, traefik).
  ingressClass: "nginx"

# -- list of extra Kubernetes manifests to deploy alongside the chart.
# Each entry can be a string (raw YAML, supports Helm templating) or an object.
extraManifests: []

# -- dashboard for operating the FIWARE Data Space Connector
fdsc-dashboard:
  enabled: false

prometheus:
  enabled: false

grafana:
  enabled: false
  
# -- global distributed-tracing configuration used by every component that
# supports OpenTelemetry. The values under this block are fed into the
# `dsc.otel.env` template helper and rendered as the standard `OTEL_*`
# environment variables on each workload. Flipping `tracing.enabled` off
# disables tracing everywhere; per-component toggles live under each
# subchart's `tracing:` key and default to the global value.
tracing:
  # -- global on/off switch for OpenTelemetry tracing across the data-space
  # connector. When false, no `OTEL_*` env vars are injected and the
  # `opentelemetry-collector` subchart stays disabled by default.
  enabled: false
  # -- OTLP exporter configuration used by every traced workload. The
  # default endpoint targets the in-cluster OpenTelemetry Collector
  # deployed by this umbrella chart; override to point at an external
  # collector or directly at a backend (Tempo, Jaeger, Honeycomb, ...).
  exporter:
    otlp:
      # -- OTLP endpoint the workloads export spans to. The default targets
      # the bundled collector service
      # (`<release>-opentelemetry-collector:4317`).
      endpoint: ""
      # -- OTLP protocol: `grpc` (default, port 4317) or `http/protobuf`
      # (port 4318). Must match the collector's listening protocol.
      protocol: "grpc"
      # -- disable TLS on the OTLP exporter. Set to false and configure
      # the collector / backend with certificates for production.
      insecure: true
  # -- trace sampler name, passed as `OTEL_TRACES_SAMPLER`. Accepts any
  # value supported by the OpenTelemetry SDK: `always_on`, `always_off`,
  # `traceidratio`, `parentbased_always_on`, `parentbased_traceidratio`.
  sampler: "parentbased_traceidratio"
  # -- argument for the sampler, passed as `OTEL_TRACES_SAMPLER_ARG`. For
  # ratio-based samplers this is the sampling probability in [0.0, 1.0].
  samplerArg: "1.0"
  # -- extra resource attributes merged into `OTEL_RESOURCE_ATTRIBUTES`
  # for every traced workload. Service-specific attributes (such as
  # `service.name`) are added automatically by the helper.
  resourceAttributes: {}
  #   deployment.environment: "production"
  #   service.namespace: "dsc"
  # -- propagators to use, passed as `OTEL_PROPAGATORS`. Comma-separated
  # list; see
  # https://opentelemetry.io/docs/languages/sdk-configuration/general/#otel_propagators
  propagators: "tracecontext,baggage"
  # -- auto-instrumentation via the OpenTelemetry Operator. When enabled,
  # renders an `Instrumentation` CR that the Operator's mutating webhook
  # uses to inject language-specific agents into annotated pods. Requires
  # `opentelemetry-operator.enabled: true` and cert-manager.
  autoInstrumentation:
    # -- master gate for auto-instrumentation. When true, the chart renders
    # the `Instrumentation` CR. Pods still need the matching
    # `instrumentation.opentelemetry.io/inject-<lang>: "true"` annotation
    # to be instrumented.
    enabled: false
    # -- Java auto-instrumentation agent settings.
    java:
      # -- container image for the Java auto-instrumentation agent init
      # container injected by the Operator.
      image: "ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-java:2.11.0"
    # -- Python auto-instrumentation agent settings.
    python:
      # -- container image for the Python auto-instrumentation agent init
      # container injected by the Operator.
      image: "ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-python:0.54b0"
    # -- Node.js auto-instrumentation agent settings.
    nodejs:
      # -- container image for the Node.js auto-instrumentation agent init
      # container injected by the Operator.
      image: "ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-nodejs:0.75.0"

# -- values passed to the bundled `opentelemetry-operator` subchart
# (chart: open-telemetry/opentelemetry-operator). The operator provides
# Kubernetes-native auto-instrumentation by injecting language-specific
# agents into annotated pods via a mutating webhook. Requires cert-manager
# for webhook certificate management.
opentelemetry-operator:
  # -- toggle the bundled OpenTelemetry Operator subchart. When enabled,
  # deploys the operator which watches for `Instrumentation` CRs and
  # injects auto-instrumentation agents into annotated pods.
  enabled: false
  # -- admission webhook configuration. Both policies must be `Ignore`
  # when the operator and workloads are deployed in the same Helm
  # release, because the pod injection webhook (`mpod.kb.io`)
  # intercepts ALL pod creation — including the operator's own pods —
  # creating a circular dependency with `Fail`. On first install, pods
  # created before the operator is ready will lack injection; a
  # `kubectl rollout restart` of the annotated deployments resolves
  # this. Subsequent upgrades work without restart because the operator
  # is already running.
  admissionWebhooks:
    failurePolicy: Ignore
    pods:
      failurePolicy: Ignore
  # -- operator manager configuration.
  manager:
    # -- collector image used by the operator when creating
    # OpenTelemetryCollector CRs. Required by the chart since v0.86.0.
    collectorImage:
      repository: "otel/opentelemetry-collector-contrib"
    # -- resource limits for the operator manager pod.
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi

# -- values passed to the bundled `opentelemetry-collector` subchart
# (chart: open-telemetry/opentelemetry-collector). The collector is only
# rendered when `opentelemetry-collector.enabled` is true; by default it
# stays off so existing deployments are unaffected. When `tracing.enabled`
# is flipped on, operators typically also flip `opentelemetry-collector.enabled`
# on to get an in-cluster collector reachable on port 4317/4318.
opentelemetry-collector:
  # -- toggle the bundled OpenTelemetry Collector subchart. Keep false
  # when pointing `tracing.exporter.otlp.endpoint` at an external
  # collector.
  enabled: false
  # -- deployment topology for the collector. Valid values are
  # `deployment`, `daemonset`, and `statefulset`. `deployment` is the
  # right default for a dedicated, shared collector workload.
  mode: deployment
  # -- number of collector replicas when `mode=deployment`.
  replicaCount: 1
  # -- the chart requires an image repository to be set explicitly; we
  # use the upstream contrib image so extra exporters (Tempo, Jaeger,
  # Honeycomb, ...) are available out of the box.
  image:
    repository: otel/opentelemetry-collector-contrib
  # -- CPU / memory resources for the collector. Sized for small
  # deployments; raise for production traffic.
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  # -- disable the subchart's auto-generated ConfigMap; the umbrella
  # chart renders its own ConfigMap via `otel-collector-config-cm.yaml`
  # so that the `otlp/tempo` exporter can be auto-injected when
  # `tempo.enabled=true`.
  configMap:
    # -- when false, the subchart does not create a ConfigMap and instead
    # mounts the one referenced by `existingName`.
    create: false
    # -- name of the externally managed ConfigMap containing the collector
    # pipeline configuration under the `relay` key. The subchart processes
    # this value through `tpl`, so Helm template expressions work.
    existingName: "{{ .Release.Name }}-otel-collector-config"
  # -- collector pipeline configuration. These values are used as the base
  # pipeline definition; the actual ConfigMap is generated by
  # `otel-collector-config-cm.yaml`. When `tempo.enabled=true`, an
  # `otlp/tempo` exporter targeting the in-cluster Tempo instance is
  # auto-injected into the exporters and the traces pipeline. See the
  # commented-out examples below for connecting to external backends.
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: ${env:MY_POD_IP}:4317
          http:
            endpoint: ${env:MY_POD_IP}:4318
    processors:
      # -- batch processor groups spans before export to reduce network
      # overhead. Defaults are suitable for most workloads.
      batch:
        send_batch_size: 512
        timeout: 5s
        send_batch_max_size: 1024
      # -- filter processor drops noisy spans that are not useful for
      # debugging (health/readiness probes, Prometheus scrapes). Uses
      # the OTTL (OpenTelemetry Transformation Language) syntax supported
      # by the contrib collector image.
      filter/healthcheck:
        error_mode: ignore
        traces:
          span:
            - 'IsMatch(attributes["url.path"], ".*/health.*") or IsMatch(attributes["url.path"], ".*/ready.*") or IsMatch(attributes["url.path"], ".*/prometheus.*")'
            - 'IsMatch(attributes["http.target"], ".*/health.*") or IsMatch(attributes["http.target"], ".*/ready.*") or IsMatch(attributes["http.target"], ".*/prometheus.*")'
      # -- memory_limiter prevents the collector from consuming unbounded
      # memory under load. The percentage-based limits adapt to the pod's
      # memory limit automatically.
      memory_limiter:
        check_interval: 5s
        limit_percentage: 80
        spike_limit_percentage: 25
      # -- resource processor injects deployment-level attributes into
      # every span. Add custom attributes here for your organisation.
      resource:
        attributes:
          - key: deployment.environment
            value: "development"
            action: upsert
          - key: service.namespace
            value: "fiware-dsc"
            action: upsert
    exporters:
      # -- debug exporter writes spans to the collector's stdout. Safe
      # default that works out of the box with no external dependencies.
      # Set `verbosity: detailed` to see full span payloads.
      debug:
        verbosity: basic
      ## -------------------------------------------------------------------
      ## Example: OTLP exporter to an external backend
      ## Uncomment and configure ONE of the blocks below (or add your own).
      ## Then add the exporter name to `service.pipelines.traces.exporters`.
      ## -------------------------------------------------------------------
      ##
      ## -- OTLP exporter to Grafana Tempo (gRPC).
      ## Replace <TEMPO_HOST> with the Tempo distributor address.
      # otlp/tempo:
      #   endpoint: "<TEMPO_HOST>:4317"
      #   tls:
      #     insecure: true
      ##
      ## -- OTLP exporter to a generic Jaeger backend (gRPC).
      ## Jaeger v2+ supports native OTLP ingestion on port 4317.
      # otlp/jaeger:
      #   endpoint: "<JAEGER_HOST>:4317"
      #   tls:
      #     insecure: true
      ##
      ## -- OTLP exporter to Honeycomb (gRPC with API key header).
      # otlp/honeycomb:
      #   endpoint: "api.honeycomb.io:443"
      #   headers:
      #     "x-honeycomb-team": "<YOUR_HONEYCOMB_API_KEY>"
      #     "x-honeycomb-dataset": "fiware-dsc"
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, filter/healthcheck, resource, batch]
          exporters: [debug]
          ## To export to a backend, add its exporter name to the list:
          ## exporters: [debug, otlp/tempo]
  ## -------------------------------------------------------------------
  ## Collector configuration examples
  ## -------------------------------------------------------------------
  ##
  ## 1) Point at an external Grafana Tempo instance:
  ##
  ##    opentelemetry-collector:
  ##      enabled: true
  ##      config:
  ##        exporters:
  ##          otlp/tempo:
  ##            endpoint: "tempo-distributor.monitoring:4317"
  ##            tls:
  ##              insecure: true
  ##        service:
  ##          pipelines:
  ##            traces:
  ##              receivers: [otlp]
  ##              processors: [memory_limiter, resource, batch]
  ##              exporters: [debug, otlp/tempo]
  ##
  ## 2) Enable the Jaeger receiver (Thrift Compact on port 6831) in
  ##    addition to OTLP so legacy Jaeger-instrumented services can
  ##    report traces to the same collector:
  ##
  ##    opentelemetry-collector:
  ##      enabled: true
  ##      config:
  ##        receivers:
  ##          jaeger:
  ##            protocols:
  ##              thrift_compact:
  ##                endpoint: ${env:MY_POD_IP}:6831
  ##        service:
  ##          pipelines:
  ##            traces:
  ##              receivers: [otlp, jaeger]
  ##              processors: [memory_limiter, resource, batch]
  ##              exporters: [debug]
  ##
  ## 3) Switch workloads to HTTP/protobuf instead of gRPC:
  ##
  ##    tracing:
  ##      enabled: true
  ##      exporter:
  ##        otlp:
  ##          protocol: "http/protobuf"
  ##          endpoint: "http://<release>-opentelemetry-collector:4318"
  ##
  ##    The collector already listens on both 4317 (gRPC) and 4318 (HTTP)
  ##    by default, so only the workload-side values need to change.

# -- values passed to the bundled `tempo` subchart
# (chart: grafana/tempo). Tempo provides an in-cluster trace storage backend
# that the OpenTelemetry Collector can export spans to. When `tempo.enabled`
# is true a Tempo single-binary instance is deployed; operators can query
# stored traces via Grafana or the Tempo HTTP API on port 3200.
tempo:
  # -- toggle the bundled Grafana Tempo subchart. When enabled, deploys a
  # single-binary Tempo instance for trace storage. Keep false when using
  # an external trace backend (e.g. hosted Tempo, Jaeger, Honeycomb).
  enabled: false
  tempo:
    # -- trace retention period. Traces older than this value are
    # automatically purged. Increase for production workloads.
    retention: 48h
    # -- receiver configuration for Tempo. Only OTLP gRPC and HTTP are
    # enabled; Jaeger and OpenCensus receivers are disabled to minimise
    # the attack surface.
    receivers:
      otlp:
        protocols:
          grpc:
            # -- OTLP gRPC listen address for Tempo.
            endpoint: "0.0.0.0:4317"
          http:
            # -- OTLP HTTP listen address for Tempo.
            endpoint: "0.0.0.0:4318"
      jaeger:
        protocols:
          # -- Jaeger Thrift HTTP receiver -- disabled.
          thrift_http: null
          # -- Jaeger gRPC receiver -- disabled.
          grpc: null
      opencensus: null
    # -- trace storage configuration. Defaults to local filesystem storage
    # suitable for development and testing. For production, override with
    # an S3, GCS, or Azure backend; see the Tempo documentation at
    # https://grafana.com/docs/tempo/latest/configuration/storage/
    storage:
      trace:
        # -- storage backend type. Supported values: local, s3, gcs, azure.
        backend: local
        local:
          # -- filesystem path for completed trace blocks (local backend).
          path: /var/tempo/traces
        wal:
          # -- filesystem path for the write-ahead log (local backend).
          path: /var/tempo/wal
  # -- CPU / memory resources for the Tempo pod. Sized for small
  # deployments; raise limits for production traffic volumes.
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi