# -- configuration to be shared between the issuance components
issuance:
  generatePasswords:
    # -- should a password for the database connection of issuance components be generated in the cluster
    enabled: true
    #-- name of the secret to put the generated password into
    secretName: issuance-secret

decentralizedIam:
  enabled: true

  # -- forward-compatible tracing passthrough for the decentralizedIam subchart.
  # These values mirror the global `tracing.*` block and are passed as-is to
  # the upstream vc-authentication / FIWARE IAM chart. The upstream chart does
  # not yet consume them; once it lands native OpenTelemetry support (see
  # https://github.com/FIWARE/vc-authentication), these values will flow
  # through without further umbrella-chart modifications. Until then, the
  # passthrough has no runtime effect.
  tracing:
    # -- toggle OpenTelemetry tracing for the decentralizedIam components.
    # Leave unset (default) to inherit `tracing.enabled` from the global
    # block; set to `true` / `false` to override independently.
    enabled:
    # -- OTLP exporter configuration passed through to the IAM subchart.
    exporter:
      otlp:
        # -- OTLP endpoint for the IAM components. Defaults to the global
        # `tracing.exporter.otlp.endpoint` value when empty.
        endpoint: ""
        # -- OTLP protocol: `grpc` (default, port 4317) or `http/protobuf`
        # (port 4318).
        protocol: "grpc"
        # -- disable TLS on the OTLP exporter.
        insecure: true
    # -- trace sampler name, mirrored from the global `tracing.sampler`.
    sampler: "parentbased_traceidratio"
    # -- argument for the sampler, mirrored from the global
    # `tracing.samplerArg`.
    samplerArg: "1.0"
    # -- propagators list, mirrored from the global `tracing.propagators`.
    propagators: "tracecontext,baggage"

  # -- configuration for the vc-authentication to be deployed as part of the connector, see https://github.com/FIWARE/vc-authentication/tree/master
  vcAuthentication:
    ## Usage of the postgres-operator - see https://github.com/zalando/postgres-operator
    managedPostgres:
      # -- should it be enabled? Requires the postgres-operator CRDs to be installed before applying the chart
      enabled: true
      # -- config as defined in https://github.com/zalando/postgres-operator/blob/master/charts/postgres-operator/crds/postgresqls.yaml
      config:
        teamId: "dsc"
        numberOfInstances: 1
        postgresql:
          version: "16"
        volume:
          size: 1Gi
        users:
          admin: # maintainer
            - superuser
            - createdb
          til:
            - createdb
          ccs:
            - createdb
          pap:
            - createdb
          keycloak:
            - createdb
          ih:
            - createdb
          issuer:
            - createdb
        databases:
          tildb: til
          ccsdb: ccs
          papdb: pap
          keycloakdb: keycloak
          ih: ih
          issuer: issuer

    # -- configuration for the trusted-issuers-list to be deployed as part of the connector, see https://github.com/FIWARE/helm-charts/tree/main/charts/trusted-issuers-list for all options
    trusted-issuers-list:
      # -- should it be enabled? set to false if one outside the chart is used.
      enabled: true
      # -- allows to set a fixed name for the services
      fullnameOverride: trusted-issuers-list
      # -- connection to the database
      database:
        # -- should persistence be used?
        persistence: true
        # -- name of the db dialect
        dialect: POSTGRES
        # -- name of the db user
        username: postgres
        # -- configuration for the existing secret to get the passwords from
        existingSecret:
          enabled: true
          name: postgres.postgres.credentials.postgresql.acid.zalan.do
          key: password
        # -- host of the database
        host: postgres
        # -- host of the database
        port: 5432
        # -- name of the schema inside the db
        name: tildb

    # -- configuration for the vcverifier to be deployed as part of the connector, see https://github.com/FIWARE/helm-charts/tree/main/charts/vcverifier for all options
    vcverifier:
      # -- should it be enabled? set to false if one outside the chart is used.
      enabled: true
      # -- allows to set a fixed name for the services
      fullnameOverride: verifier
      deployment:
        # -- configuration for the m2m flow, in case the tir is requiring authentication
        m2m:
          # -- we do not need authentication here
          authEnabled: false
        database:
          name: ccsdb
          host: postgres
          type: postgres
          existingSecret:
            name: postgres.postgres.credentials.postgresql.acid.zalan.do
            usernameKey: username
            passwordKey: password
    # -- configuration for the credentials-config-service to be deployed as part of the connector, see https://github.com/FIWARE/helm-charts/tree/main/charts/credentials-config-service for all options
    credentials-config-service:
      # -- should it be enabled? set to false if one outside the chart is used.
      enabled: false
      # -- allows to set a fixed name for the services
      fullnameOverride: credentials-config-service
      # -- connection to the database
      database:
        # -- should persistence be used?
        persistence: true
        # -- name of the db dialect
        dialect: POSTGRES
        # -- name of the db user
        username: postgres
        # -- configuration for the existing secret to get the passwords from
        existingSecret:
          enabled: true
          name: postgres.postgres.credentials.postgresql.acid.zalan.do
          key: password
        # -- host of the database
        host: postgres
        # -- host of the database
        port: 5432
        # -- name of the schema inside the db
        name: ccsdb
      registration:
        enabled: false

    # -- configuration for the digital-signature.service to be deployed as part of the connector in case of did:elsi support
    dss:
      # -- should it be enabled?
      enabled: false
      # -- allows to set a fixed name for the services
      fullnameOverride: dss
      # -- can be used to provide the crl for ca's provided as truststore to the dss
      crl:
        # -- should it be enabled?
        enabled: false

  # configuration for the odrl-authorization to be deployed as part of the connector, see https://github.com/FIWARE/odrl-authorization/tree/master
  odrlAuthorization:
    # -- configuration for the odrl-pap to be deployed as part of the connector, see https://apisix.apache.org/
    apisix:
      ingress-controller:
        enabled: false

      podAnnotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /apisix/prometheus/metrics
        prometheus.io/port: "9091"
      apisix:
        prometheus:
          enabled: true

    # -- configuration for the odrl-pap to be deployed as part of the connector, see https://github.com/FIWARE/helm-charts/tree/main/charts/odrl-pap for all options
    odrl-pap:
      # -- should it be enabled? set to false if one outside the chart is used.
      enabled: true
      # -- allows to set a fixed name for the services
      fullnameOverride: odrl-pap
      # -- connection to the database
      database:
        # -- url to connect the db at
        url: jdbc:postgresql://postgres:5432/papdb
        # -- username to access the db
        username: postgres
        # -- secret to take the password from
        existingSecret:
          enabled: true
          name: postgres.postgres.credentials.postgresql.acid.zalan.do
          key: password

    # -- configuration for the open-policy-agent to be deployed as part of the connector fulfilling the role of the PDP, as a sidecar to apisix
    opa:
      # -- should an opa sidecar be deployed to apisix
      enabled: true
      # -- address of the pap to get the policies from
      resourceUrl: http://odrl-pap:8080/bundles/service/v1
      # -- port to make opa available at
      port: 8181
      # -- pull delays for the policies bundle
      policies:
        minDelay: 2
        maxDelay: 4
      # -- pull delays for the methods bundle
      methods:
        minDelay: 1
        maxDelay: 3
      # -- pull delays for the data bundle
      data:
        minDelay: 1
        maxDelay: 15

    # -- integration of checks for the transfer process protocol
    tpp:
      # -- should checking for a running transfer process be enabled
      enabled: false
      transfers:
        # -- host of the endpoint to check the process id, e.g. rainbow
        host: ""
        # -- path to check the id at
        path: /transfers

## configuration of the context-broker - see https://github.com/FIWARE/helm-charts/tree/main/charts/scorpio-broker-aaio for details
scorpio:
  fullnameOverride: data-service-scorpio
  # -- should scorpio be enabled
  enabled: true
  ## configuration of the image to be used
  image:
    # -- repository to be used - resource friendly all-in-one-runner without kafka
    repository: scorpiobroker/all-in-one-runner
    # -- tag of the image to be used - latest java image without kafka
    tag: java-4.1.10
  ## configuration of the database to be used by broker
  db:
    # -- host of the db
    dbhost: postgres
    # -- username to be used
    user: postgres
    existingSecret:
      enabled: true
      name: postgres.postgres.credentials.postgresql.acid.zalan.do
      key: password
  ## configuration of the readiness probe
  readinessProbe:
    # -- path to be used for the readiness probe, older versions used /actuator/health
    path: /q/health
  ## configuration of the liveness probe
  livenessProbe:
    # -- path to be used for the readiness probe, older versions used /actuator/health
    path: /q/health
  ## configuration to be used for the service offered by scorpio
  service:
    # -- ClusterIP is the recommended type for most clusters
    type: ClusterIP
  # -- configuration to register the dataplane at the credentials-config-service
  ccs:
    # -- should the automatic registration of scorpio be enabled
    enabled: false
    # -- endpoint of the ccs to regsiter at
    endpoint: http://verifier:8090
    # -- configmap to get the registration information from
    configMap: scorpio-registration

  # -- additional init containers to be used for the dataplane
  #initContainers:
  # -- curl container to register at the credentials config service
  #- name: register-credential-config
  #  image: quay.io/curl/curl:8.1.2
  #  command: [ "/bin/sh", "-c", "/bin/init.sh" ]
  #  volumeMounts:
  #    - name: scorpio-registration
  #      mountPath: /bin/init.sh
  #      subPath: init.sh
  # -- additonal volumes to be mounted for the dataplane
  additionalVolumes:
    - name: scorpio-registration
      configMap:
        name: scorpio-registration
        defaultMode: 0755

  # -- distributed-tracing configuration for the scorpio subchart.
  # Scorpio is a Quarkus application with native OpenTelemetry support.
  # Because scorpio is a third-party subchart whose templates are not
  # owned by this umbrella chart, tracing is wired through the subchart's
  # `additionalEnvVars` extension point rather than conditional template
  # blocks. The Quarkus OTEL runtime gate (`QUARKUS_OTEL_ENABLED`) is set
  # to `false` by default so tracing has no runtime effect until
  # explicitly enabled. To activate tracing, override the env vars below
  # (or pass `--set scorpio.additionalEnvVars[0].value=true`) together
  # with `--set tracing.enabled=true`.
  tracing:
    # -- toggle OpenTelemetry tracing on the scorpio workload. Leave
    # unset (default) to inherit `tracing.enabled` from the global
    # block; set to `true` / `false` to override.
    enabled:
    # -- logical service name exposed as `QUARKUS_OTEL_SERVICE_NAME` and
    # recorded as the service identity on every span emitted by scorpio.
    serviceName: scorpio
  # -- additional environment variables for the scorpio container.
  # The Quarkus OpenTelemetry vars below are included by default with
  # `QUARKUS_OTEL_ENABLED=false` so the runtime skips OTEL
  # initialisation. When overriding, include all entries below to keep
  # tracing functional (adjust the endpoint to match your release name
  # or external collector):
  #   - name: QUARKUS_OTEL_ENABLED
  #     value: "true"
  #   - name: QUARKUS_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
  #     value: "http://<release>-opentelemetry-collector:4317"
  #   - name: QUARKUS_OTEL_EXPORTER_OTLP_TRACES_PROTOCOL
  #     value: "grpc"
  #   - name: QUARKUS_OTEL_SERVICE_NAME
  #     value: "scorpio"
  additionalEnvVars:
    # -- Quarkus OTEL runtime gate. Set to "true" to enable tracing.
    - name: QUARKUS_OTEL_ENABLED
      value: "false"
    # -- OTLP traces endpoint. Adjust to match your release name or
    # external collector.
    - name: QUARKUS_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
      value: ""
    # -- OTLP protocol (`grpc` | `http/protobuf`).
    - name: QUARKUS_OTEL_EXPORTER_OTLP_TRACES_PROTOCOL
      value: "grpc"
    # -- Quarkus OTEL service name. Override via
    # `scorpio.tracing.serviceName`.
    - name: QUARKUS_OTEL_SERVICE_NAME
      value: "scorpio"

# -- configuration to issue credentials, using a did:elsi
elsi:
  # -- should a did:elsi be used
  enabled: false
  # -- keystore to be used for signing the credentials
  # keystore:
  # store.p12: <THE_ENCODED_CONTENT>
  # -- the did to be used
  did:
  # -- algorithm of the signing key
  keyAlgorithm:
  # -- path to the keystore
  storePath:
  # -- password for the keystore
  storePassword:
  # -- alias of the key
  keyAlias:
  # -- password of the key
  keyPassword:

## configuration of the keycloak - see https://github.com/CloudPirates-io/helm-charts/tree/main/charts/keycloak for details
keycloak:
  # -- should it be enabled? set to false if one outside the chart is used.
  enabled: true
  # -- keycloak server configuration
  keycloak:
    # -- admin user. password is read from the secret referenced by `existingSecret`
    adminUser: keycloak-admin
    existingSecret: issuance-secret
    secretKeys:
      adminPasswordKey: keycloak-admin
    # -- proxy headers used when TLS is terminated at an upstream ingress/proxy
    proxyHeaders: xforwarded
  # -- SEAMWARE-published Keycloak image. This is the official Keycloak source
  # built on top of the 26.6.2 tag with the patch from upstream main that
  # restores the OID4VCI QR generation endpoint. The vanilla 26.6.2 image is
  # missing that fix — see https://github.com/keycloak/keycloak/issues/44623
  # (#issuecomment-4376937817 confirms the fix is only in main as of this
  # writing). Swap back to the upstream image once 26.6.3 / 26.7 lands.
  image:
    registry: quay.io
    repository: seamware/keycloak
    tag: "26.6.2"
  # -- TLS terminated at the ingress; the container does not serve HTTPS itself
  tls:
    enabled: false
  service:
    httpPort: 8080
  # -- expose the management/health port (9000) via a dedicated metrics service
  metrics:
    enabled: true
  # -- enable Keycloak features. Beyond the base `oid4vc-vci` we need two
  # sub-features that KC main split out from the original flag:
  #   * `oid4vc-vci-preauth-code` (KC 26.4+) — gates the pre-authorized_code
  #     grant on /create-credential-offer.
  #   * `oid4vc-vci-rest-credential-offer` (KC main, present in the SEAMWARE
  #     patched 26.6.2 image) — gates the /create-credential-offer REST
  #     endpoint itself. Without it Keycloak answers
  #     `403 invalid_client: "REST credential offer functionality is not enabled"`.
  features:
    enabled:
      - oid4vc-vci
      - oid4vc-vci-preauth-code
      - oid4vc-vci-rest-credential-offer

  # -- sets memory requests for keycloak
  # increased above the chart defaults to prevent OOMs in linux kernel >=6.14
  resources:
    requests:
      memory: "500Mi"
      cpu: "0.5"
    limits:
      memory: "2Gi"
      cpu: "1"

  # -- increase thresholds to prevent crashloops in low resource deployments
  livenessProbe:
    failureThreshold: 20
  readinessProbe:
    failureThreshold: 20

  # -- the chart ships an embedded postgres subchart; disable it and use the external db below
  postgres:
    enabled: false
  # -- external db connection details. when `existingSecret` is set the chart reads
  # both username and password from it via `secretKeys.{usernameKey,passwordKey}`,
  # so the keys must match what the postgres operator (Zalando) writes: `username` / `password`.
  database:
    host: postgres
    name: keycloakdb
    username: postgres
    existingSecret: postgres.postgres.credentials.postgresql.acid.zalan.do
    secretKeys:
      usernameKey: username
      passwordKey: password

  # -- mount the realm ConfigMap rendered by the umbrella chart at the official import path
  extraVolumeMounts:
    - name: realms
      mountPath: /opt/keycloak/data/import

  # -- extra env vars to be set
  extraEnvVars:
    # set in accordance with the memory requests, will result in OOM otherwise
    - name: KC_HEAP_SIZE
      value: "1024m"

  # -- name of a ConfigMap whose keys are injected as environment variables
  # via `envFrom.configMapRef` in the Keycloak StatefulSet. The value is
  # processed by Bitnami's `tpl` function so it may contain Go template
  # expressions. The default points at the tracing ConfigMap created by
  # `keycloak-tracing-cm.yaml`; when tracing is disabled the ConfigMap
  # exists but is empty, so no extra env vars are added.
  extraEnvVarsCM: "{{ .Release.Name }}-keycloak-tracing"

  # -- distributed-tracing configuration for Keycloak (25+ native OTEL).
  # When enabled, a ConfigMap with the standard `OTEL_*` env vars and
  # `KC_TRACING_ENABLED=true` is created and injected via
  # `extraEnvVarsCM`. No upstream Keycloak chart modifications are needed
  # because the env vars are delivered through the `envFrom` hook.
  tracing:
    # -- toggle OpenTelemetry tracing on Keycloak. Leave unset (default)
    # to inherit `tracing.enabled` from the global block; set to `true`
    # / `false` to override independently.
    enabled:
    # -- logical service name exposed as `OTEL_SERVICE_NAME` and recorded
    # as `service.name` on every span emitted by Keycloak.
    serviceName: keycloak

  # -- configuration of the realm to be imported
  realm:
    # -- should the realm be imported
    import: true
    # -- name of the realm
    name: test-realm
    # -- frontend url to be used for the realm
    frontendURL: http://localhost:8080
    # -- custom displayNameHtml for the realm. If empty, defaults to "<div class="kc-logo-text"><span>{realm.name}</span></div>"
    displayNameHtml: ""
    sslRequired: none
    # -- realm attributes. Support string (old style) or key-value
    attributes:
    defaultClientScopes:
      - name: basic
        description: OpenID Connect scope for add all basic claims to the token
        protocol: openid-connect
        attributes:
          include.in.token.scope: "false"
          display.on.consent.screen: "false"
        protocolMappers:
          - name: sub
            protocol: openid-connect
            protocolMapper: oidc-sub-mapper
            consentRequired: false
            config:
              introspection.token.claim: "true"
              access.token.claim: "true"
          - name: auth_time
            protocol: openid-connect
            protocolMapper: oidc-usersessionmodel-note-mapper
            consentRequired: false
            config:
              user.session.note: AUTH_TIME
              id.token.claim: "true"
              introspection.token.claim: "true"
              access.token.claim: "true"
              claim.name: auth_time
              jsonType.label: long
      - name: roles
        description: OpenID Connect scope for add user roles to the access token
        protocol: openid-connect
        attributes:
          include.in.token.scope: "false"
          display.on.consent.screen: "true"
          consent.screen.text: ${rolesScopeConsentText}
        protocolMappers:
          - name: audience resolve
            protocol: openid-connect
            protocolMapper: oidc-audience-resolve-mapper
            consentRequired: false
            config:
              introspection.token.claim: "true"
              access.token.claim: "true"
          - name: realm roles
            protocol: openid-connect
            protocolMapper: oidc-usermodel-realm-role-mapper
            consentRequired: false
            config:
              introspection.token.claim: "true"
              multivalued: "true"
              user.attribute: foo
              access.token.claim: "true"
              claim.name: realm_access.roles
              jsonType.label: String
          - name: client roles
            protocol: openid-connect
            protocolMapper: oidc-usermodel-client-role-mapper
            consentRequired: false
            config:
              introspection.token.claim: "true"
              multivalued: "true"
              user.attribute: foo
              access.token.claim: "true"
              claim.name: resource_access.${client_id}.roles
              jsonType.label: String
      - name: offline_access
        description: "OpenID Connect built-in scope: offline_access"
        protocol: openid-connect
        attributes:
          consent.screen.text: ${offlineAccessScopeConsentText}
          display.on.consent.screen: "true"
      - name: microprofile-jwt
        description: Microprofile - JWT built-in scope
        protocol: openid-connect
        attributes:
          include.in.token.scope: "true"
          display.on.consent.screen: "false"
        protocolMappers:
          - name: upn
            protocol: openid-connect
            protocolMapper: oidc-usermodel-property-mapper
            consentRequired: false
            config:
              userinfo.token.claim: "true"
              user.attribute: username
              id.token.claim: "true"
              access.token.claim: "true"
              claim.name: upn
              jsonType.label: String
          - name: groups
            protocol: openid-connect
            protocolMapper: oidc-usermodel-realm-role-mapper
            consentRequired: false
            config:
              multivalued: "true"
              user.attribute: foo
              id.token.claim: "true"
              access.token.claim: "true"
              claim.name: groups
              jsonType.label: String
      - name: email
        description: "OpenID Connect built-in scope: email"
        protocol: openid-connect
        attributes:
          include.in.token.scope: "true"
          display.on.consent.screen: "true"
          consent.screen.text: ${emailScopeConsentText}
        protocolMappers:
          - name: email
            protocol: openid-connect
            protocolMapper: oidc-usermodel-property-mapper
            consentRequired: false
            config:
              userinfo.token.claim: "true"
              user.attribute: email
              id.token.claim: "true"
              access.token.claim: "true"
              claim.name: email
              jsonType.label: String
          - name: email verified
            protocol: openid-connect
            protocolMapper: oidc-usermodel-property-mapper
            consentRequired: false
            config:
              userinfo.token.claim: "true"
              user.attribute: emailVerified
              id.token.claim: "true"
              access.token.claim: "true"
              claim.name: email_verified
              jsonType.label: boolean
      - name: phone
        description: "OpenID Connect built-in scope: phone"
        protocol: openid-connect
        attributes:
          include.in.token.scope: "true"
          display.on.consent.screen: "true"
          consent.screen.text: ${phoneScopeConsentText}
        protocolMappers:
          - name: phone number verified
            protocol: openid-connect
            protocolMapper: oidc-usermodel-attribute-mapper
            consentRequired: false
            config:
              userinfo.token.claim: "true"
              user.attribute: phoneNumberVerified
              id.token.claim: "true"
              access.token.claim: "true"
              claim.name: phone_number_verified
              jsonType.label: boolean
          - name: phone number
            protocol: openid-connect
            protocolMapper: oidc-usermodel-attribute-mapper
            consentRequired: false
            config:
              userinfo.token.claim: "true"
              user.attribute: phoneNumber
              id.token.claim: "true"
              access.token.claim: "true"
              claim.name: phone_number
              jsonType.label: String
      - name: address
        description: "OpenID Connect built-in scope: address"
        protocol: openid-connect
        attributes:
          include.in.token.scope: "true"
          display.on.consent.screen: "true"
          consent.screen.text: ${addressScopeConsentText}
        protocolMappers:
          - name: address
            protocol: openid-connect
            protocolMapper: oidc-address-mapper
            consentRequired: false
            config:
              user.attribute.formatted: formatted
              user.attribute.country: country
              user.attribute.postal_code: postal_code
              userinfo.token.claim: "true"
              user.attribute.street: street
              id.token.claim: "true"
              user.attribute.region: region
              access.token.claim: "true"
              user.attribute.locality: locality
      - name: profile
        description: "OpenID Connect built-in scope: profile"
        protocol: openid-connect
        attributes:
          include.in.token.scope: "true"
          display.on.consent.screen: "true"
          consent.screen.text: ${profileScopeConsentText}
        protocolMappers:
          - name: zoneinfo
            protocol: openid-connect
            protocolMapper: oidc-usermodel-attribute-mapper
            consentRequired: false
            config:
              userinfo.token.claim: "true"
              user.attribute: zoneinfo
              id.token.claim: "true"
              access.token.claim: "true"
              claim.name: zoneinfo
              jsonType.label: String
          - name: nickname
            protocol: openid-connect
            protocolMapper: oidc-usermodel-attribute-mapper
            consentRequired: false
            config:
              userinfo.token.claim: "true"
              user.attribute: nickname
              id.token.claim: "true"
              access.token.claim: "true"
              claim.name: nickname
              jsonType.label: String
          - name: profile
            protocol: openid-connect
            protocolMapper: oidc-usermodel-attribute-mapper
            consentRequired: false
            config:
              userinfo.token.claim: "true"
              user.attribute: profile
              id.token.claim: "true"
              access.token.claim: "true"
              claim.name: profile
              jsonType.label: String
          - name: full name
            protocol: openid-connect
            protocolMapper: oidc-full-name-mapper
            consentRequired: false
