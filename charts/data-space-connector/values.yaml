        surrogateAuthRequired: false
        enabled: true
        alwaysDisplayInConsole: false
        clientAuthenticatorType: client-secret
        redirectUris: []
        webOrigins: []
        notBefore: 0
        bearerOnly: false
        consentRequired: false
        standardFlowEnabled: false
        implicitFlowEnabled: false
        directAccessGrantsEnabled: true
        serviceAccountsEnabled: false
        publicClient: true
        frontchannelLogout: false
        protocol: openid-connect
        attributes:
          realm_client: "false"
          client.use.lightweight.access.token.enabled: "true"
        authenticationFlowBindingOverrides: {}
        fullScopeAllowed: true
        nodeReRegistrationTimeout: 0
        protocolMappers:
          - name: audience resolve
            protocol: openid-connect
            protocolMapper: oidc-audience-resolve-mapper
            consentRequired: false
            config: {}
        defaultClientScopes:
          - web-origins
          - acr
          - roles
          - profile
          - basic
          - email
        optionalClientScopes:
          - address
          - phone
          - offline_access
          - microprofile-jwt
    clients:
      - clientId: ${DID}
        enabled: true
        description: Client to manage itself
        surrogateAuthRequired: false
        alwaysDisplayInConsole: false
        clientAuthenticatorType: client-secret
        defaultRoles: []
        redirectUris: []
        webOrigins: []
        notBefore: 0
        bearerOnly: false
        consentRequired: false
        standardFlowEnabled: true
        implicitFlowEnabled: false
        directAccessGrantsEnabled: false
        serviceAccountsEnabled: false
        publicClient: false
        frontchannelLogout: false
        # KC 26.4+: clients keep `protocol: openid-connect` and opt into VC issuance
        # via the `oid4vci.enabled` attribute. Mappers and credential metadata move
        # to the per-VC ClientScopes (rendered from `realm.verifiableCredentials`),
        # which `dsc.defaultClients` auto-extends into the client's optionalClientScopes.
        protocol: openid-connect
        attributes:
          oid4vci.enabled: "true"
          client.secret.creation.time: "1675260539"
        protocolMappers: []
        authenticationFlowBindingOverrides: {}
        fullScopeAllowed: true
        nodeReRegistrationTimeout: -1
        defaultClientScopes: []
        optionalClientScopes: []

    # -- default realm roles
    defaultRealmRoles:
